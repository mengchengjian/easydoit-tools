<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="小红书文案工坊 — 自由组合封面、标题、正文、话题、评论，一键复制发布。">
<meta name="keywords" content="小红书文案,文案编辑器,小红书排版,内容创作,文案模板">
<title>文案工坊 — EasyDoIt</title>
<style>
*,::before,::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#faf8f6;
  --surface:#fff;
  --border:rgba(0,0,0,.05);
  --border2:rgba(0,0,0,.08);
  --text:#1d1d1f;
  --text2:#6e6e73;
  --text3:#aeaeb2;
  --accent:#ff2442;
  --accent-soft:rgba(255,36,66,.06);
  --accent-hover:#e61a35;
  --pink:#ff6b81;
  --purple:#7c5cfc;
  --orange:#ff9500;
  --green:#34c759;
  --teal:#5ac8fa;
  --gold:#ffd60a;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
  --radius:14px;
  --radius-sm:10px;
  --radius-lg:22px;
  --radius-xl:30px;
  --card-shadow:0 4px 20px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.03);
  --card-shadow-hover:0 8px 30px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.04);
  --phone-shadow:0 0 0 1px rgba(0,0,0,.04),0 20px 60px rgba(0,0,0,.08),0 8px 20px rgba(0,0,0,.04);
  --transition:.25s cubic-bezier(.4,0,.2,1);
}

body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
::selection{background:rgba(255,36,66,.18);color:var(--text)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:8px}

/* ═══ Header ═══ */
.hdr{
  height:50px;padding:0 20px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
  background:rgba(255,255,255,.75);backdrop-filter:blur(20px)saturate(180%);
  -webkit-backdrop-filter:blur(20px)saturate(180%);
  border-bottom:1px solid var(--border);z-index:100;
}
.hl{display:flex;align-items:center;gap:8px}
.hl-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px rgba(255,36,66,.4)}
.hl-t{font-size:14px;font-weight:700;letter-spacing:-.02em}
.hr{display:flex;align-items:center;gap:6px}
.btn{
  padding:5px 12px;border:none;border-radius:18px;cursor:pointer;
  font-size:11px;font-weight:500;font-family:var(--font);
  background:rgba(0,0,0,.04);color:var(--text2);
  transition:all var(--transition);white-space:nowrap;
  letter-spacing:-.01em;
}
.btn:hover{background:rgba(0,0,0,.08);color:var(--text)}
.btn-p{background:var(--accent);color:#fff;font-weight:600}
.btn-p:hover{background:var(--accent-hover);color:#fff}
.btn-o{border:1.5px solid rgba(0,0,0,.1);background:transparent}
.btn-o:hover{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.15)}
.btn-d{color:var(--accent);background:var(--accent-soft)}
.btn-d:hover{background:rgba(255,36,66,.12);color:var(--accent-hover)}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:14px}
.chip{
  font-size:10px;font-weight:600;color:var(--accent);
  padding:3px 10px;border-radius:14px;
  background:var(--accent-soft);letter-spacing:-.01em;
}

/* ═══ Main Layout ═══ */
.ct{display:flex;flex:1;overflow:hidden}

/* ═══ Left Panel ═══ */
.lp{
  width:440px;min-width:360px;background:var(--surface);
  border-right:1px solid var(--border);display:flex;
  flex-direction:column;overflow:hidden;flex-shrink:0;
}

/* tabs */
.tb-wrap{padding:10px 12px 4px;flex-shrink:0}
.tb{
  display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;
  background:rgba(0,0,0,.025);border-radius:12px;padding:3px;
}
.tb::-webkit-scrollbar{display:none}
.tb-i{
  flex:1 0 auto;padding:6px 3px;text-align:center;
  font-size:10px;font-weight:500;color:var(--text2);
  cursor:pointer;border-radius:10px;transition:all .2s ease;
  white-space:nowrap;position:relative;min-width:42px;
  letter-spacing:-.01em;user-select:none;
}
.tb-i:hover{color:var(--text)}
.tb-i.act{
  color:var(--text);font-weight:600;background:var(--surface);
  box-shadow:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
}
.tb-b{
  position:absolute;top:1px;right:1px;
  font-size:7px;font-weight:700;color:#fff;
  background:var(--accent);border-radius:6px;
  padding:0 4px;line-height:13px;min-width:14px;text-align:center;
}

/* search */
.srch{padding:0 12px 8px;flex-shrink:0}
.si{
  width:100%;padding:8px 14px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);background:rgba(0,0,0,.02);
  color:var(--text);font-size:11px;font-family:var(--font);
  transition:all var(--transition);outline:none;
}
.si:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft)}
.si::placeholder{color:var(--text3)}

/* card list */
.clist{flex:1;overflow-y:auto;padding:2px 10px 6px}
.card{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;margin-bottom:3px;border-radius:var(--radius-sm);
  cursor:pointer;border:1.5px solid transparent;
  background:transparent;transition:all var(--transition);
  position:relative;
}
.card:hover{background:rgba(0,0,0,.015);border-color:var(--border)}
.card.sel{background:var(--accent-soft);border-color:rgba(255,36,66,.1)}
.card .cb{
  appearance:none;-webkit-appearance:none;
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(0,0,0,.15);flex-shrink:0;cursor:pointer;
  margin-top:1px;transition:all var(--transition);background:var(--surface);
  position:relative;
}
.card .cb:hover{border-color:var(--accent)}
.card .cb:checked{background:var(--accent);border-color:var(--accent)}
.card .cb:checked::after{
  content:'';position:absolute;left:4px;top:2px;
  width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(45deg);
}
.card .cbody{flex:1;min-width:0}
.card .ctx{font-size:11px;line-height:1.55;word-break:break-word;color:var(--text)}
.card .cmeta{display:flex;align-items:center;gap:6px;margin-top:3px}
.card .ctag{font-size:8px;font-weight:600;padding:2px 7px;border-radius:5px}
.card .ctag.nt{background:rgba(124,92,252,.08);color:var(--purple)}
.card .ctag.et{background:rgba(255,149,0,.08);color:var(--orange)}
.card .clen{font-size:9px;color:var(--text3)}
.card .cact{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}
.card:hover .cact{opacity:1}
.card .cact button{
  background:none;border:none;color:var(--text3);cursor:pointer;
  padding:3px 5px;border-radius:6px;font-size:12px;line-height:1;
  transition:all .15s;
}
.card .cact button:hover{background:rgba(0,0,0,.04);color:var(--text)}
.card .cact .cdel:hover{background:rgba(255,36,66,.06);color:var(--accent)}
.emp{padding:40px 0;text-align:center;color:var(--text3);font-size:11px;line-height:1.8}

/* footer input */
.ft{padding:6px 12px 10px;flex-shrink:0;display:flex;flex-direction:column;gap:5px}
.fr{display:flex;gap:6px}
.fr input{
  flex:1;padding:7px 12px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);background:rgba(0,0,0,.02);
  color:var(--text);font-size:11px;font-family:var(--font);
  transition:all var(--transition);outline:none;
}
.fr input:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft)}
.fr input::placeholder{color:var(--text3)}
.fb{font-size:9px;color:var(--text3);display:flex;justify-content:space-between;padding:0 2px}

/* ═══ Right: Hero Area ═══ */
.rh{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;overflow:hidden;padding:20px;gap:24px;
  background:linear-gradient(160deg,#fdf2f4 0%,#faf4f0 30%,#faf8f6 50%,#f3f1fc 85%,#f8f4fc 100%);
}
/* decorative blobs */
.rh::before{
  content:'';position:absolute;
  width:420px;height:420px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,36,66,.05),transparent 70%);
  top:-90px;left:-60px;pointer-events:none;
}
.rh::after{
  content:'';position:absolute;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,92,252,.04),transparent 70%);
  bottom:-50px;right:-30px;pointer-events:none;
}

/* phone wrapper */
.pw{position:relative;z-index:2;flex-shrink:0}
.phone{
  width:288px;height:584px;border-radius:42px;
  background:linear-gradient(145deg,#2a2a2e,#1c1c20);
  padding:9px;position:relative;
  box-shadow:var(--phone-shadow);
  transition:transform .4s cubic-bezier(.4,0,.2,1);
}
.phone:hover{transform:translateY(-3px)}
.pf{
  width:100%;height:100%;background:#0a0a0c;
  border-radius:34px;overflow:hidden;position:relative;
  box-shadow:inset 0 0 1px rgba(255,255,255,.06);
}
.pd{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:94px;height:25px;background:#0a0a0c;
  border-radius:14px;z-index:10;
}
.ps{
  width:100%;height:100%;background:#fff;border-radius:34px;
  overflow:hidden;display:flex;flex-direction:column;
}

/* xhs status bar */
.xsb{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 22px 6px;font-size:11px;font-weight:600;
  color:#1d1d1f;flex-shrink:0;
}
.xsb-r{display:flex;align-items:center;gap:3px;font-size:10px}

/* scroll */
.xns{flex:1;overflow-y:auto;display:flex;flex-direction:column;scroll-behavior:smooth}
.xns::-webkit-scrollbar{width:0}

/* user */
.xu{display:flex;align-items:center;gap:8px;padding:6px 14px 2px;flex-shrink:0}
.xa{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:10px;font-weight:700;
}
.xi{flex:1;min-width:0;line-height:1.3}
.xn{font-size:11px;font-weight:600;color:#1d1d1f}
.xt{font-size:8px;color:var(--text3);display:block;font-weight:400}
.xf{
  font-size:9px;font-weight:600;color:var(--accent);
  border:1.5px solid rgba(255,36,66,.2);border-radius:14px;
  padding:3px 9px;background:#fff;cursor:default;flex-shrink:0;
}

/* cover */
.xc{
  width:100%;aspect-ratio:1;flex-shrink:0;
  background:linear-gradient(145deg,#1a1a2e,#16213e,#0f3460);
  display:flex;align-items:center;justify-content:center;
  padding:28px;position:relative;overflow:hidden;
}
.xc::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 20%,rgba(255,255,255,.04),transparent 60%),
              radial-gradient(ellipse at 70% 70%,rgba(255,36,66,.08),transparent 50%);
}
.xc-t{
  position:relative;font-size:18px;font-weight:800;color:#fff;
  text-align:center;line-height:1.4;word-break:break-word;
  letter-spacing:-.01em;
}
.xc-t.ph{font-size:10px;font-weight:400;color:rgba(255,255,255,.15)}
.xc-pg{position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);color:#fff;font-size:7px;padding:1px 6px;border-radius:8px}

/* body */
.xb{padding:8px 16px 4px;flex-shrink:0}
.xb-t{font-size:13px;font-weight:700;color:#1d1d1f;line-height:1.4;margin-bottom:2px;word-break:break-word;letter-spacing:-.02em}
.xb-t.ph{color:#e8e8ed;font-weight:400;font-size:9px}
.xb-c{font-size:10px;color:#3a3a3c;line-height:1.85;white-space:pre-wrap;word-break:break-word}
.xb-c.ph{color:#ededed}
.xb-h{color:#4169b8;text-decoration:none;font-size:10px;margin-right:2px;display:inline}
.xb-h.ev{color:#d4641a;font-weight:600}
.xb-loc{padding:2px 16px 4px;font-size:8px;color:var(--text3);flex-shrink:0}

/* action bar */
.xbar{
  display:flex;justify-content:space-around;padding:4px 14px 2px;
  flex-shrink:0;border-top:1px solid rgba(0,0,0,.03);margin:0 16px;
}
.xbar-i{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  font-size:7px;color:var(--text3);
  background:none;border:none;cursor:default;
  font-family:var(--font);flex:1;padding:2px 0;
}
.xbar-i .xi{font-size:13px;line-height:1}

/* comments */
.xcm{padding:4px 16px 8px;flex-shrink:0}
.xcm-i{font-size:8px;color:#636366;line-height:1.7;margin-bottom:1px}
.xcm-u{font-weight:600;color:#48484a;margin-right:2px}
.xcm.ph{color:#ededed;font-size:7px}
.xcm-hint{font-size:7px;color:#ededed;text-align:center;padding:2px 0}

/* ═══ Bottom Action Bar ═══ */
.bar{
  display:flex;gap:10px;z-index:2;flex-shrink:0;
  background:rgba(255,255,255,.65);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);border-radius:var(--radius-lg);
  padding:8px;border:1px solid rgba(0,0,0,.04);
  box-shadow:0 4px 16px rgba(0,0,0,.03);
}
.bbtn{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border:none;border-radius:var(--radius);
  cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;
  transition:all var(--transition);white-space:nowrap;
  letter-spacing:-.01em;color:var(--text2);
  background:rgba(0,0,0,.025);
}
.bbtn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.bbtn:active{transform:scale(.97)}
.bbtn .bi{
  width:30px;height:30px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.bbtn .bi.cv{background:rgba(255,36,66,.1);color:var(--accent)}
.bbtn .bi.ttl{background:rgba(124,92,252,.1);color:var(--purple)}
.bbtn .bi.bdy{background:rgba(255,149,0,.1);color:var(--orange)}
.bbtn .bi.cmt{background:rgba(52,199,89,.1);color:var(--green)}
.bbtn .bi.all{
  background:linear-gradient(135deg,rgba(255,36,66,.12),rgba(124,92,252,.12));
  color:var(--accent);
}

/* ═══ Modal ═══ */
.mo{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.15);display:flex;
  align-items:center;justify-content:center;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.mo.hd{display:none}
.mw{
  background:var(--surface);border-radius:var(--radius-lg);
  width:400px;max-width:92vw;padding:28px;
  box-shadow:0 30px 80px rgba(0,0,0,.12);
}
.mw h3{font-size:15px;font-weight:700;margin-bottom:2px;letter-spacing:-.02em}
.mw .hint{font-size:10px;color:var(--text2);margin-bottom:12px}
.mw textarea{
  width:100%;height:180px;padding:12px;line-height:1.6;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:rgba(0,0,0,.015);color:var(--text);
  font-size:12px;font-family:var(--font);
  resize:vertical;outline:none;transition:all var(--transition);
}
.mw textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.mw textarea::placeholder{color:var(--text3)}
.mwa{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* ═══ Toast ═══ */
.ts{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(29,29,31,.88);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  color:#fff;border-radius:14px;padding:7px 18px;
  font-size:11px;font-weight:500;z-index:300;
  pointer-events:none;opacity:0;transition:opacity .3s ease;
}
.ts.sh{opacity:1}

/* ═══ Responsive ═══ */
@media(max-width:900px){
  .ct{flex-direction:column}
  .lp{width:100%;min-width:0;flex:1 1 50%}
  .rh{flex:1 1 50%;padding:12px;gap:12px}
  .phone{width:220px;height:446px;border-radius:32px;padding:7px}
  .pf{border-radius:26px}.ps{border-radius:26px}
  .pd{top:7px;width:68px;height:18px;border-radius:12px}
  .bar{gap:6px;padding:6px;flex-wrap:wrap;justify-content:center}
  .bbtn{padding:8px 10px;font-size:10px}
  .bbtn .bi{width:24px;height:24px;font-size:11px;border-radius:7px}
  .xc-t{font-size:14px}.xb-t{font-size:11px}.xb-c{font-size:9px}
}
@media(max-width:480px){
  .hdr{padding:0 10px;height:44px}
  .hl-t{font-size:12px}
  .btn{padding:4px 8px;font-size:9px}
  .lp{flex:1 1 100%}
  .rh{display:none}
  .phone{width:160px;height:325px;border-radius:26px;padding:5px}
  .pf{border-radius:20px}.ps{border-radius:20px}
  .pd{top:5px;width:48px;height:13px;border-radius:10px}
}

/* animations */
@keyframes inUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.phone{animation:inUp .5s cubic-bezier(.4,0,.2,1) both}
.bar>*{animation:inUp .4s cubic-bezier(.4,0,.2,1) both}
.bar>:nth-child(1){animation-delay:.05s}
.bar>:nth-child(2){animation-delay:.1s}
.bar>:nth-child(3){animation-delay:.15s}
.bar>:nth-child(4){animation-delay:.2s}
.bar>:nth-child(5){animation-delay:.25s}
</style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="hl"><div class="hl-dot"></div><span class="hl-t">文案工坊</span></div>
  <div class="hr">
    <span class="chip">已选 <b id="gC">0</b></span>
    <button class="btn btn-o btn-sm" onclick="randAll()">随机一套</button>
    <button class="btn btn-o btn-sm" onclick="exp()">导出</button>
    <button class="btn btn-o btn-sm" onclick="$('imF').click()">导入</button>
    <input type="file" id="imF" accept=".json" onchange="imp(this)" style="display:none">
    <button class="btn btn-d btn-sm" onclick="clr()">清空</button>
  </div>
</header>

<div class="ct">
  <!-- Left: Content Library -->
  <div class="lp" id="lp">
    <div class="tb-wrap"><div class="tb" id="tb"></div></div>

    <!-- Tab panels generated by JS -->
    <div class="srch"><input class="si" id="si-0" placeholder="搜索封面文案…" oninput="fl(0,this.value)"></div>
    <div class="clist" id="l-0"></div>
    <div class="ft"><div class="fr"><input id="i-0" placeholder="添加封面文案…" onkeydown="if(event.key==='Enter')add(0)"><button class="btn btn-p btn-sm" onclick="add(0)">添加</button><button class="btn btn-sm" onclick="bat(0)">批量</button></div><div class="fb"><span id="s-0"></span><span id="c-0"></span></div></div>
  </div>

  <!-- Right: Hero -->
  <div class="rh" id="rh">
    <div class="pw">
      <div class="phone">
        <div class="pf"><div class="pd"></div>
          <div class="ps">
            <div class="xsb"><span>9:41</span><div class="xsb-r">⋯ ▮▮</div></div>
            <div class="xns">
              <div class="xu"><div class="xa">我</div><div class="xi"><div class="xn">小红书博主</div><span class="xt">刚刚</span></div><div class="xf">关注</div></div>
              <div class="xc"><div class="xc-t ph" id="pvCv">点击随机挑选文案</div><div class="xc-pg">1/1</div></div>
              <div class="xb"><div class="xb-t ph" id="pvTt">标题预览区</div><div class="xb-c ph" id="pvCt">正文内容将在这里显示</div></div>
              <div class="xb-loc ph" id="pvLoc">发布位置</div>
              <div class="xbar"><div class="xbar-i"><span class="xi">♥</span>点赞</div><div class="xbar-i"><span class="xi">💬</span>评论</div><div class="xbar-i"><span class="xi">☆</span>收藏</div><div class="xbar-i"><span class="xi">↗</span>分享</div></div>
              <div class="xcm ph" id="pvCm">评论区文案预览</div>
              <div class="xcm-hint">来聊聊吧</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bar">
      <button class="bbtn" onclick="cpy('cover')"><span class="bi cv">🖼</span>复制封面</button>
      <button class="bbtn" onclick="cpy('title')"><span class="bi ttl">T</span>复制标题</button>
      <button class="bbtn" onclick="cpy('body')"><span class="bi bdy">📝</span>复制正文</button>
      <button class="bbtn" onclick="cpy('cmts')"><span class="bi cmt">💬</span>复制评论</button>
      <button class="bbtn" onclick="cpyAll()"><span class="bi all">📋</span>复制全部</button>
    </div>
  </div>
</div>

<!-- Batch Modal -->
<div class="mo hd" id="bm">
  <div class="mw">
    <h3 id="bmT">批量导入</h3><div class="hint">每行一条，空行跳过</div>
    <textarea id="bmTx" placeholder="粘贴文案…"></textarea>
    <div class="mwa"><button class="btn btn-o btn-sm" onclick="cb()">取消</button><button class="btn btn-p btn-sm" onclick="dbt()">确认</button></div>
  </div>
</div>

<!-- Toast -->
<div class="ts" id="ts"></div>

<script>
const M=['封面文案','标题文案','内容文案','普通话题','活动话题','评论区文案'];
const SK='xhs_v5';let d={items:[[],[],[],[],[],[]],selected:[[],[],[],[],[],[]]};let f=['','','','','',''];let bi=-1,curTab=0;

function $(s){return document.getElementById(s)}

function ld(){try{const r=localStorage.getItem(SK);if(r){const x=JSON.parse(r);if(x.items)d.items=x.items.slice();if(x.selected)d.selected=x.selected.slice()}}catch(e){}for(let i=0;i<6;i++){if(!Array.isArray(d.items[i]))d.items[i]=[];if(!Array.isArray(d.selected[i]))d.selected[i]=[]}}
function sv(){localStorage.setItem(SK,JSON.stringify(d))}
function es(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function cp(t){navigator.clipboard.writeText(t).then(()=>toast('已复制')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('已复制')})}
function toast(m){const e=$('ts');e.textContent=m;e.classList.add('sh');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('sh'),1400)}

function rn(i){
  const t=f[i],arr=d.items[i],sl=d.selected[i];
  const ct=$('l-'+i),st=$('s-'+i),ch=$('c-'+i);
  const flt=t?arr.map((v,idx)=>({v,idx})).filter(o=>o.v.toLowerCase().includes(t)):arr.map((v,idx)=>({v,idx}));
  if(!arr.length){ct.innerHTML='<div class="emp">暂无文案<br>在下方输入框添加</div>'}
  else if(!flt.length){ct.innerHTML='<div class="emp">无匹配结果</div>'}
  else{
    ct.innerHTML=flt.map(({v,idx})=>{
      const s=sl.includes(idx);let tg='';if(i===3)tg='<span class="ctag nt">普通</span>';if(i===4)tg='<span class="ctag et">活动</span>';
      return `<div class="card ${s?'sel':''}" onclick="tg(${i},${idx})">
        <input type="checkbox" class="cb" ${s?'checked':''} onclick="event.stopPropagation();tg(${i},${idx})">
        <div class="cbody"><div class="ctx">${es(v)}</div><div class="cmeta">${tg}<span class="clen">${v.length}字</span></div></div>
        <div class="cact"><button onclick="cpI(${i},${idx},event)">📋</button><button class="cdel" onclick="rm(${i},${idx},event)">✕</button></div>
      </div>`
    }).join('')
  }
  const tl=arr.length,sl2=sl.length,sc=sl.reduce((s,idx)=>s+(arr[idx]||'').length,0);
  st.textContent=tl?`${tl}条 · 已选${sl2}`:'';ch.textContent=sl2?`总字数${sc}`:''
}

function ua(){up();uh()}
function uh(){const t=d.selected.reduce((s,a)=>s+a.length,0);$('gC').textContent=t}

function up(){
  const g=i=>d.selected[i].map(idx=>d.items[i][idx]);
  const cv=g(0),tl=g(1),ct=g(2),nt=g(3),et=g(4),cm=g(5);
  const eC=$('pvCv');if(cv.length){eC.textContent=cv.join('\n');eC.classList.remove('ph')}else{eC.textContent='封面文案预览';eC.classList.add('ph')}
  const eT=$('pvTt');if(tl.length){eT.textContent=tl.join(' ');eT.classList.remove('ph')}else{eT.textContent='标题预览区';eT.classList.add('ph')}
  const eCt=$('pvCt');
  if(ct.length||nt.length||et.length){
    let h='';if(ct.length)h+=es(ct.join('\n\n'));
    const al=[...nt.map(t=>({t,ty:'n'})),...et.map(t=>({t,ty:'e'}))];
    if(al.length)h+=(ct.length?'\n\n':'')+al.map(o=>`<span class="xb-h${o.ty==='e'?' ev':''}">#${es(o.t)}</span>`).join(' ');
    eCt.innerHTML=h;eCt.classList.remove('ph')
  }else{eCt.textContent='正文内容将在这里显示';eCt.classList.add('ph')}
  const eL=$('pvLoc');eL.textContent=(cv.length||tl.length||ct.length)?'📍 上海':'发布位置';eL.classList.toggle('ph',!(cv.length||tl.length||ct.length));
  const eCm=$('pvCm');
  if(cm.length){eCm.innerHTML=cm.map((c,k)=>`<div class="xcm-i"><span class="xcm-u">用户${k+1}</span>${es(c)}</div>`).join('');eCm.classList.remove('ph')}
  else{eCm.textContent='评论区文案预览';eCm.classList.add('ph')}
}

function add(i){const v=$('i-'+i).value.trim();if(!v)return;d.items[i].push(v);$('i-'+i).value='';sv();rn(i);ua()}
function tg(i,idx){const p=d.selected[i].indexOf(idx);if(p===-1)d.selected[i].push(idx);else d.selected[i].splice(p,1);sv();rn(i);ua()}
function rm(i,idx,e){e.stopPropagation();e.preventDefault();d.items[i].splice(idx,1);d.selected[i]=d.selected[i].filter(s=>s!==idx).map(s=>s>idx?s-1:s);sv();rn(i);ua()}
function cpI(i,idx,e){e.stopPropagation();e.preventDefault();cp(d.items[i][idx])}
function fl(i,v){f[i]=v.toLowerCase();rn(i)}

function randAll(){
  if(!d.items.some(a=>a.length)){toast('请先导入或添加文案');return}
  const pk=(i,cnt)=>{if(!d.items[i].length)return[];const n=Math.min(cnt,d.items[i].length);const po=shuf([...Array(d.items[i].length).keys()]);return po.slice(0,n).sort((a,b)=>a-b)};
  d.selected[0]=pk(0,1);d.selected[1]=pk(1,1);d.selected[2]=pk(2,1);d.selected[3]=pk(3,9);d.selected[4]=pk(4,1);d.selected[5]=pk(5,1);
  sv();for(let i=0;i<6;i++)rn(i);ua();toast('已随机挑选一套文案')
}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function cpyAll(){
  const g=i=>d.selected[i].map(idx=>d.items[i][idx]);
  const p=[];const cv=g(0).join('\n');if(cv)p.push('【封面】\n'+cv);
  const tl=g(1).join(' ');if(tl)p.push('【标题】\n'+tl);
  const ct=g(2).join('\n\n'),nt=g(3).map(x=>'#'+x).join(' '),et=g(4).map(x=>'#'+x).join(' ');
  const tags=[nt,et].filter(Boolean).join(' ');
  if(ct||tags)p.push('【正文】\n'+(ct||'')+(ct&&tags?'\n\n':'')+(tags||''));
  const cm=g(5).join('\n');if(cm)p.push('【评论区】\n'+cm);
  if(!p.length){toast('请先选择文案');return}cp(p.join('\n\n'))
}
function cpy(m){
  const g=i=>d.selected[i].map(idx=>d.items[i][idx]);let t='';
  if(m==='cover')t=g(0).join('\n');
  else if(m==='title')t=g(1).join(' ');
  else if(m==='body'){const ct=g(2).join('\n\n'),nt=g(3).map(x=>'#'+x).join(' '),et=g(4).map(x=>'#'+x).join(' ');t=(ct||'')+(ct&&(nt||et)?'\n\n':'')+[nt,et].filter(Boolean).join(' ')}
  else if(m==='cmts')t=g(5).join('\n');
  if(!t){toast('该模块未选择文案');return}cp(t)
}

function bat(i){bi=i;$('bmT').textContent='批量导入 - '+M[i];$('bmTx').value='';$('bm').classList.remove('hd');setTimeout(()=>$('bmTx').focus(),50)}
function cb(){$('bm').classList.add('hd');bi=-1}
function dbt(){const ls=$('bmTx').value.split('\n').map(l=>l.trim()).filter(l=>l);if(!ls.length||bi<0){cb();return}d.items[bi]=d.items[bi].concat(ls);sv();rn(bi);ua();cb()}

function exp(){const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='xhs-bank-'+new Date().toISOString().slice(0,10)+'.json';a.click()}
function imp(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(r.result);if(x.items){for(let i=0;i<6;i++)if(Array.isArray(x.items[i]))d.items[i]=d.items[i].concat(x.items[i])}else if(x.cover||x.title){d.items[0]=d.items[0].concat(x.cover||[]);d.items[1]=d.items[1].concat(x.title||[]);d.items[2]=d.items[2].concat(x.content||[]);d.items[3]=d.items[3].concat(x.topics||[]);d.items[4]=d.items[4].concat(x.activities||[]);d.items[5]=d.items[5].concat(x.comments||[])}if(x.selected)for(let i=0;i<6;i++)if(Array.isArray(x.selected[i]))d.selected[i]=x.selected[i];sv();for(let i=0;i<6;i++)rn(i);ua();toast('导入完成')}catch(e){toast('文件格式错误')}};r.readAsText(f);inp.value=''}
function clr(){if(!confirm('确定清空全部文案？'))return;d={items:[[],[],[],[],[],[]],selected:[[],[],[],[],[],[]]};sv();for(let i=0;i<6;i++)rn(i);ua()}

function sw(i){
  curTab=i;document.querySelectorAll('.tb-i').forEach((t,idx)=>t.classList.toggle('act',idx===i));
  // toggle tab panels: show only current tab's search + list + footer
  for(let j=0;j<6;j++){
    const si=document.getElementById('si-'+j),li=document.getElementById('l-'+j);
    const ft=j===0?document.querySelector('.ft'):document.getElementById('ft-'+j);
    if(j===i){if(si)si.style.display='';if(li)li.style.display='';}else{if(si)si.style.display='none';if(li)li.style.display='none'}
  }
  // handle footer visibility
  const ft0=document.querySelector('#lp > .ft');
  // rebuild footer for each tab
  rebuildFt(i);
}

// Since tabs share one footer area, we dynamically swap footer inputs
function rebuildFt(t){
  const oldFt=document.querySelector('#lp > .ft');
  const html=`<div class="ft" id="ft-${t}"><div class="fr"><input id="i-${t}" placeholder="添加${M[t]}…" onkeydown="if(event.key==='Enter')add(${t})"><button class="btn btn-p btn-sm" onclick="add(${t})">添加</button><button class="btn btn-sm" onclick="bat(${t})">批量</button></div><div class="fb"><span id="s-${t}"></span><span id="c-${t}"></span></div></div>`;
  if(oldFt)oldFt.outerHTML=html;
  rn(t);
}

// init static tab panels (all rendered in HTML, only one visible)
// simpler approach: render all tab content in .lp, but only show current via sw()
// Since the HTML has all 6 tab panels as separate divs, simpler to just toggle visibility

function sw(i){
  curTab=i;
  document.querySelectorAll('.tb-i').forEach((t,idx)=>t.classList.toggle('act',idx===i));
}

ld();
$('tb').innerHTML=M.map((n,i)=>`<div class="tb-i ${i===0?'act':''}" onclick="sw(${i})">${n}<span class="tb-b" id="bd-${i}">0</span></div>`).join('');

// init: render tab 0
rn(0);ua();
</script>
</body>
</html>
