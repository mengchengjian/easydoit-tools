<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="小红书文案工坊 — 自由组合封面、标题、正文、话题、评论，一键复制发布。">
<meta name="keywords" content="小红书文案,文案编辑器,小红书排版,内容创作,文案模板">
<title>文案工坊 — EasyDoIt</title>
<style>
*, ::before, ::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #fafafa;
  --border: rgba(0,0,0,.06);
  --border2: rgba(0,0,0,.10);
  --text: #1d1d1f;
  --text2: #86868b;
  --text3: #aeaeb2;
  --accent: #0071e3;
  --accent-soft: rgba(0,113,227,.08);
  --accent2: #ff375f;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --font-mono: "SF Mono", "Menlo", "Monaco", monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 2px 8px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
  --transition: .3s cubic-bezier(.25,.1,.25,1);
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
::selection { background: rgba(0,113,227,.2); color: var(--text); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 8px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.2); }

/* ══════════ Header ══════════ */
.hdr {
  height: 52px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,.72);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(0,0,0,.06);
  flex-shrink: 0;
  z-index: 100;
}
.hl { display: flex; align-items: center; gap: 10px; }
.hl-logo {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: linear-gradient(135deg, #0071e3, #5856d6);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 700;
}
.hl-t { font-size: 15px; font-weight: 600; letter-spacing: -.02em; }
.hr { display: flex; align-items: center; gap: 6px; }
.hr-chip {
  font-size: 11px; font-weight: 500; color: var(--text2);
  padding: 4px 12px; border-radius: 20px;
  background: rgba(0,0,0,.04); border: 1px solid rgba(0,0,0,.06);
}
.hr-chip b { color: var(--accent); font-weight: 600; }

/* buttons */
.btn {
  padding: 6px 14px;
  border: 1px solid rgba(0,0,0,.08);
  border-radius: 20px;
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  font-size: 11px; font-weight: 500;
  font-family: var(--font);
  transition: all var(--transition);
  display: inline-flex; align-items: center; gap: 4px;
  white-space: nowrap;
  letter-spacing: -.01em;
}
.btn:hover { background: #f5f5f7; color: var(--text); border-color: rgba(0,0,0,.12); }
.btn-p { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.btn-p:hover { background: #0077ED; border-color: #0077ED; color: #fff; }
.btn-d { color: var(--accent2); }
.btn-d:hover { background: rgba(255,55,95,.06); border-color: rgba(255,55,95,.2); }
.btn-gh { background: transparent; border-color: transparent; }
.btn-gh:hover { background: rgba(0,0,0,.04); border-color: transparent; }
.btn-sm { padding: 4px 10px; font-size: 10px; border-radius: 16px; }

/* ══════════ Layout ══════════ */
.ct { display: flex; flex: 1; overflow: hidden; }

/* ══════════ Left Panel ══════════ */
.lp {
  width: 440px; min-width: 340px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; flex-shrink: 0;
}

/* tabs */
.tw { padding: 12px 14px 0; flex-shrink: 0; }
.tb {
  display: flex; gap: 2px;
  background: rgba(0,0,0,.03);
  border-radius: 10px; padding: 3px;
  overflow-x: auto; scrollbar-width: none;
}
.tb::-webkit-scrollbar { display: none; }
.tb-i {
  flex: 1 0 auto; padding: 7px 4px;
  text-align: center; font-size: 10px; font-weight: 500;
  color: var(--text2); cursor: pointer;
  border-radius: 8px; transition: all .2s ease;
  position: relative; white-space: nowrap;
  user-select: none; min-width: 44px;
  letter-spacing: -.01em;
}
.tb-i:hover { color: var(--text); }
.tb-i.act {
  color: var(--text); font-weight: 600;
  background: var(--surface);
  box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}
.tb-b {
  position: absolute; top: 2px; right: 2px;
  font-size: 7px; font-weight: 700;
  background: var(--accent); color: #fff;
  border-radius: 5px; padding: 0 4px;
  line-height: 13px; min-width: 14px; text-align: center;
}

/* tab panel */
.tp { flex: 1; display: none; flex-direction: column; overflow: hidden; }
.tp.act { display: flex; }
.tlb { padding: 8px 14px 4px; flex-shrink: 0; }
.si {
  width: 100%; padding: 8px 12px;
  background: rgba(0,0,0,.03); border: 1px solid transparent;
  border-radius: 10px; color: var(--text);
  font-size: 11px; font-family: var(--font);
  transition: all .2s ease; outline: none;
}
.si:focus { background: var(--surface); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.si::placeholder { color: var(--text3); }

/* item list */
.il { flex: 1; overflow-y: auto; padding: 2px 14px; }
.it {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 9px 10px; margin-bottom: 2px;
  border-radius: 10px; cursor: pointer;
  font-size: 11px; line-height: 1.5;
  border: 1px solid transparent;
  transition: all .15s ease;
}
.it:hover { background: rgba(0,0,0,.02); }
.it.sel { background: var(--accent-soft); border-color: rgba(0,113,227,.1); }
.cb {
  appearance: none; -webkit-appearance: none;
  width: 16px; height: 16px; border-radius: 4px;
  border: 1.5px solid rgba(0,0,0,.16); flex-shrink: 0;
  cursor: pointer; margin-top: 1px;
  transition: all .15s ease; background: var(--surface);
  position: relative;
}
.cb:hover { border-color: var(--accent); }
.cb:checked { background: var(--accent); border-color: var(--accent); }
.cb:checked::after {
  content: ''; position: absolute; left: 4px; top: 1px;
  width: 5px; height: 9px;
  border: solid #fff; border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.it-tx { flex: 1; min-width: 0; word-break: break-word; }
.it-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.it-len { font-size: 9px; color: var(--text3); }
.it-acts { display: flex; gap: 0; opacity: 0; transition: opacity .15s; }
.it:hover .it-acts { opacity: 1; }
.it-acts button {
  background: none; border: none; color: var(--text3);
  cursor: pointer; padding: 2px 4px; border-radius: 4px;
  font-size: 12px; line-height: 1; transition: all .15s;
}
.it-acts button:hover { color: var(--accent); background: var(--accent-soft); }
.it-acts .btn-del:hover { color: var(--accent2); background: rgba(255,55,95,.06); }
.tt { display: inline-block; font-size: 8px; font-weight: 600; padding: 1px 6px; border-radius: 4px; margin-right: 4px; vertical-align: middle; }
.tt-n { background: rgba(0,113,227,.08); color: var(--accent); }
.tt-e { background: rgba(255,149,0,.08); color: #ff9500; }
.emp { text-align: center; color: var(--text3); font-size: 11px; padding: 40px 0; line-height: 1.8; }

/* footer input */
.ft { padding: 6px 14px 12px; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; }
.fr { display: flex; gap: 6px; }
.fr input {
  flex: 1; padding: 8px 12px;
  background: rgba(0,0,0,.03); border: 1px solid transparent;
  border-radius: 10px; color: var(--text);
  font-size: 11px; font-family: var(--font);
  transition: all .2s ease; outline: none;
}
.fr input:focus { background: var(--surface); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.fr input::placeholder { color: var(--text3); }
.fb { font-size: 9px; color: var(--text3); display: flex; justify-content: space-between; padding: 0 2px; }

/* ══════════ Right Panel ══════════ */
.rp {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: var(--bg); position: relative; overflow: hidden;
  padding: 40px; gap: 36px;
}
/* subtle grid */
.rp::before {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(0,0,0,.04) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}

/* ══════════ iPhone 15 Pro Mockup ══════════ */
.phone-wrap { position: relative; flex-shrink: 0; }
.phone {
  width: 296px; height: 600px;
  background: #1b1b1d;
  border-radius: 42px;
  padding: 10px;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.06),
    0 0 0 3px rgba(0,0,0,.15),
    0 8px 32px rgba(0,0,0,.08),
    0 20px 60px rgba(0,0,0,.06),
    inset 0 1px 0 rgba(255,255,255,.05);
  transition: transform .4s cubic-bezier(.25,.1,.25,1);
}
.phone:hover { transform: translateY(-4px); }
.phone-frame {
  width: 100%; height: 100%;
  background: #000;
  border-radius: 34px;
  overflow: hidden;
  position: relative;
}
/* Dynamic Island */
.phone-dyn {
  position: absolute; top: 10px; left: 50%;
  transform: translateX(-50%);
  width: 96px; height: 26px;
  background: #000;
  border-radius: 16px;
  z-index: 10;
}
/* screen */
.phone-scr {
  width: 100%; height: 100%;
  background: #fff;
  border-radius: 34px;
  overflow: hidden;
  display: flex; flex-direction: column;
}
/* status bar */
.sb {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 24px 6px;
  font-size: 12px; font-weight: 600;
  color: #1d1d1f; font-family: var(--font);
  flex-shrink: 0;
}
.sb-r { display: flex; align-items: center; gap: 4px; font-size: 11px; }
/* scroll area */
.ns {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column;
  scroll-behavior: smooth;
}
.ns::-webkit-scrollbar { width: 0; }

/* user header */
.nh { display: flex; align-items: center; gap: 8px; padding: 8px 16px 4px; flex-shrink: 0; }
.nh-ava {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #5856d6, #ff375f);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 11px; font-weight: 700;
}
.nh-info { flex: 1; min-width: 0; line-height: 1.3; }
.nh-nn { font-size: 12px; font-weight: 600; color: #1d1d1f; }
.nh-ts { font-size: 9px; color: #aeaeb2; display: block; font-weight: 400; }
.nh-fw {
  font-size: 10px; font-weight: 600; color: #ff375f;
  border: 1px solid rgba(255,55,95,.25); border-radius: 14px;
  padding: 3px 10px; background: #fff; cursor: default; flex-shrink: 0;
}

/* cover image */
.nc {
  width: 100%; aspect-ratio: 1;
  background: linear-gradient(150deg, #f0edff, #e8e4f8, #eaf0ff, #fdf0f5);
  display: flex; align-items: center; justify-content: center;
  padding: 24px; position: relative; overflow: hidden; flex-shrink: 0;
}
.nc::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(88,86,214,.06), transparent 60%),
              radial-gradient(ellipse at 45% 65%, rgba(255,55,95,.04), transparent 60%);
}
.nc-txt {
  position: relative; font-size: 20px; font-weight: 700;
  color: #fff; text-align: center; line-height: 1.4;
  word-break: break-word;
  text-shadow: 0 2px 16px rgba(0,0,0,.06);
  letter-spacing: -.01em;
}
.nc-txt.ph { font-size: 11px; font-weight: 400; color: rgba(255,255,255,.22); text-shadow: none; }
.nc-dot { position: absolute; bottom: 8px; right: 10px; background: rgba(0,0,0,.12); backdrop-filter: blur(8px); color: #fff; font-size: 8px; padding: 2px 8px; border-radius: 10px; }

/* body */
.nb { padding: 10px 18px 6px; flex-shrink: 0; }
.nb-tt { font-size: 14px; font-weight: 700; color: #1d1d1f; line-height: 1.4; margin-bottom: 4px; word-break: break-word; letter-spacing: -.02em; }
.nb-tt.ph { color: #e8e8ed; font-weight: 400; font-size: 10px; }
.nb-ct { font-size: 11px; color: #3a3a3c; line-height: 1.85; white-space: pre-wrap; word-break: break-word; }
.nb-ct.ph { color: #ededed; }
.nb-tg { color: #4169b8; text-decoration: none; font-size: 11px; margin-right: 2px; display: inline; }
.nb-tg.ev { color: #d4641a; font-weight: 600; }
.nb-loc { padding: 2px 18px 6px; font-size: 9px; color: #aeaeb2; flex-shrink: 0; }
.nb-loc.ph { color: #ededed; }

/* action bar */
.nb-bar {
  display: flex; justify-content: space-around;
  padding: 6px 16px 2px; flex-shrink: 0;
  border-top: 1px solid rgba(0,0,0,.04); margin: 0 18px;
}
.nb-bar-i {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  font-size: 8px; color: #aeaeb2;
  background: none; border: none; cursor: default;
  font-family: var(--font); flex: 1; padding: 3px 0;
}
.nb-bar-i .ni { font-size: 14px; line-height: 1; }

/* comments */
.ncm { padding: 6px 18px 10px; flex-shrink: 0; }
.ncm-i { font-size: 9px; color: #636366; line-height: 1.7; margin-bottom: 1px; }
.ncm-u { font-weight: 600; color: #48484a; margin-right: 2px; }
.ncm.ph { color: #ededed; font-size: 8px; }
.ncm-hint { font-size: 8px; color: #ededed; text-align: center; padding: 2px 0; }

/* ══════════ Copy Cards ══════════ */
.cp-cards {
  display: flex; flex-direction: column; gap: 10px;
  width: 112px; flex-shrink: 0; z-index: 2;
}
.cp-card {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: rgba(255,255,255,.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(0,0,0,.06);
  border-radius: 14px;
  cursor: pointer;
  transition: all .25s cubic-bezier(.25,.1,.25,1);
  font-family: var(--font); text-align: left;
  font-size: 12px; font-weight: 500;
  color: var(--text); letter-spacing: -.01em;
}
.cp-card:hover {
  background: rgba(255,255,255,.95);
  box-shadow: 0 4px 16px rgba(0,0,0,.06);
  transform: translateX(3px);
  border-color: rgba(0,0,0,.1);
}
.cp-card:active { transform: scale(.97); }
.cp-card .cp-ico {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.cp-card .cp-ico.cv { background: rgba(0,113,227,.08); color: var(--accent); }
.cp-card .cp-ico.ttl { background: rgba(255,55,95,.06); color: var(--accent2); }
.cp-card .cp-ico.bdy { background: rgba(255,149,0,.06); color: #ff9500; }
.cp-card .cp-ico.cmt { background: rgba(52,199,89,.06); color: #34c759; }
.cp-card .cp-ico.all { background: linear-gradient(135deg, rgba(0,113,227,.08), rgba(88,86,214,.08)); color: var(--accent); }

/* ══════════ Modal ══════════ */
.mo {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.2); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.mo.hd { display: none; }
.mw {
  background: var(--surface); border: 1px solid rgba(0,0,0,.06);
  border-radius: 20px; width: 400px; max-width: 92vw;
  padding: 28px; box-shadow: 0 24px 80px rgba(0,0,0,.12);
}
.mw h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; letter-spacing: -.02em; }
.mw .hint { font-size: 10px; color: var(--text2); margin-bottom: 12px; }
.mw textarea {
  width: 100%; height: 180px; padding: 12px;
  background: rgba(0,0,0,.02); border: 1px solid rgba(0,0,0,.08);
  border-radius: 12px; color: var(--text);
  font-size: 12px; font-family: var(--font);
  resize: vertical; line-height: 1.6;
  transition: all .2s ease; outline: none;
}
.mw textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.mw textarea::placeholder { color: var(--text3); }
.mwa { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }

/* ══════════ Toast ══════════ */
.ts {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(29,29,31,.9); backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  color: #fff; border-radius: 12px;
  padding: 8px 20px; font-size: 11px; font-weight: 500;
  z-index: 300; pointer-events: none; opacity: 0;
  transition: opacity .3s ease;
  letter-spacing: -.01em;
}
.ts.sh { opacity: 1; }

/* ══════════ Mobile ══════════ */
@media (max-width: 768px) {
  body { height: 100dvh; }
  .hdr { padding: 0 12px; height: 46px; }
  .hl-t { font-size: 13px; }
  .ct { flex-direction: column; }
  .lp { width: 100%; border-right: none; min-width: 0; flex: 1; }
  .lp.mh { display: none; }
  .rp {
    flex: 1; padding: 16px; gap: 16px;
    flex-direction: column; overflow-y: auto;
    align-items: center; justify-content: flex-start;
  }
  .rp.mh { display: none; }
  .rp::before { background-size: 16px 16px; }
  .phone { width: 210px; height: 426px; border-radius: 30px; padding: 7px; }
  .phone-frame { border-radius: 24px; }
  .phone-scr { border-radius: 24px; }
  .phone-dyn { top: 7px; width: 62px; height: 18px; border-radius: 12px; }
  .cp-cards { flex-direction: row; width: 100%; gap: 8px; flex-wrap: wrap; justify-content: center; padding-bottom: 12px; }
  .cp-card { padding: 10px 12px; font-size: 11px; border-radius: 12px; flex: 0 0 auto; min-width: 60px; justify-content: center; }
  .cp-card .cp-ico { width: 24px; height: 24px; font-size: 12px; border-radius: 7px; }
  .nc-txt { font-size: 14px; }
  .nb-tt { font-size: 11px; }
  .nb-ct { font-size: 9px; }
  .nc-txt.ph { font-size: 9px; }
  .nb-tt.ph { font-size: 8px; }
  .nb-ct.ph { font-size: 8px; }
}

/* ══════════ Animation ══════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.phone { animation: fadeUp .6s cubic-bezier(.25,.1,.25,1) both; }
.cp-cards > * { animation: fadeUp .5s cubic-bezier(.25,.1,.25,1) both; }
.cp-cards > *:nth-child(1) { animation-delay: .05s; }
.cp-cards > *:nth-child(2) { animation-delay: .1s; }
.cp-cards > *:nth-child(3) { animation-delay: .15s; }
.cp-cards > *:nth-child(4) { animation-delay: .2s; }
.cp-cards > *:nth-child(5) { animation-delay: .25s; }
</style>
</head>
<body>

<header class="hdr">
  <div class="hl">
    <div class="hl-logo">W</div>
    <span class="hl-t">文案工坊</span>
  </div>
  <div class="hr">
    <div class="hr-chip">已选 <b id="gC">0</b> 条</div>
    <button class="btn btn-gh btn-sm" onclick="randAll()">随机一套</button>
    <button class="btn btn-sm" onclick="exp()">导出</button>
    <button class="btn btn-sm" onclick="$('imF').click()">导入</button>
    <input type="file" id="imF" accept=".json" onchange="imp(this)" style="display:none">
    <button class="btn btn-sm btn-d" onclick="clr()">清空</button>
  </div>
</header>

<div class="ct">
  <!-- Left Panel -->
  <div class="lp" id="lp">
    <div class="tw"><div class="tb" id="tb"></div></div>
    <div class="tp act" id="p-0"><div class="tlb"><input class="si" placeholder="搜索封面文案…" oninput="fl(0,this.value)"></div><div class="il" id="l-0"></div><div class="ft"><div class="fr"><input id="i-0" placeholder="输入封面文案…" onkeydown="if(event.key==='Enter')add(0)"><button class="btn btn-p btn-sm" onclick="add(0)">添加</button><button class="btn btn-sm" onclick="bat(0)">批量</button></div><div class="fb"><span id="s-0"></span><span id="c-0"></span></div></div></div>
    <div class="tp" id="p-1"><div class="tlb"><input class="si" placeholder="搜索标题文案…" oninput="fl(1,this.value)"></div><div class="il" id="l-1"></div><div class="ft"><div class="fr"><input id="i-1" placeholder="输入标题文案…" onkeydown="if(event.key==='Enter')add(1)"><button class="btn btn-p btn-sm" onclick="add(1)">添加</button><button class="btn btn-sm" onclick="bat(1)">批量</button></div><div class="fb"><span id="s-1"></span><span id="c-1"></span></div></div></div>
    <div class="tp" id="p-2"><div class="tlb"><input class="si" placeholder="搜索内容文案…" oninput="fl(2,this.value)"></div><div class="il" id="l-2"></div><div class="ft"><div class="fr"><input id="i-2" placeholder="输入内容文案…" onkeydown="if(event.key==='Enter')add(2)"><button class="btn btn-p btn-sm" onclick="add(2)">添加</button><button class="btn btn-sm" onclick="bat(2)">批量</button></div><div class="fb"><span id="s-2"></span><span id="c-2"></span></div></div></div>
    <div class="tp" id="p-3"><div class="tlb"><input class="si" placeholder="搜索普通话题…" oninput="fl(3,this.value)"></div><div class="il" id="l-3"></div><div class="ft"><div class="fr"><input id="i-3" placeholder="输入普通话题…" onkeydown="if(event.key==='Enter')add(3)"><button class="btn btn-p btn-sm" onclick="add(3)">添加</button><button class="btn btn-sm" onclick="bat(3)">批量</button></div><div class="fb"><span id="s-3"></span><span id="c-3"></span></div></div></div>
    <div class="tp" id="p-4"><div class="tlb"><input class="si" placeholder="搜索活动话题…" oninput="fl(4,this.value)"></div><div class="il" id="l-4"></div><div class="ft"><div class="fr"><input id="i-4" placeholder="输入活动话题…" onkeydown="if(event.key==='Enter')add(4)"><button class="btn btn-p btn-sm" onclick="add(4)">添加</button><button class="btn btn-sm" onclick="bat(4)">批量</button></div><div class="fb"><span id="s-4"></span><span id="c-4"></span></div></div></div>
    <div class="tp" id="p-5"><div class="tlb"><input class="si" placeholder="搜索评论区文案…" oninput="fl(5,this.value)"></div><div class="il" id="l-5"></div><div class="ft"><div class="fr"><input id="i-5" placeholder="输入评论区文案…" onkeydown="if(event.key==='Enter')add(5)"><button class="btn btn-p btn-sm" onclick="add(5)">添加</button><button class="btn btn-sm" onclick="bat(5)">批量</button></div><div class="fb"><span id="s-5"></span><span id="c-5"></span></div></div></div>
  </div>

  <!-- Right Panel -->
  <div class="rp" id="rp">
    <div class="phone-wrap">
      <div class="phone">
        <div class="phone-frame">
          <div class="phone-dyn"></div>
          <div class="phone-scr">
            <div class="sb"><span>9:41</span><div class="sb-r">⋯  ▮▮</div></div>
            <div class="ns">
              <div class="nh">
                <div class="nh-ava">我</div>
                <div class="nh-info"><div class="nh-nn">小红书博主</div><span class="nh-ts">刚刚</span></div>
                <div class="nh-fw">关注</div>
              </div>
              <div class="nc"><div class="nc-txt ph" id="pvCv">点击随机挑选文案</div><div class="nc-dot">1/1</div></div>
              <div class="nb">
                <div class="nb-tt ph" id="pvTt">标题预览区</div>
                <div class="nb-ct ph" id="pvCt">正文内容将在这里显示</div>
              </div>
              <div class="nb-loc ph" id="pvLoc">发布位置</div>
              <div class="nb-bar">
                <div class="nb-bar-i"><span class="ni">♥</span>点赞</div>
                <div class="nb-bar-i"><span class="ni">💬</span>评论</div>
                <div class="nb-bar-i"><span class="ni">☆</span>收藏</div>
                <div class="nb-bar-i"><span class="ni">↗</span>分享</div>
              </div>
              <div class="ncm ph" id="pvCm">评论区文案预览</div>
              <div class="ncm-hint">来聊聊吧</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="cp-cards">
      <button class="cp-card" onclick="cpy('cover')"><span class="cp-ico cv">🖼</span>复制封面</button>
      <button class="cp-card" onclick="cpy('title')"><span class="cp-ico ttl">T</span>复制标题</button>
      <button class="cp-card" onclick="cpy('body')"><span class="cp-ico bdy">📝</span>复制正文</button>
      <button class="cp-card" onclick="cpy('cmts')"><span class="cp-ico cmt">💬</span>复制评论</button>
      <button class="cp-card" onclick="cpyAll()"><span class="cp-ico all">📋</span>复制全部</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="mo hd" id="bm">
  <div class="mw">
    <h3 id="bmT">批量导入</h3>
    <div class="hint">每行一条，空行跳过</div>
    <textarea id="bmTx" placeholder="粘贴文案…"></textarea>
    <div class="mwa"><button class="btn btn-sm" onclick="cb()">取消</button><button class="btn btn-p btn-sm" onclick="dbt()">确认</button></div>
  </div>
</div>

<!-- Toast -->
<div class="ts" id="ts"></div>

<script>
const M=['封面文案','标题文案','内容文案','普通话题','活动话题','评论区文案'];
const SK='xhs_v5';let d={items:[[],[],[],[],[],[]],selected:[[],[],[],[],[],[]]};let f=['','','','','',''];let bi=-1;

function $(s){return document.getElementById(s)}

function ld(){try{const r=localStorage.getItem(SK);if(r){const x=JSON.parse(r);if(x.items)d.items=x.items.slice();if(x.selected)d.selected=x.selected.slice()}}catch(e){}for(let i=0;i<6;i++){if(!Array.isArray(d.items[i]))d.items[i]=[];if(!Array.isArray(d.selected[i]))d.selected[i]=[]}}
function sv(){localStorage.setItem(SK,JSON.stringify(d))}
function es(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function cp(t){navigator.clipboard.writeText(t).then(()=>toast('已复制')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('已复制')})}
function toast(m){const e=$('ts');e.textContent=m;e.classList.add('sh');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('sh'),1400)}

function rn(i){
  const t=f[i],arr=d.items[i],sl=d.selected[i];
  const ct=$('l-'+i),st=$('s-'+i),ch=$('c-'+i);
  const fl=t?arr.map((v,idx)=>({v,idx})).filter(o=>o.v.toLowerCase().includes(t)):arr.map((v,idx)=>({v,idx}));
  if(!arr.length){ct.innerHTML='<div class="emp">暂无文案<br>在下方输入框添加</div>';st.textContent=ch.textContent=''}
  else if(!fl.length){ct.innerHTML='<div class="emp">无匹配结果</div>';st.textContent=ch.textContent=''}
  else{
    ct.innerHTML=fl.map(({v,idx})=>{
      const s=sl.includes(idx);let tt='';
      if(i===3)tt='<span class="tt tt-n">普通</span>';
      if(i===4)tt='<span class="tt tt-e">活动</span>';
      return `<div class="it ${s?'sel':''}" onclick="tg(${i},${idx})">
        <input type="checkbox" class="cb" ${s?'checked':''} onclick="event.stopPropagation();tg(${i},${idx})">
        <div class="it-tx">${tt}${es(v)}</div>
        <div class="it-meta"><span class="it-len">${v.length}字</span>
          <div class="it-acts"><button onclick="cpI(${i},${idx},event)">📋</button><button class="btn-del" onclick="rm(${i},${idx},event)">✕</button></div>
        </div></div>`
    }).join('')
  }
  const tl=arr.length,sl2=sl.length,sc=sl.reduce((s,idx)=>s+(arr[idx]||'').length,0);
  st.textContent=tl?`${tl}条 · 已选${sl2}`:'';ch.textContent=sl2?`总字数${sc}`:''
}

function ua(){up();uh()}
function uh(){const t=d.selected.reduce((s,a)=>s+a.length,0);$('gC').textContent=t}

function up(){
  const g=i=>d.selected[i].map(idx=>d.items[i][idx]);
  const cv=g(0),tl=g(1),ct=g(2),nt=g(3),et=g(4),cm=g(5);
  const eC=$('pvCv');if(cv.length){eC.textContent=cv.join('\n');eC.classList.remove('ph')}else{eC.textContent='封面文案预览';eC.classList.add('ph')}
  const eT=$('pvTt');if(tl.length){eT.textContent=tl.join(' ');eT.classList.remove('ph')}else{eT.textContent='标题预览区';eT.classList.add('ph')}
  const eCt=$('pvCt');
  if(ct.length||nt.length||et.length){
    let h='';if(ct.length)h+=es(ct.join('\n\n'));
    const al=[...nt.map(t=>({t,ty:'n'})),...et.map(t=>({t,ty:'e'}))];
    if(al.length)h+=(ct.length?'\n\n':'')+al.map(o=>`<span class="nb-tg${o.ty==='e'?' ev':''}">#${es(o.t)}</span>`).join(' ');
    eCt.innerHTML=h;eCt.classList.remove('ph')
  }else{eCt.textContent='正文内容将在这里显示';eCt.classList.add('ph')}
  const eL=$('pvLoc');eL.textContent=(cv.length||tl.length||ct.length)?'📍 上海':'发布位置';eL.classList.toggle('ph',!(cv.length||tl.length||ct.length));
  const eCm=$('pvCm');
  if(cm.length){eCm.innerHTML=cm.map((c,k)=>`<div class="ncm-i"><span class="ncm-u">用户${k+1}</span>${es(c)}</div>`).join('');eCm.classList.remove('ph')}
  else{eCm.textContent='评论区文案预览';eCm.classList.add('ph')}
}

function add(i){const v=$('i-'+i).value.trim();if(!v)return;d.items[i].push(v);$('i-'+i).value='';sv();rn(i);ua()}
function tg(i,idx){const p=d.selected[i].indexOf(idx);if(p===-1)d.selected[i].push(idx);else d.selected[i].splice(p,1);sv();rn(i);ua()}
function rm(i,idx,e){e.stopPropagation();e.preventDefault();d.items[i].splice(idx,1);d.selected[i]=d.selected[i].filter(s=>s!==idx).map(s=>s>idx?s-1:s);sv();rn(i);ua()}
function cpI(i,idx,e){e.stopPropagation();e.preventDefault();cp(d.items[i][idx])}
function fl(i,v){f[i]=v.toLowerCase();rn(i)}

function randAll(){
  if(!d.items[0].length&&!d.items[1].length&&!d.items[2].length&&!d.items[3].length&&!d.items[4].length&&!d.items[5].length){toast('请先导入或添加文案');return}
  const pk=(i,cnt)=>{if(!d.items[i].length)return[];const n=Math.min(cnt,d.items[i].length);const po=shuf([...Array(d.items[i].length).keys()]);return po.slice(0,n).sort((a,b)=>a-b)};
  d.selected[0]=pk(0,1);d.selected[1]=pk(1,1);d.selected[2]=pk(2,1);d.selected[3]=pk(3,9);d.selected[4]=pk(4,1);d.selected[5]=pk(5,1);
  sv();for(let i=0;i<6;i++)rn(i);ua();toast('已随机挑选一套文案')
}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function cpyAll(){
  const g=i=>d.selected[i].map(idx=>d.items[i][idx]);
  const p=[];const cv=g(0).join('\n');if(cv)p.push('【封面】\n'+cv);const tl=g(1).join(' ');if(tl)p.push('【标题】\n'+tl);
  const ct=g(2).join('\n\n'),nt=g(3).map(x=>'#'+x).join(' '),et=g(4).map(x=>'#'+x).join(' ');const tags=[nt,et].filter(Boolean).join(' ');
  if(ct||tags)p.push('【正文】\n'+(ct||'')+(ct&&tags?'\n\n':'')+(tags||''));
  const cm=g(5).join('\n');if(cm)p.push('【评论区】\n'+cm);
  if(!p.length){toast('请先选择文案');return}cp(p.join('\n\n'))
}
function cpy(m){
  const g=i=>d.selected[i].map(idx=>d.items[i][idx]);let t='';
  if(m==='cover')t=g(0).join('\n');
  else if(m==='title')t=g(1).join(' ');
  else if(m==='body'){const ct=g(2).join('\n\n'),nt=g(3).map(x=>'#'+x).join(' '),et=g(4).map(x=>'#'+x).join(' ');t=(ct||'')+(ct&&(nt||et)?'\n\n':'')+[nt,et].filter(Boolean).join(' ')}
  else if(m==='cmts')t=g(5).join('\n');
  if(!t){toast('该模块未选择文案');return}cp(t)
}

function bat(i){bi=i;$('bmT').textContent='批量导入 - '+M[i];$('bmTx').value='';$('bm').classList.remove('hd');setTimeout(()=>$('bmTx').focus(),50)}
function cb(){$('bm').classList.add('hd');bi=-1}
function dbt(){const ls=$('bmTx').value.split('\n').map(l=>l.trim()).filter(l=>l);if(!ls.length||bi<0){cb();return}d.items[bi]=d.items[bi].concat(ls);sv();rn(bi);ua();cb()}

function exp(){const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='xhs-bank-'+new Date().toISOString().slice(0,10)+'.json';a.click()}
function imp(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(r.result);if(x.items){for(let i=0;i<6;i++)if(Array.isArray(x.items[i]))d.items[i]=d.items[i].concat(x.items[i])}else if(x.cover||x.title){d.items[0]=d.items[0].concat(x.cover||[]);d.items[1]=d.items[1].concat(x.title||[]);d.items[2]=d.items[2].concat(x.content||[]);d.items[3]=d.items[3].concat(x.topics||[]);d.items[4]=d.items[4].concat(x.activities||[]);d.items[5]=d.items[5].concat(x.comments||[])}if(x.selected)for(let i=0;i<6;i++)if(Array.isArray(x.selected[i]))d.selected[i]=x.selected[i];sv();for(let i=0;i<6;i++)rn(i);ua();toast('导入完成')}catch(e){toast('文件格式错误')}};r.readAsText(f);inp.value=''}
function clr(){if(!confirm('确定清空全部文案？'))return;d={items:[[],[],[],[],[],[]],selected:[[],[],[],[],[],[]]};sv();for(let i=0;i<6;i++)rn(i);ua()}

function sw(i){document.querySelectorAll('.tb-i').forEach((t,idx)=>t.classList.toggle('act',idx===i));document.querySelectorAll('.tp').forEach((p,idx)=>p.classList.toggle('act',idx===i))}

ld();
$('tb').innerHTML=M.map((n,i)=>`<div class="tb-i ${i===0?'act':''}" onclick="sw(${i})">${n}<span class="tb-b" id="bd-${i}">0</span></div>`).join('');
for(let i=0;i<6;i++)rn(i);
ua();
</script>
</body>
</html>
