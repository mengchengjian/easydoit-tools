<style>
*,::before,::after{margin:0;padding:0;box-sizing:border-box}

/* ===== THEME: Apple ===== */
:root,[data-theme="apple"]{
  --bg:oklch(97% 0.003 60);--bg2:oklch(93% 0.006 60);--bg3:oklch(88% 0.01 60);
  --bdr:oklch(0% 0 0 / 0.06);--bdr2:oklch(0% 0 0 / 0.10);
  --tx1:oklch(18% 0.01 60);--tx2:oklch(40% 0.01 60);
  --tx3:oklch(65% 0.005 60);--tx4:oklch(82% 0.005 60);
  --accent:oklch(52% 0.18 250);--accent-bg:oklch(52% 0.18 250 / 0.08);--accent-bdr:oklch(52% 0.18 250 / 0.18);
  --red:oklch(50% 0.18 25);--red-bg:oklch(50% 0.18 25 / 0.07);
  --h-color:oklch(12% 0.01 60);--strong-color:oklch(15% 0.01 60);
  --svg-ico:oklch(45% 0.06 250);--overlay:oklch(0% 0 0 / 0.2);
  --shadow:oklch(0% 0 0 / 0.08);--shadow-sm:oklch(0% 0 0 / 0.05);
  --btn-hover:oklch(0% 0 0 / 0.04);--btn-active:oklch(0% 0 0 / 0.07);
  --item-hover:oklch(0% 0 0 / 0.03);--table-stripe:oklch(0% 0 0 / 0.015);
  --scroll-thumb:oklch(0% 0 0 / 0.08);--scroll-thumb-hover:oklch(0% 0 0 / 0.15);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC",sans-serif;
  --mono:"SF Mono","Cascadia Code","JetBrains Mono","Fira Code","Consolas",monospace;
  --r4:8px;--r6:10px;--r8:12px;--r12:16px;--fw-title:600;--fw-btn:500;color-scheme:light;
  --is-dark:0;
}

/* ===== THEME: Obsidian ===== */
[data-theme="obsidian"]{
  --bg:oklch(13% 0.008 285);--bg2:oklch(17% 0.008 285);--bg3:oklch(22% 0.01 285);
  --bdr:oklch(100% 0 0 / 0.06);--bdr2:oklch(100% 0 0 / 0.10);
  --tx1:oklch(92% 0 0);--tx2:oklch(72% 0.005 285);--tx3:oklch(52% 0.005 285);--tx4:oklch(35% 0.005 285);
  --accent:oklch(65% 0.13 280);--accent-bg:oklch(65% 0.13 280 / 0.10);--accent-bdr:oklch(65% 0.13 280 / 0.18);
  --red:oklch(55% 0.16 20);--red-bg:oklch(55% 0.16 20 / 0.10);
  --h-color:oklch(95% 0 0);--strong-color:oklch(95% 0 0);
  --svg-ico:oklch(65% 0.06 280);--overlay:oklch(0% 0 0 / 0.5);
  --shadow:oklch(0% 0 0 / 0);--shadow-sm:oklch(0% 0 0 / 0);
  --btn-hover:oklch(100% 0 0 / 0.04);--btn-active:oklch(100% 0 0 / 0.08);
  --item-hover:oklch(100% 0 0 / 0.03);--table-stripe:oklch(100% 0 0 / 0.015);
  --scroll-thumb:oklch(100% 0 0 / 0.06);--scroll-thumb-hover:oklch(100% 0 0 / 0.12);
  --font:-apple-system,BlinkMacSystemFont,"Inter","PingFang SC",sans-serif;
  --mono:"JetBrains Mono","SF Mono","Cascadia Code","Fira Code",monospace;
  --r4:6px;--r6:8px;--r8:10px;--r12:12px;--fw-title:600;--fw-btn:500;color-scheme:dark;
  --is-dark:1;
}

/* ===== THEME: Linear ===== */
[data-theme="linear"]{
  --bg:oklch(12% 0.006 240);--bg2:oklch(16% 0.008 240);--bg3:oklch(22% 0.01 240);
  --bdr:oklch(100% 0 0 / 0.04);--bdr2:oklch(100% 0 0 / 0.06);
  --tx1:oklch(94% 0 0);--tx2:oklch(72% 0.003 240);--tx3:oklch(48% 0.003 240);--tx4:oklch(30% 0.003 240);
  --accent:oklch(72% 0.16 210);--accent-bg:oklch(72% 0.16 210 / 0.10);--accent-bdr:oklch(72% 0.16 210 / 0.18);
  --red:oklch(58% 0.16 20);--red-bg:oklch(58% 0.16 20 / 0.10);
  --h-color:oklch(96% 0 0);--strong-color:oklch(96% 0 0);
  --svg-ico:oklch(72% 0.08 210);--overlay:oklch(0% 0 0 / 0.55);
  --shadow:oklch(0% 0 0 / 0);--shadow-sm:oklch(0% 0 0 / 0);
  --btn-hover:oklch(100% 0 0 / 0.05);--btn-active:oklch(100% 0 0 / 0.10);
  --item-hover:oklch(100% 0 0 / 0.04);--table-stripe:oklch(100% 0 0 / 0.02);
  --scroll-thumb:oklch(100% 0 0 / 0.05);--scroll-thumb-hover:oklch(100% 0 0 / 0.10);
  --font:-apple-system,BlinkMacSystemFont,"Inter","PingFang SC",sans-serif;
  --mono:"JetBrains Mono","SF Mono","Cascadia Code","Fira Code",monospace;
  --r4:6px;--r6:8px;--r8:10px;--r12:14px;--fw-title:550;--fw-btn:500;color-scheme:dark;
  --is-dark:1;
}

/* ===== THEME: VSCode ===== */
[data-theme="vscode"]{
  --bg:oklch(14% 0.004 220);--bg2:oklch(17% 0.004 220);--bg3:oklch(21% 0.006 220);
  --bdr:oklch(100% 0 0 / 0.04);--bdr2:oklch(100% 0 0 / 0.08);
  --tx1:oklch(88% 0 0);--tx2:oklch(68% 0.003 220);--tx3:oklch(48% 0.003 220);--tx4:oklch(32% 0.003 220);
  --accent:oklch(65% 0.16 150);--accent-bg:oklch(65% 0.16 150 / 0.08);--accent-bdr:oklch(65% 0.16 150 / 0.15);
  --red:oklch(55% 0.16 25);--red-bg:oklch(55% 0.16 25 / 0.10);
  --h-color:oklch(92% 0 0);--strong-color:oklch(92% 0 0);
  --svg-ico:oklch(58% 0.06 150);--overlay:oklch(0% 0 0 / 0.5);
  --shadow:oklch(0% 0 0 / 0);--shadow-sm:oklch(0% 0 0 / 0);
  --btn-hover:oklch(100% 0 0 / 0.04);--btn-active:oklch(100% 0 0 / 0.08);
  --item-hover:oklch(100% 0 0 / 0.03);--table-stripe:oklch(100% 0 0 / 0.015);
  --scroll-thumb:oklch(100% 0 0 / 0.05);--scroll-thumb-hover:oklch(100% 0 0 / 0.10);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;
  --mono:"Cascadia Code","JetBrains Mono","SF Mono","Fira Code",monospace;
  --r4:2px;--r6:3px;--r8:4px;--r12:6px;--fw-title:600;--fw-btn:500;color-scheme:dark;
  --is-dark:1;
}

[data-theme="apple"] .navbar-glass{
  background:oklch(93% 0.006 60 / 0.75);
  border-bottom:0.5px solid oklch(0% 0 0 / 0.08);
}
[data-theme="linear"] .navbar-glass{backdrop-filter:blur(24px) saturate(120%);-webkit-backdrop-filter:blur(24px) saturate(120%)}
[data-theme="linear"] .navbar-glass{border-bottom-width:0.5px}

html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--tx1);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
::selection{background:var(--accent-bg);color:var(--accent)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-hover)}

/* ===== Glass Navbar ===== */
.navbar-glass{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  height:44px;padding:0 16px;flex-shrink:0;
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--bdr);
}
.nav-l{display:flex;align-items:center;gap:0}
.nav-logo{font-weight:700;font-size:16px;color:var(--accent);letter-spacing:0.5px}
.nav-divider{color:var(--tx3);margin:0 10px;font-weight:300}
.nav-title{font-size:13px;color:var(--tx2)}
.nav-r{display:flex;align-items:center;gap:6px}
.nav-sel{height:28px;padding:0 8px;border-radius:var(--r6);font-size:11px;font-family:var(--font);color:var(--tx2);background:transparent;border:1px solid var(--bdr);cursor:pointer;outline:none;transition:all .15s}
.nav-sel:hover{border-color:var(--bdr2)}
.nav-sel:focus{border-color:var(--accent-bdr)}

/* ===== Buttons ===== */
.btn{height:28px;padding:0 9px;border-radius:var(--r6);font-size:11.5px;font-family:var(--font);color:var(--tx2);background:transparent;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;display:inline-flex;align-items:center;gap:3px;letter-spacing:0.1px;font-weight:var(--fw-btn)}
.btn:hover{background:var(--btn-hover);color:var(--tx1)}
.btn:active{background:var(--btn-active)}
.btn.primary{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bdr);font-weight:500}
.btn.primary:hover{background:color-mix(in srgb,var(--accent-bg) 100%,var(--tx1) 8%)}
.btn-sm{height:24px;padding:0 8px;font-size:11px;border-radius:var(--r4)}
.btn-xs{height:20px;padding:0 6px;font-size:10px;border-radius:var(--r4)}
.sep-v{width:1px;height:14px;background:var(--bdr);margin:0 2px}

/* ===== Main Layout ===== */
.main{display:flex;flex:1;overflow:hidden;min-height:0}

/* ===== Panel ===== */
.panel{display:flex;flex-direction:column;min-width:200px;overflow:hidden;flex:1;min-height:0}
.panel-hd{height:32px;padding:0 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bdr)}
.panel-label{font-size:12px;color:var(--tx1);font-weight:600;letter-spacing:0.2px}
.panel-actions{display:flex;align-items:center;gap:3px}
.panel-body{flex:1;overflow:hidden;position:relative}

/* ===== Left: Editor ===== */
/* ===== Editor Container ===== */
.editor-wrap{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column}
.editor-wrap .CodeMirror{height:100%!important;font-family:var(--mono);font-size:14px;line-height:1.6}
.editor-wrap .CodeMirror-scroll{min-height:100%}
#editorContainer{flex:1;overflow:hidden;min-height:0;position:relative}
.editor-wrap .CodeMirror-gutters{background:var(--bg2);border-right:1px solid var(--bdr)}
.editor-wrap .CodeMirror-linenumbers{color:var(--tx3)}
.editor-wrap .CodeMirror-activeline-background{background:var(--bg3)}
.editor-wrap .CodeMirror-cursor{border-left-color:var(--accent)}
.editor-wrap .CodeMirror-selected{background:var(--accent-bg)!important}
.editor-wrap .CodeMirror-matchingbracket{background:var(--accent-bg);outline:1px solid var(--accent)}
.editor-wrap .CodeMirror-vscrollbar::-webkit-scrollbar{width:6px}
.editor-wrap .CodeMirror-vscrollbar::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}
.editor-wrap .CodeMirror-vscrollbar::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-hover)}

/* ===== Right: Preview ===== */
.view-toggle{display:flex;align-items:center;gap:1px;border:1px solid var(--bdr);border-radius:var(--r6);overflow:hidden}
.view-toggle button{height:22px;padding:0 8px;font-size:10.5px;font-family:var(--font);color:var(--tx3);background:transparent;border:none;cursor:pointer;transition:all .15s}
.view-toggle button:hover{color:var(--tx1)}
.view-toggle button.active{background:var(--bg);color:var(--accent);box-shadow:var(--shadow-sm);font-weight:500}

.preview-body{flex:1;overflow:auto;position:relative;min-height:0}
/* visible scrollbar */
.preview-body::-webkit-scrollbar{width:6px;height:6px}
.preview-body::-webkit-scrollbar-track{background:transparent}
.preview-body::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}
.preview-body::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-hover)}
.preview-body::-webkit-scrollbar-corner{background:transparent}
.preview-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--tx3);font-size:14px;font-family:var(--font)}

/* ===== Tree View ===== */
.json-tree{font-family:var(--mono);font-size:13px;line-height:1.9;padding:16px 0;overflow-x:auto;overflow-y:auto}
.json-tree::-webkit-scrollbar{width:6px;height:6px}
.json-tree::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}
.json-tree::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-hover)}
.jnode{position:relative;display:flex;align-items:baseline;padding-right:16px;border-radius:0 var(--r4) var(--r4) 0;margin:1px 0;cursor:default;transition:background .12s}
.jnode:hover{background:var(--item-hover)}
.jnode::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:var(--bdr);opacity:0;transition:opacity .15s}
.jnode:hover::before{opacity:1}
.jtoggle{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;margin-right:4px;flex-shrink:0;color:var(--tx3);font-size:10px;cursor:pointer;border-radius:var(--r4);transition:transform .18s cubic-bezier(.16,1,.3,1),color .12s,background .12s;user-select:none}
.jtoggle:hover{color:var(--accent);background:var(--accent-bg)}
.jtoggle.collapsed{transform:rotate(-90deg)}
.jtoggle.leaf{visibility:hidden}
.jkey{color:oklch(50% 0.18 310);margin-right:4px;flex-shrink:0}
.jval{word-break:break-all}
.jv-str{color:oklch(60% 0.14 145)}
.jv-num{color:oklch(65% 0.16 250)}
.jv-bool{color:oklch(60% 0.12 45)}
.jv-null{color:oklch(55% 0.12 300)}
.jv-brace{color:var(--tx3)}
.jv-str.truncated{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:bottom}
.jv-str.truncated:hover{max-width:none;white-space:normal;background:var(--bg2);border-radius:var(--r4);padding:2px 6px;position:relative;z-index:2}
.jbadge{display:inline-block;font-size:10px;color:var(--tx3);background:var(--bg2);border-radius:var(--r4);padding:0 6px;margin-left:8px;line-height:18px;flex-shrink:0;font-family:var(--font);opacity:0;transition:opacity .15s}
.jnode:hover .jbadge{opacity:1}
.jcomma{color:var(--tx2);margin-right:4px}
.json-empty{color:var(--tx3);font-size:14px;font-family:var(--font);text-align:center;padding:60px 20px}
.json-children{margin-left:0;min-width:0}
.json-children.folded{display:none}
.json-node.root>.json-children{margin-left:0}


/* ===== Text View ===== */
.text-view{font-family:var(--mono);font-size:13px;line-height:1.8;tab-size:2;white-space:pre-wrap;word-break:break-all;padding:16px 20px;color:var(--tx1);overflow:auto}
.text-view::-webkit-scrollbar{width:6px;height:6px}
.text-view::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px}
.text-view::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-hover)}
.jh-key{color:oklch(50% 0.18 310)}
.jh-str{color:oklch(60% 0.14 145)}
.jh-num{color:oklch(65% 0.16 250)}
.jh-bool{color:oklch(60% 0.12 45)}
.jh-null{color:oklch(55% 0.12 300)}
.text-actions{position:absolute;top:4px;right:8px;opacity:0;transition:opacity .15s;display:flex;gap:3px}
.preview-body:hover .text-actions{opacity:1}

/* ===== Splitter ===== */
.splitter{width:4px;cursor:col-resize;flex-shrink:0;background:transparent;transition:background .15s,width .15s;position:relative;z-index:10}
.splitter:hover,.splitter.active{background:var(--accent);width:6px}

/* ===== Status Bar ===== */
.st{height:24px;padding:0 14px;background:var(--bg2);border-top:1px solid var(--bdr);display:flex;align-items:center;gap:20px;font-size:10.5px;color:var(--tx3);flex-shrink:0}
.st b{font-weight:500;color:var(--tx2)}
.st-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.st-dot.valid{background:oklch(60% 0.16 145)}
.st-dot.invalid{background:var(--red)}
.st-dot.empty{background:var(--tx3)}
.st-left{display:flex;align-items:center;gap:6px}
.st-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.st-fix{color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:2px;font-size:10px;margin-left:4px}
.st-fix:hover{color:var(--tx1)}

/* ===== Toggle Switch ===== */
.toggle-wrap{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--tx3)}
.toggle{position:relative;width:28px;height:16px;flex-shrink:0}
.toggle input{display:none}
.toggle .slider{position:absolute;inset:0;background:var(--bg3);border-radius:10px;cursor:pointer;transition:all .2s;border:1px solid var(--bdr)}
.toggle .slider::after{content:'';position:absolute;width:12px;height:12px;left:1px;top:1px;background:var(--tx3);border-radius:50%;transition:all .2s}
.toggle input:checked+.slider{background:var(--accent);border-color:var(--accent)}
.toggle input:checked+.slider::after{left:13px;background:#fff}

/* ===== Example Dropdown ===== */
.dropdown{position:relative}
.dropdown-menu{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r8);box-shadow:0 8px 24px var(--shadow);z-index:60;min-width:140px;padding:4px;overflow:hidden}
.dropdown-menu.show{display:block}
.dropdown-menu button{display:block;width:100%;padding:7px 12px;border:none;background:transparent;color:var(--tx2);font-size:12px;font-family:var(--font);cursor:pointer;text-align:left;border-radius:var(--r4);transition:all .1s}
.dropdown-menu button:hover{background:var(--item-hover);color:var(--tx1)}

/* ===== Toast ===== */
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--tx1);padding:8px 18px;border-radius:20px;font-size:12px;font-family:var(--font);box-shadow:0 4px 16px var(--shadow);z-index:100;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;border:1px solid var(--bdr)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

/* ===== Responsive ===== */
@media (max-width:767px){
  .main{flex-direction:column}
  .splitter{width:100%;height:4px;cursor:row-resize}
  .splitter:hover,.splitter.active{width:100%;height:6px}
  .panel{min-width:0;min-height:150px}
  .nav-title{display:none}
  .btn .btn-text{display:none}
  .panel-label{font-size:11px}
}
</style>

<body>

<!-- Glass Navbar -->
<nav class="navbar-glass">
  <div class="nav-l">
    <span class="nav-logo">JSON</span>
    <span class="nav-divider">|</span>
    <span class="nav-title">JSON 格式化工具</span>
  </div>
  <div class="nav-r">
    <div class="dropdown" id="exampleDropdown">
      <button class="btn btn-sm" id="btn-example" title="加载示例 JSON">示例</button>
      <div class="dropdown-menu" id="exampleMenu"></div>
    </div>
    <select class="nav-sel" id="themeSelect">
      <option value="apple">Apple</option>
      <option value="obsidian">Obsidian</option>

      <option value="vscode">VSCode</option>
    </select>

</nav>

<!-- Main -->
<div class="main" id="mainWrap">
  <!-- Left: Editor -->
  <div class="panel" id="leftPanel">
    <div class="panel-hd">

<script>
// ===== DOM refs =====
const $ = id => document.getElementById(id);

// ===== CodeMirror 5 Init =====

ta.id = 'cm-textarea';

  autoCloseBrackets: true,

// ===== Debounced Handler =====
function handleDocChange(){

}

// ===== Auto Save =====
function triggerAutoSave(){
  if(!autoSaveToggle.checked) return;
  clearTimeout(autoSaveTimer);
  const interval = parseInt(autoSaveInterval.value) || 30000;
  autoSaveTimer = setTimeout(() => {
    try { localStorage.setItem(LS_KEY, getDocText()); } catch(e) {}
    toast('已自动保存。');
  }, interval);
}

autoSaveToggle.addEventListener('change', () => {
  autoSaveInterval.style.display = autoSaveToggle.checked ? 'inline-block' : 'none';
  if(autoSaveToggle.checked){
    try { localStorage.setItem(LS_AUTOSAVE, '1'); } catch(e) {}
    triggerAutoSave();
  } else {
    clearTimeout(autoSaveTimer);
    try { localStorage.removeItem(LS_AUTOSAVE); } catch(e) {}
  }
});

autoSaveInterval.addEventListener('change', () => {
  try { localStorage.setItem(LS_INTERVAL, autoSaveInterval.value); } catch(e) {}
  triggerAutoSave();
});

// Restore auto-save settings
try {
  if(localStorage.getItem(LS_AUTOSAVE) === '1'){
    autoSaveToggle.checked = true;
    autoSaveInterval.style.display = 'inline-block';
    const savedInterval = localStorage.getItem(LS_INTERVAL);
    if(savedInterval) autoSaveInterval.value = savedInterval;
  }
} catch(e) {}

// Save on unload
window.addEventListener('beforeunload', () => {

// ===== Toast =====
function toast(msg){
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, 2000);
}

// ===== Status Bar =====
function setStatus(state, msg, fixable){
  stDot.className = 'st-dot ' + state;
  stMsg.textContent = msg;
  stFix.style.display = fixable ? 'inline' : 'none';
}

function updateStats(text, data){
  stChars.textContent = (text ? text.length : 0) + ' 字符';
  if(data !== null && data !== undefined){
    stKeys.textContent = totalKeys + ' 键';
    stDepth.textContent = '深度 ' + maxDepth;
  } else {
    stKeys.textContent = '0 键';
    stDepth.textContent = '深度 0';
  }
}

// ===== Count Metrics =====
function countMetrics(data){
  let keys = 0;
  let depth = 0;
  function walk(v, d){
    if(d > depth) depth = d;
    if(v && typeof v === 'object'){
      if(Array.isArray(v)){
        for(let i = 0; i < v.length; i++) walk(v[i], d + 1);
      } else {
        const ks = Object.keys(v);
        keys += ks.length;
        for(let i = 0; i < ks.length; i++) walk(v[ks[i]], d + 1);
      }
    }
  }
  if(data !== null && data !== undefined) walk(data, 0);
  totalKeys = keys;
  maxDepth = depth;
}

// ===== Update Preview =====
function updatePreview(text){
  const trimmed = text.trim();
  hideFix();

  if(!trimmed){
    parsedData = null;
    totalKeys = 0; maxDepth = 0;
    setStatus('empty', '等待输入', false);
    updateStats('', null);
    showEmpty();
    return;
  }

  try{
    parsedData = JSON.parse(trimmed);
    setStatus('valid', '语法有效', false);
    updateStats(text, parsedData);
    countMetrics(parsedData);

    if(currentView === 'tree') renderTree();
    else renderText();
  } catch(e){
    parsedData = null;
    setStatus('invalid', '语法错误：' + e.message, true);
    updateStats(text, null);
    showEmpty();
  }
}

function hideFix(){ stFix.style.display = 'none'; }

function showEmpty(){

}

// ===== Tree Render =====
function copyToClipboard(text){
  navigator.clipboard.writeText(text).then(() => {}).catch(() => {});
}

function formatValue(val, type){
  if(type === 'string') return '"' + val + '"';
  if(type === 'number') return String(val);
  if(type === 'boolean') return String(val);
  if(type === 'null') return 'null';
  return '';
}

function buildPath(prefix, key, isArray){
  if(prefix === '$') return isArray ? '$[' + key + ']' : '$.' + key;
  return isArray ? prefix + '[' + key + ']' : prefix + '.' + key;
}

function renderNode(key, val, path, depth, parent){
  const node = document.createElement('div');
  node.className = 'jnode';
  node.style.paddingLeft = (depth * 20) + 'px';
  node.setAttribute('data-path', path);

  const type = val === null ? 'null' : Array.isArray(val) ? 'array' : typeof val;
  const isContainer = type === 'object' || type === 'array';

  // Toggle
  const toggle = document.createElement('span');
  toggle.className = 'jtoggle' + (isContainer ? '' : ' leaf');
  toggle.textContent = '▾';
  if(isContainer){
    toggle.addEventListener('click', e => {
      e.stopPropagation();
      toggle.classList.toggle('collapsed');
      const children = node.nextElementSibling;
      if(children && children.classList.contains('json-children')){
        children.classList.toggle('folded');
      }
    });
  }
  node.appendChild(toggle);

  // Key
  if(key !== null && key !== undefined){
    const keySpan = document.createElement('span');
    keySpan.className = 'jkey';
    keySpan.textContent = '"' + key + '":';
    node.appendChild(keySpan);
  }

  // Value or bracket
  if(!isContainer){
    const valSpan = document.createElement('span');
    const typeClassMap = {string:'jv-str', number:'jv-num', boolean:'jv-bool', null:'jv-null'};
    const typeClass = typeClassMap[type];
    valSpan.className = 'jval ' + typeClass;
    const fullStr = formatValue(val, type);
    if(type === 'string' && fullStr.length > 90){
      valSpan.classList.add('truncated');
    }
    valSpan.textContent = fullStr;
    node.appendChild(valSpan);
  } else {
    const bracket = document.createElement('span');
    bracket.className = 'jval jv-brace';
    bracket.textContent = type === 'array' ? '[' : '{';
    node.appendChild(bracket);

    // Badge
    const badge = document.createElement('span');
    badge.className = 'jbadge';
    const len = type === 'array' ? val.length : Object.keys(val).length;
    badge.textContent = len + ' ' + (type === 'array' ? 'items' : 'keys');
    node.appendChild(badge);
  }

  // Click to copy path
  node.addEventListener('click', e => {
    if(e.target.closest('.jtoggle')) return;
    copyToClipboard(path);
    toast('路径已复制');
  });
  node.title = key !== null && key !== undefined
    ? (path + ': ' + (isContainer ? (type + ', ' + (type==='array'?val.length:Object.keys(val).length) + ' items') : formatValue(val, type)))
    : path;

  parent.appendChild(node);

  // Children
  if(isContainer){
    const children = document.createElement('div');
    children.className = 'json-children';
    if(type === 'array'){
      for(let i = 0; i < val.length; i++){
        renderNode(i, val[i], buildPath(path, i, true), depth + 1, children);
      }
      // Closing bracket row
      const closeRow = document.createElement('div');
      closeRow.className = 'jnode';
      closeRow.style.paddingLeft = (depth * 20) + 'px';
      const cb = document.createElement('span');
      cb.className = 'jval jv-brace';
      cb.textContent = ']';
      closeRow.appendChild(cb);
      children.appendChild(closeRow);
    } else {
      const keys = Object.keys(val);
      for(let i = 0; i < keys.length; i++){
        renderNode(keys[i], val[keys[i]], buildPath(path, keys[i], false), depth + 1, children);
      }
      // Closing brace row
      const closeRow = document.createElement('div');
      closeRow.className = 'jnode';
      closeRow.style.paddingLeft = (depth * 20) + 'px';
      const cb = document.createElement('span');
      cb.className = 'jval jv-brace';
      cb.textContent = '}';
      closeRow.appendChild(cb);
      children.appendChild(closeRow);
    }
    parent.appendChild(children);
  }
}
function renderTree(){
  previewEmpty.style.display = 'none';
  jsonTree.style.display = 'block';
  textPreview.style.display = 'none';
  textActions.style.display = 'none';
  jsonTree.innerHTML = '';

  if(parsedData === null || parsedData === undefined){
    previewEmpty.style.display = 'flex';
    return;
  }

  renderNode(null, parsedData, '$', 1, jsonTree);
  const root = jsonTree.firstElementChild;
  if(root) root.classList.add('root');
}

// ===== Text Render =====
function syntaxHighlightJSON(json){
  if(typeof json !== 'string') json = JSON.stringify(json, null, 2);
  return json.replace(
    /("(?:\\.|[^"\\])*")\s*(:)|(\b(?:true|false|null)\b)|(-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)/g,
    (match, str, colon, boolNull, num) => {
      if(colon) return '<span class="jh-key">' + str + '</span>' + colon;
      if(boolNull) return '<span class="' + (boolNull === 'null' ? 'jh-null' : 'jh-bool') + '">' + boolNull + '</span>';
      if(num) return '<span class="jh-num">' + num + '</span>';
      if(str) return '<span class="jh-str">' + str + '</span>';
      return match;
    }
  );
}

function renderText(){
  previewEmpty.style.display = 'none';
  jsonTree.style.display = 'none';
  textPreview.style.display = 'block';
  textActions.style.display = 'flex';

  if(parsedData === null || parsedData === undefined){
    previewEmpty.style.display = 'flex';
    textPreview.style.display = 'none';
    textActions.style.display = 'none';
    return;
  }

  const raw = JSON.stringify(parsedData, null, 2);
  const highlighted = syntaxHighlightJSON(raw);
  textPreview.innerHTML = highlighted;
}

        return sorted;

// ===== Auto-Fix =====
stFix.addEventListener('click', () => {
  let text = getDocText().trim();
  if(!text) return;
  let fixed = false;

  // Count brackets
  const openCurly = (text.match(/\{/g)||[]).length;
  const closeCurly = (text.match(/\}/g)||[]).length;
  const openSquare = (text.match(/\[/g)||[]).length;
  const closeSquare = (text.match(/\]/g)||[]).length;

  // Try removing trailing comma
  if(/,(\s*[}\]])/.test(text)){
    text = text.replace(/,(\s*[}\]])/g, '$1');
    fixed = true;
  }

  // Try closing missing brackets
  if(closeCurly < openCurly){
    text += '\n' + '}'.repeat(openCurly - closeCurly);
    fixed = true;
  }
  if(closeSquare < openSquare){
    text += '\n' + ']'.repeat(openSquare - closeSquare);
    fixed = true;
  }

  // Try quoting unquoted keys (simple heuristic)
  const unquotedKey = /(^|\n)\s*([a-zA-Z_$][\w$]*)\s*:/gm;
  let unquotedFixed = false;
  text = text.replace(unquotedKey, (m, prefix, key) => {
    unquotedFixed = true;
    return prefix + '"' + key + '":';
  });
  if(unquotedFixed) fixed = true;

  if(!fixed){
    toast('未找到可自动修复的问题。');
    return;
  }

  setDocText(text);
  try{
    JSON.parse(text.trim());
    toast('已自动修复，JSON 语法正确。');
  } catch(e){
    toast('已尝试修复，但仍有语法错误。');
  }
});

  btn.textContent = name;
  btn.addEventListener('click', () => loadExample(name));
  exampleMenu.appendChild(btn);
});

$('btn-example').addEventListener('click', e => {
  e.stopPropagation();
  exampleMenu.classList.toggle('show');
});

document.addEventListener('click', e => {
  if(!e.target.closest('#exampleDropdown')){
    exampleMenu.classList.remove('show');
  }
});

// ===== Splitter Drag =====
let dragging = false, startX = 0, startY = 0, startW = 0, startH = 0;
function isMobile(){ return window.innerWidth < 768; }

splitter.addEventListener('mousedown', e => {
  e.preventDefault();
  dragging = true;
  splitter.classList.add('active');
  document.body.style.userSelect = 'none';
  document.body.style.cursor = isMobile() ? 'row-resize' : 'col-resize';
  if(isMobile()){
    startY = e.clientY;
    startH = leftPanel.getBoundingClientRect().height;
  } else {
    startX = e.clientX;
    startW = leftPanel.getBoundingClientRect().width;
  }
});

document.addEventListener('mousemove', e => {
  if(!dragging) return;
  const mainRect = mainWrap.getBoundingClientRect();
  if(isMobile()){
    const dy = e.clientY - startY;
    const h = Math.max(150, Math.min(mainRect.height - 156, startH + dy));
    leftPanel.style.flex = 'none';
    leftPanel.style.height = h + 'px';
    rightPanel.style.flex = '1';
  } else {
    const dx = e.clientX - startX;
    const tw = mainRect.width - 4;
    const w = Math.max(200, Math.min(tw - 204, startW + dx));
    leftPanel.style.flex = 'none';
    leftPanel.style.width = w + 'px';
    rightPanel.style.flex = '1';
  }
});

document.addEventListener('mouseup', () => {
  if(!dragging) return;
  dragging = false;
  splitter.classList.remove('active');
  document.body.style.userSelect = '';
  document.body.style.cursor = '';
});

window.addEventListener('resize', () => {
  if(!isMobile()){
    leftPanel.style.height = '';
    leftPanel.style.width = '';
    leftPanel.style.flex = '1';
    rightPanel.style.flex = '1';
  }
});

// ===== Init =====
if(initialText){
  updatePreview(initialText);
  if(currentView === 'tree') renderTree();
  else if(currentView === 'text') renderText();
}

// Load example if empty and no param
if(!initialText.trim() && !jsonParam){
  loadExample('关于本站');
}
</script>
