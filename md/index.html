<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor — EasyDoIt</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
*,::before,::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1b1e;--surface:#232428;--surface2:#2a2b30;--border:#35363b;--border-h:#4a4b50;
  --text:#e4e4e7;--text-s:#9a9ba0;--text-xs:#65666b;
  --accent:#60a5fa;--accent-l:#93bbfd;--accent-soft:rgba(96,165,250,.1);
  --accent2:#f472b6;--warn:#fbbf24;--warn-soft:rgba(251,191,36,.1);
  --shadow:0 2px 8px rgba(0,0,0,.25);--shadow-lg:0 4px 24px rgba(0,0,0,.3);
  --radius-sm:6px;--radius:10px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
  --mono:"SF Mono","JetBrains Mono","Fira Code","Cascadia Code",monospace;
  --transition:.15s cubic-bezier(.4,0,.2,1);
}

body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent-soft);color:var(--accent)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:10px}

/* === Header === */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);height:42px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:30;gap:6px}
.hl{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hl-logo{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;font-family:var(--mono)}
.hl-t{font-size:13px;font-weight:700;letter-spacing:-.2px;white-space:nowrap}
.hl-t span{color:var(--text-s);font-weight:400}

.hm{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none;flex:1;justify-content:center}
.hm::-webkit-scrollbar{display:none}
.btn{padding:4px 8px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text-s);cursor:pointer;font-size:10px;font-family:var(--font);font-weight:500;transition:var(--transition);white-space:nowrap;display:inline-flex;align-items:center;gap:2px;line-height:1.5}
.btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border-h)}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.btn-p:hover{background:var(--accent-l);border-color:var(--accent-l);color:#fff}
.btn-s{font-size:10px;padding:3px 7px}
.hr{display:flex;align-items:center;gap:4px;flex-shrink:0}

/* === Mobile tabs === */
.mb{display:none;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.mb-t{flex:1;padding:9px;text-align:center;font-size:11px;font-weight:500;color:var(--text-s);cursor:pointer;border-bottom:2px solid transparent;transition:var(--transition)}
.mb-t.act{color:var(--accent);border-bottom-color:var(--accent)}

/* === Main content === */
.ct{display:flex;flex:1;overflow:hidden}

/* === Sidebar (file tree) === */
.sb{width:220px;min-width:50px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .2s}
.sb.collapsed{width:0;min-width:0;border-right:none}
.sb-header{height:34px;padding:0 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;gap:4px}
.sb-header-t{font-size:10px;font-weight:600;color:var(--text-s);text-transform:uppercase;letter-spacing:.5px}
.sb-header-acts{display:flex;gap:2px}
.sb-header-acts button{padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text-xs);cursor:pointer;font-size:10px;transition:var(--transition);line-height:1.4}
.sb-header-acts button:hover{background:var(--surface2);color:var(--text);border-color:var(--border-h)}

.sb-tree{flex:1;overflow-y:auto;padding:4px 0}

.tree-item{display:flex;align-items:center;padding:3px 8px;cursor:pointer;font-size:11px;gap:4px;color:var(--text-s);transition:var(--transition);border-radius:4px;margin:1px 4px;position:relative;user-select:none}
.tree-item:hover{background:var(--surface2);color:var(--text)}
.tree-item.act{background:var(--accent-soft);color:var(--accent)}
.tree-item.drag-over,.tree-group.drag-over{outline:2px solid var(--accent);outline-offset:-1px;border-radius:4px}
.tree-item .ti-icon{width:14px;text-align:center;flex-shrink:0;font-size:11px;line-height:1}
.tree-item .ti-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5}
.tree-item .ti-actions{display:none;gap:2px;flex-shrink:0}
.tree-item:hover .ti-actions{display:flex}
.tree-item .ti-act{padding:0 3px;border:none;background:none;color:var(--text-xs);cursor:pointer;font-size:10px;border-radius:3px;line-height:1.6}
.tree-item .ti-act:hover{color:var(--text);background:var(--border)}
.tree-item .ti-act.del:hover{color:#f87171}
.tree-item .ti-act.rename:hover{color:var(--accent)}

.tree-item.folder{padding-left:4px}
.tree-item.file{padding-left:20px}
.tree-item .arrow{width:12px;text-align:center;flex-shrink:0;font-size:8px;transition:transform .15s;line-height:1}
.tree-item .arrow.open{transform:rotate(90deg)}

.tree-children{overflow:hidden}
.tree-children.collapsed{display:none}

.tree-inline-input{flex:1;background:var(--surface2);border:1px solid var(--accent);border-radius:3px;color:var(--text);font-size:11px;padding:2px 4px;outline:none;font-family:var(--font)}

/* === Drag bar (tree resize) === */
.drag-bar-tree{width:3px;background:var(--border);cursor:col-resize;flex-shrink:0;z-index:5;transition:background .1s}
.drag-bar-tree:hover,.drag-bar-tree.active{background:var(--accent)}

/* === Editor panel === */
.ep{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--surface)}
.ep-header{height:28px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:5px;flex-shrink:0}
.ep-dot{width:7px;height:7px;border-radius:50%;background:var(--border-h)}
.ep-dot:nth-child(1){background:#ff5f57}.ep-dot:nth-child(2){background:#febc2e}.ep-dot:nth-child(3){background:#28c840}
.ep-title{font-size:10px;color:var(--text-xs);margin-left:6px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ep-cm{display:flex;align-items:center;gap:3px;margin-left:auto}
.ep-cmb{padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:var(--surface);color:var(--text-s);cursor:pointer;font-size:9px;transition:var(--transition);line-height:1.5}
.ep-cmb:hover{border-color:var(--border-h);color:var(--text)}
.ep-cmb.act{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

.ep-edit{flex:1;position:relative;overflow:hidden}
.ep-edit textarea{width:100%;height:100%;background:var(--surface);border:none;outline:none;resize:none;padding:14px 16px;font-family:var(--mono);font-size:13px;line-height:1.7;color:var(--text);tab-size:2}
.ep-edit textarea::placeholder{color:var(--text-xs)}
.ep-edit .ln{position:absolute;left:0;top:0;bottom:0;width:36px;background:var(--surface2);border-right:1px solid var(--border);overflow:hidden;pointer-events:none;padding:14px 0}
.ep-edit .ln span{display:block;text-align:right;padding-right:6px;font-size:10px;font-family:var(--mono);color:var(--text-xs);line-height:1.7}
.ep-edit.show-ln textarea{padding-left:52px}

.ep-st{height:20px;background:var(--surface2);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;font-size:9px;color:var(--text-xs);gap:10px;flex-shrink:0}
.ep-st span{display:flex;align-items:center;gap:2px}
.ep-st b{color:var(--text-s);font-weight:500}

/* === Drag bar (editor-preview resize) === */
.drag-bar-main{width:3px;background:var(--border);cursor:col-resize;flex-shrink:0;z-index:5;transition:background .1s}
.drag-bar-main:hover,.drag-bar-main.active{background:var(--accent)}

/* === Preview === */
.pp{flex:1;overflow-y:auto;background:var(--bg);min-width:0}
.pp-inner{padding:24px 28px;max-width:860px;margin:0 auto}
.md-body{font-size:14px;line-height:1.8;color:var(--text)}
.md-body h1,.md-body h2,.md-body h3,.md-body h4,.md-body h5,.md-body h6{margin:1.4em 0 .5em;line-height:1.3;font-weight:700;letter-spacing:-.3px}
.md-body h1{font-size:1.8em;border-bottom:2px solid var(--border);padding-bottom:.3em}
.md-body h2{font-size:1.5em;border-bottom:1px solid var(--border);padding-bottom:.25em}
.md-body h3{font-size:1.25em}
.md-body p{margin:.8em 0}
.md-body a{color:var(--accent)}
.md-body strong{font-weight:700;color:#e8e8ec}
.md-body em{font-style:italic}
.md-body del{color:var(--text-xs)}
.md-body ul,.md-body ol{padding-left:1.5em;margin:.6em 0}
.md-body li{margin:.2em 0}
.md-body li::marker{color:var(--text-xs)}
.md-body blockquote{margin:.8em 0;padding:4px 14px;border-left:3px solid var(--accent);background:var(--accent-soft);border-radius:0 6px 6px 0;color:var(--text-s)}
.md-body code{font-family:var(--mono);font-size:.88em;background:var(--surface2);padding:2px 6px;border-radius:4px;color:var(--accent2)}
.md-body pre{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;overflow-x:auto;margin:.8em 0}
.md-body pre code{background:none;padding:0;color:var(--text);font-size:.85em;line-height:1.6}
.md-body table{border-collapse:collapse;width:100%;margin:.8em 0;font-size:.92em}
.md-body th,.md-body td{border:1px solid var(--border);padding:7px 10px;text-align:left}
.md-body th{background:var(--surface2);font-weight:600}
.md-body tr:nth-child(even){background:var(--surface)}
.md-body img{max-width:100%;border-radius:var(--radius-sm);margin:.6em 0}
.md-body hr{border:none;border-top:1px solid var(--border);margin:1.5em 0}
.md-body input[type="checkbox"]{margin-right:6px;accent-color:var(--accent)}
.pp-svg{display:flex;align-items:flex-start;justify-content:center;padding:24px}
.pp-svg svg{max-width:100%;max-height:70vh;height:auto}
.pp-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-xs);font-size:13px;flex-direction:column;gap:8px}

/* Context menu */
.cmenu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 0;z-index:100;min-width:140px;box-shadow:var(--shadow-lg);display:none}
.cmenu-item{padding:6px 12px;font-size:11px;cursor:pointer;color:var(--text-s);transition:var(--transition)}
.cmenu-item:hover{background:var(--surface2);color:var(--text)}
.cmenu-sep{height:1px;background:var(--border);margin:3px 0}

/* === Modal overlay === */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;min-width:280px;max-width:400px;box-shadow:var(--shadow-lg)}
.modal-title{font-size:13px;font-weight:600;margin-bottom:10px}
.modal-input{width:100%;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;font-family:var(--font);outline:none;margin-bottom:10px}
.modal-input:focus{border-color:var(--accent)}
.modal-acts{display:flex;gap:6px;justify-content:flex-end}
.modal-acts button{padding:5px 14px;border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--font);font-weight:500;transition:var(--transition);border:1px solid var(--border);background:var(--surface);color:var(--text-s)}
.modal-acts button:hover{background:var(--surface2);color:var(--text)}
.modal-acts button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-acts button.primary:hover{background:var(--accent-l)}
.modal-acts button.danger{color:#f87171;border-color:#f8717122}
.modal-acts button.danger:hover{background:rgba(248,113,113,.1)}

/* === Toast === */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:8px 18px;border-radius:20px;font-size:11px;color:var(--text-s);z-index:60;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{opacity:1}

@media(max-width:768px){
  .hm{display:none}
  .sb{position:fixed;left:0;top:42px;bottom:0;z-index:25;width:260px;transform:translateX(-100%);transition:transform .2s}
  .sb.open{transform:translateX(0)}
  .drag-bar-tree{display:none}
  .ep{border-right:none}
  .pp{display:none}
  .pp.act{display:block}
  .ep.hide{display:none}
  .mb{display:flex}
  .pp-inner{padding:14px 16px}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hl">
    <button class="btn btn-s btn-gh" onclick="toggleSidebar()" id="btn-sb" title="Toggle sidebar">☰</button>
    <div class="hl-logo">M↓</div>
    <div class="hl-t">Markdown <span>Editor</span></div>
  </div>
  <div class="hm">
    <button class="btn btn-s" onclick="ins('**','**')" title="Bold"><b>B</b></button>
    <button class="btn btn-s" onclick="ins('*','*')" title="Italic"><i>I</i></button>
    <button class="btn btn-s" onclick="ins('~~','~~')" title="Strikethrough"><s>S</s></button>
    <span style="color:var(--border)">|</span>
    <button class="btn btn-s" onclick="insH()" title="Heading">H</button>
    <button class="btn btn-s" onclick="insL('ul')" title="Unordered List">•</button>
    <button class="btn btn-s" onclick="insL('ol')" title="Ordered List">1.</button>
    <button class="btn btn-s" onclick="ins('> ','')" title="Blockquote">&ldquo;</button>
    <span style="color:var(--border)">|</span>
    <button class="btn btn-s" onclick="ins('`','`')" title="Inline Code">&lt;/&gt;</button>
    <button class="btn btn-s" onclick="ins('\n```\n\n```\n','')" title="Code Block">▯</button>
    <button class="btn btn-s" onclick="ins('[','](url)')" title="Link">🔗</button>
    <button class="btn btn-s" onclick="ins('![alt](','')" title="Image">🖼</button>
    <span style="color:var(--border)">|</span>
    <button class="btn btn-s" onclick="insTable()" title="Table">⊞</button>
    <button class="btn btn-s" onclick="ins('---\n','')" title="HR">—</button>
  </div>
  <div class="hr">
    <button class="btn btn-s" onclick="toggleLineNum()" id="btn-ln">#</button>
    <button class="btn btn-s" onclick="downloadCurrent()">💾</button>
    <button class="btn btn-s btn-p" onclick="copyHTML()">📋</button>
  </div>
</header>

<div class="mb">
  <div class="mb-t act" id="tab-files" onclick="mobileTab('files')">文件</div>
  <div class="mb-t" id="tab-edit" onclick="mobileTab('edit')">编辑</div>
  <div class="mb-t" id="tab-preview" onclick="mobileTab('preview')">预览</div>
</div>

<div class="ct" id="main-container">
  <!-- Sidebar -->
  <div class="sb" id="sidebar">
    <div class="sb-header">
      <span class="sb-header-t">文件浏览器</span>
      <div class="sb-header-acts">
        <button onclick="createFolder(null)" title="新建文件夹">📁+</button>
        <button onclick="createFile(null)" title="新建文件">📄+</button>
        <input type="file" id="fileUpload" accept=".md,.txt,.svg,.markdown" style="display:none" multiple onchange="uploadFiles(event)">
        <button onclick="document.getElementById('fileUpload').click()" title="导入文件">↑</button>
      </div>
    </div>
    <div class="sb-tree" id="file-tree"
      ondragover="onTreeDragOver(event)"
      ondragleave="onTreeDragLeave(event)"
      ondrop="onTreeDrop(event)">
    </div>
  </div>

  <!-- Tree resize bar -->
  <div class="drag-bar-tree" id="dragBarTree" onmousedown="startResize('tree',event)"></div>

  <!-- Editor -->
  <div class="ep" id="editor-panel">
    <div class="ep-header">
      <div class="ep-dot"></div><div class="ep-dot"></div><div class="ep-dot"></div>
      <div class="ep-title" id="file-name"></div>
      <div class="ep-cm">
        <button class="ep-cmb" onclick="toggleWrap()" id="btn-wrap" title="换行">↩</button>
        <button class="ep-cmb" onclick="toggleMonospace()" id="btn-mono" title="字体">A</button>
      </div>
    </div>
    <div class="ep-edit" id="editor-area">
      <div class="ln" id="line-nums"><span></span></div>
      <textarea id="editor" placeholder="从左侧选择或创建文件开始编辑..."></textarea>
    </div>
    <div class="ep-st">
      <span id="stat-lines"><b>0</b> lines</span>
      <span id="stat-words"><b>0</b> words</span>
      <span id="stat-chars"><b>0</b> chars</span>
      <span style="margin-left:auto" id="stat-save"></span>
    </div>
  </div>

  <!-- Editor-preview resize bar -->
  <div class="drag-bar-main" id="dragBarMain" onmousedown="startResize('main',event)"></div>

  <!-- Preview -->
  <div class="pp" id="preview-panel">
    <div class="pp-inner md-body" id="preview"></div>
  </div>
</div>

<!-- Context menu -->
<div class="cmenu" id="context-menu"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// === IndexedDB ===
const DB_NAME='md-editor-db', DB_VER=1;
let db;
function openDB(){
  return new Promise((resolve,reject)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('folders')) d.createObjectStore('folders',{keyPath:'id'});
      if(!d.objectStoreNames.contains('files')) d.createObjectStore('files',{keyPath:'id'});
      if(!d.objectStoreNames.contains('settings')) d.createObjectStore('settings',{keyPath:'key'});
    };
    r.onsuccess=e=>{db=e.target.result;resolve(db)};
    r.onerror=e=>reject(e);
  });
}
function tx(store,mode){return db.transaction(store,mode).objectStore(store)}
function dbPut(store,obj){return new Promise(r=>{const t=tx(store,'readwrite');t.put(obj);t.transaction.oncomplete=()=>r()})}
function dbGet(store,id){return new Promise(r=>{const t=tx(store,'readonly').get(id);t.onsuccess=()=>r(t.result)})}
function dbGetAll(store){return new Promise(r=>{const t=tx(store,'readonly').getAll();t.onsuccess=()=>r(t.result)})}
function dbDelete(store,id){return new Promise(r=>{const t=tx(store,'readwrite').delete(id);t.transaction.oncomplete=()=>r()})}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

// === State ===
let currentFileId=null, currentFile=null, treeExpanded={}, treeData=null;
let showLineNums=true, wordWrap=true, monoFont=true;
let dragOverNode=null, dragFileId=null;

// === Marked config ===
marked.setOptions({
  gfm:true, breaks:true,
  highlight:function(code,lang){
    if(lang&&hljs.getLanguage(lang)){
      try{return hljs.highlight(code,{language:lang}).value}catch{}
    }
    return hljs.highlightAuto(code).value;
  }
});

// === Init ===
const editor=document.getElementById('editor');
const preview=document.getElementById('preview');
const previewPanel=document.getElementById('preview-panel');
const editorPanel=document.getElementById('editor-panel');
const lineNums=document.getElementById('line-nums');
const statSave=document.getElementById('stat-save');
const fileName=document.getElementById('file-name');
const fileTree=document.getElementById('file-tree');
const sidebar=document.getElementById('sidebar');

async function init(){
  await openDB();
  document.getElementById('btn-ln').classList.add('act');
  await loadTree();
  await loadLastFile();
}
init();

// === Tree ===
async function loadTree(){
  const folders=await dbGetAll('folders');
  const files=await dbGetAll('files');
  treeData={folders,files};
  renderTree();
}
function renderTree(){
  const {folders,files}=treeData;
  const rootFolders=folders.filter(f=>!f.parentId).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  const rootFiles=files.filter(f=>!f.folderId);
  let h='';
  for(const fd of rootFolders) h+=renderFolder(fd,folders,files);
  for(const fl of rootFiles) h+=renderFile(fl);
  if(!h) h='<div style="padding:16px;text-align:center;font-size:10px;color:var(--text-xs)">暂无文件<br>点击上方按钮创建或导入</div>';
  fileTree.innerHTML=h;
}
function renderFolder(fd,folders,files){
  const expanded=treeExpanded[fd.id]!==false;
  const subFolders=folders.filter(f=>f.parentId===fd.id).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  const subFiles=files.filter(f=>f.folderId===fd.id);
  const arrow=expanded?'arrow open':'arrow';
  let h=`<div class="tree-group" data-folder-id="${fd.id}"
    ondragover="onItemDragOver(event,'${fd.id}')"
    ondragleave="onItemDragLeave(event)"
    ondrop="onItemDrop(event,'${fd.id}')">`;
  h+=`<div class="tree-item folder"
    oncontextmenu="onContextMenu(event,'folder','${fd.id}')">
    <span class="arrow" onclick="event.stopPropagation();toggleFolder('${fd.id}')">▶</span>
    <span class="ti-icon" style="color:#fbbf24">📁</span>
    <span class="ti-name" onclick="toggleFolder('${fd.id}')">${esc(fd.name)}</span>
    <span class="ti-actions">
      <button class="ti-act rename" onclick="event.stopPropagation();renameFolder('${fd.id}','${esc(fd.name)}')" title="重命名">✎</button>
      <button class="ti-act del" onclick="event.stopPropagation();deleteFolder('${fd.id}')" title="删除">×</button>
    </span>
  </div>`;
  h+=`<div class="tree-children${expanded?'':' collapsed'}">`;
  for(const sf of subFolders) h+=renderFolder(sf,folders,files);
  for(const sf of subFiles) h+=renderFile(sf);
  h+='</div></div>';
  return h;
}
function renderFile(fl){
  const icon=fl.type==='svg'?'🖼':fl.type==='txt'?'📝':'📄';
  const color=fl.type==='svg'?'#a78bfa':'var(--text-s)';
  const cls=fl.id===currentFileId?'tree-item file act':'tree-item file';
  return `<div class="${cls}" data-file-id="${fl.id}" draggable="true"
    onclick="selectFile('${fl.id}')"
    ondragstart="onFileDragStart(event,'${fl.id}')"
    oncontextmenu="onContextMenu(event,'file','${fl.id}')">
    <span class="ti-icon" style="color:${color}">${icon}</span>
    <span class="ti-name">${esc(fl.name)}</span>
    <span class="ti-actions">
      <button class="ti-act rename" onclick="event.stopPropagation();renameFile('${fl.id}','${esc(fl.name)}')" title="重命名">✎</button>
      <button class="ti-act del" onclick="event.stopPropagation();deleteFile('${fl.id}')" title="删除">×</button>
    </span>
  </div>`;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
async function toggleFolder(id){
  treeExpanded[id]=treeExpanded[id]===false?true:false;
  await saveSettings();
  renderTree();
}
async function selectFile(id){
  if(currentFileId){
    await saveCurrentFileSilent();
  }
  const fl=await dbGet('files',id);
  if(!fl)return;
  currentFileId=id;
  currentFile=fl;
  fileName.textContent=fl.name;
  editor.value=fl.content||'';
  editor.readOnly=fl.type==='svg';
  updatePreview();
  updateLineNums();
  renderTree();
}
async function saveCurrentFileSilent(){
  if(!currentFile||!currentFileId)return;
  if(currentFile.type==='svg')return;
  const content=editor.value;
  if(content===currentFile.content)return;
  currentFile.content=content;
  currentFile.updatedAt=Date.now();
  await dbPut('files',currentFile);
}
async function saveCurrent(){
  await saveCurrentFileSilent();
  statSave.textContent='保存于 '+new Date().toLocaleTimeString();
  setTimeout(()=>{statSave.textContent=''},2000);
}

// === File ops ===
async function createFolder(parentId){
  const name=prompt('文件夹名称:','新建文件夹');
  if(!name||!name.trim())return;
  const fd={id:uid(),name:name.trim(),parentId:parentId||null,sortOrder:0,createdAt:Date.now()};
  await dbPut('folders',fd);
  await loadTree();
  treeExpanded[fd.id]=true;
  renderTree();
}
async function createFile(folderId){
  const name=prompt('文件名称 (含后缀):','untitled.md');
  if(!name||!name.trim())return;
  const type=name.endsWith('.svg')?'svg':name.endsWith('.txt')?'txt':'md';
  const fl={id:uid(),name:name.trim(),type,folderId:folderId||null,content:'',createdAt:Date.now(),updatedAt:Date.now()};
  await dbPut('files',fl);
  if(folderId)treeExpanded[folderId]=true;
  await loadTree();
  renderTree();
  selectFile(fl.id);
}
async function uploadFiles(e){
  const files=e.target.files;
  if(!files.length)return;
  for(const f of files){
    const type=f.name.endsWith('.svg')?'svg':f.name.endsWith('.txt')?'txt':'md';
    const content=await new Promise(r=>{
      const reader=new FileReader();
      reader.onload=ev=>r(ev.target.result);
      reader.readAsText(f);
    });
    const fl={id:uid(),name:f.name,type,folderId:null,content,createdAt:Date.now(),updatedAt:Date.now()};
    await dbPut('files',fl);
  }
  await loadTree();
  renderTree();
  toast('已导入 '+files.length+' 个文件');
  e.target.value='';
}
async function renameFile(id,oldName){
  const newName=prompt('重命名:',oldName);
  if(!newName||!newName.trim()||newName.trim()===oldName)return;
  const fl=await dbGet('files',id);
  if(!fl)return;
  const type=newName.endsWith('.svg')?'svg':newName.endsWith('.txt')?'txt':'md';
  fl.name=newName.trim();fl.type=type;fl.updatedAt=Date.now();
  await dbPut('files',fl);
  if(currentFileId===id){currentFile=fl;fileName.textContent=fl.name;}
  await loadTree();
  renderTree();
}
async function renameFolder(id,oldName){
  const newName=prompt('重命名文件夹:',oldName);
  if(!newName||!newName.trim()||newName.trim()===oldName)return;
  const fd=await dbGet('folders',id);
  if(!fd)return;
  fd.name=newName.trim();
  await dbPut('folders',fd);
  await loadTree();
  renderTree();
}
async function deleteFile(id){
  if(!confirm('确定删除此文件？'))return;
  const fl=await dbGet('files',id);
  await dbDelete('files',id);
  if(currentFileId===id){currentFileId=null;currentFile=null;editor.value='';fileName.textContent='';updatePreview();}
  await loadTree();
  renderTree();
}
async function deleteFolder(id){
  if(!confirm('确定删除此文件夹及其所有内容？'))return;
  const folders=await dbGetAll('folders');
  const files=await dbGetAll('files');
  async function delRecursive(folderId){
    for(const fd of folders.filter(f=>f.parentId===folderId)) await delRecursive(fd.id);
    for(const fl of files.filter(f=>f.folderId===folderId)){
      if(fl.id===currentFileId){currentFileId=null;currentFile=null;editor.value='';fileName.textContent='';updatePreview();}
      await dbDelete('files',fl.id);
    }
    await dbDelete('folders',folderId);
  }
  await delRecursive(id);
  await loadTree();
  renderTree();
}

// === Drag & Drop ===
function onFileDragStart(e,fileId){
  dragFileId=fileId;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',fileId);
}
function onItemDragOver(e,folderId){
  if(!dragFileId)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const el=e.currentTarget;
  if(dragOverNode) dragOverNode.classList.remove('drag-over');
  el.classList.add('drag-over');
  dragOverNode=el;
}
function onItemDragLeave(e){
  const el=e.currentTarget;
  if(el.contains(e.relatedTarget))return;
  el.classList.remove('drag-over');
  if(dragOverNode===el)dragOverNode=null;
}
async function onItemDrop(e,folderId){
  e.preventDefault();
  const el=e.currentTarget;
  el.classList.remove('drag-over');
  dragOverNode=null;
  if(!dragFileId)return;
  const fl=await dbGet('files',dragFileId);
  if(!fl)return;
  fl.folderId=folderId;fl.updatedAt=Date.now();
  await dbPut('files',fl);
  if(currentFileId===dragFileId)currentFile=fl;
  dragFileId=null;
  treeExpanded[folderId]=true;
  await loadTree();
  renderTree();
}
function onTreeDragOver(e){
  if(!dragFileId)return;
  e.preventDefault();
  if(dragOverNode){dragOverNode.classList.remove('drag-over');dragOverNode=null;}
}
function onTreeDragLeave(e){}
async function onTreeDrop(e){
  e.preventDefault();
  if(!dragFileId)return;
  const fl=await dbGet('files',dragFileId);
  if(!fl)return;
  fl.folderId=null;fl.updatedAt=Date.now();
  await dbPut('files',fl);
  if(currentFileId===dragFileId)currentFile=fl;
  dragFileId=null;
  await loadTree();
  renderTree();
}

// === Context menu ===
function onContextMenu(e,type,id){
  e.preventDefault();
  const cm=document.getElementById('context-menu');
  let h='';
  if(type==='folder'){
    h+=`<div class="cmenu-item" onclick="createFile('${id}');hideCmenu()">新建文件</div>`;
    h+=`<div class="cmenu-item" onclick="createFolder('${id}');hideCmenu()">新建子文件夹</div>`;
    h+=`<div class="cmenu-sep"></div>`;
    h+=`<div class="cmenu-item" onclick="renameFolder('${id}','');hideCmenu()">重命名</div>`;
    h+=`<div class="cmenu-item" onclick="deleteFolder('${id}');hideCmenu()" style="color:#f87171">删除</div>`;
  }else{
    h+=`<div class="cmenu-item" onclick="renameFile('${id}','');hideCmenu()">重命名</div>`;
    h+=`<div class="cmenu-sep"></div>`;
    h+=`<div class="cmenu-item" onclick="downloadFile('${id}');hideCmenu()">下载</div>`;
    h+=`<div class="cmenu-item" onclick="deleteFile('${id}');hideCmenu()" style="color:#f87171">删除</div>`;
  }
  cm.innerHTML=h;
  cm.style.display='block';
  cm.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';
  cm.style.top=Math.min(e.clientY,window.innerHeight-200)+'px';
  setTimeout(()=>document.addEventListener('click',hideCmenu,{once:true}),0);
}
function hideCmenu(){document.getElementById('context-menu').style.display='none'}

// === Download ===
async function downloadFile(id){
  const fl=await dbGet('files',id);
  if(!fl)return;
  const blob=new Blob([fl.content],{type:fl.type==='svg'?'image/svg+xml':'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=fl.name;
  a.click();
  URL.revokeObjectURL(a.href);
}
async function downloadCurrent(){
  if(!currentFile){
    const blob=new Blob([editor.value],{type:'text/markdown'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='untitled.md';a.click();URL.revokeObjectURL(a.href);
    return;
  }
  await saveCurrentFileSilent();
  downloadFile(currentFileId);
}

// === Preview ===
function updatePreview(){
  const fl=currentFile;
  if(fl&&fl.type==='svg'){
    preview.innerHTML='<div class="pp-svg">'+fl.content+'</div>';
    return;
  }
  const text=editor.value;
  preview.innerHTML=text?marked.parse(text):'<div class="pp-empty" style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text-xs);font-size:13px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;opacity:.3"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>预览区域</span></div>';
  updateStats();
}
function updateStats(){
  const text=editor.value;
  const lines=text?text.split('\n').length:0;
  const words=text.trim()?text.trim().split(/\s+/).length:0;
  document.getElementById('stat-lines').innerHTML='<b>'+lines+'</b> lines';
  document.getElementById('stat-words').innerHTML='<b>'+words+'</b> words';
  document.getElementById('stat-chars').innerHTML='<b>'+text.length+'</b> chars';
}
function updateLineNums(){
  const lines=editor.value.split('\n').length;
  let h='';
  for(let i=1;i<=lines;i++)h+='<span>'+i+'</span>';
  lineNums.innerHTML=h;
  if(showLineNums)document.getElementById('editor-area').classList.add('show-ln');
  else document.getElementById('editor-area').classList.remove('show-ln');
}

// === Settings persistence ===
async function saveSettings(){
  await dbPut('settings',{key:'treeExpanded',value:JSON.stringify(treeExpanded)});
}
async function loadSettings(){
  const s=await dbGet('settings','treeExpanded');
  if(s)treeExpanded=JSON.parse(s.value);
  const lf=await dbGet('settings','lastFileId');
  return lf?lf.value:null;
}
async function saveLastFileId(){
  await dbPut('settings',{key:'lastFileId',value:currentFileId||''});
}

// === Load last file ===
async function loadLastFile(){
  const lastId=await loadSettings();
  if(lastId){
    const fl=await dbGet('files',lastId);
    if(fl){
      currentFileId=lastId;
      currentFile=fl;
      fileName.textContent=fl.name;
      editor.value=fl.content||'';
      editor.readOnly=fl.type==='svg';
    }
  }
  updatePreview();
  updateLineNums();
}

// === Editor events ===
let saveTimer;
editor.addEventListener('input',()=>{
  updatePreview();updateLineNums();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    await saveCurrentFileSilent();
    if(currentFileId)await saveLastFileId();
  },800);
});
editor.addEventListener('scroll',()=>{
  lineNums.style.transform='translateY('+(-editor.scrollTop+14)+'px)';
});
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();const s=editor.selectionStart,ed=editor.selectionEnd;editor.value=editor.value.substring(0,s)+'  '+editor.value.substring(ed);editor.selectionStart=editor.selectionEnd=s+2;updatePreview();updateLineNums()}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCurrent()}
});

// === Toolbar functions ===
function ins(before,after){
  const start=editor.selectionStart,end=editor.selectionEnd,sel=editor.value.substring(start,end);
  editor.value=editor.value.substring(0,start)+before+sel+after+editor.value.substring(end);
  if(before.includes('\n')){editor.selectionStart=editor.selectionEnd=start+before.length+sel.length}
  else{editor.selectionStart=start+before.length;editor.selectionEnd=end+before.length}
  editor.focus();updatePreview();updateLineNums();
}
function insH(){
  const start=editor.selectionStart,ls=editor.value.lastIndexOf('\n',start-1)+1;
  const line=editor.value.substring(ls,editor.value.indexOf('\n',start)===-1?editor.value.length:editor.value.indexOf('\n',start));
  const m=line.match(/^(#{1,6})\s/);let l=m?m[1].length:0;l=l>=6?0:l+1;
  const nl=l===0?line.replace(/^#{1,6}\s*/,''):'#'.repeat(l)+' '+line.replace(/^#{1,6}\s*/,'');
  const le=editor.value.indexOf('\n',start)===-1?editor.value.length:editor.value.indexOf('\n',start);
  editor.value=editor.value.substring(0,ls)+nl+editor.value.substring(le);editor.focus();updatePreview();updateLineNums();
}
function insL(type){
  const start=editor.selectionStart,ls=editor.value.lastIndexOf('\n',start-1)+1;
  const line=editor.value.substring(ls,editor.value.indexOf('\n',start)===-1?editor.value.length:editor.value.indexOf('\n',start));
  const prefix=type==='ul'?'- ':'1. ';const has=/^[\-\*\+]\s/.test(line)||/^\d+\.\s/.test(line);
  const nl=has?line.replace(/^[\-\*\+]\s|^\d+\.\s/,''):prefix+line;
  const le=editor.value.indexOf('\n',start)===-1?editor.value.length:editor.value.indexOf('\n',start);
  editor.value=editor.value.substring(0,ls)+nl+editor.value.substring(le);editor.focus();updatePreview();updateLineNums();
}
function insTable(){
  const tpl='\n| Header 1 | Header 2 | Header 3 |\n|----------|----------|----------|\n| Cell     | Cell     | Cell     |\n';
  const s=editor.selectionStart;editor.value=editor.value.substring(0,s)+tpl+editor.value.substring(s);
  editor.selectionStart=editor.selectionEnd=s+tpl.length;editor.focus();updatePreview();updateLineNums();
}

function toggleLineNum(){showLineNums=!showLineNums;document.getElementById('btn-ln').classList.toggle('act',showLineNums);updateLineNums()}
function toggleWrap(){wordWrap=!wordWrap;const b=document.getElementById('btn-wrap');b.classList.toggle('act',!wordWrap);editor.style.whiteSpace=wordWrap?'':'pre';editor.style.overflowX=wordWrap?'':'auto'}
function toggleMonospace(){monoFont=!monoFont;const b=document.getElementById('btn-mono');b.classList.toggle('act',!monoFont);editor.style.fontFamily=monoFont?'':'var(--font)'}

function copyHTML(){
  updatePreview();
  const html='<!DOCTYPE html>\n<html>\n<head><meta charset="UTF-8"><style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:800px;margin:40px auto;padding:0 20px;line-height:1.8;color:#333;background:#fff}pre{background:#f5f5f5;padding:16px;border-radius:8px;overflow-x:auto}code{background:#f5f5f5;padding:2px 6px;border-radius:4px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ddd;padding:8px}th{background:#f9f9f9}img{max-width:100%}</style></head>\n<body>\n'+preview.innerHTML+'\n</body>\n</html>';
  navigator.clipboard.writeText(html).then(()=>toast('HTML 已复制到剪贴板'));
}

// === Sidebar toggle ===
function toggleSidebar(){
  if(window.innerWidth<=768){
    sidebar.classList.toggle('open');
    return;
  }
  sidebar.classList.toggle('collapsed');
  document.getElementById('dragBarTree').style.display=sidebar.classList.contains('collapsed')?'none':'';
}

// === Resize ===
let resizing=null,startX,startW;
function startResize(type,e){
  resizing=type;startX=e.clientX;
  if(type==='tree')startW=sidebar.offsetWidth;
  else{
    startW=editorPanel.offsetWidth;
    const ppW=previewPanel.offsetWidth;
    startW={editor:startW,preview:ppW,total:startW+ppW};
  }
  document.body.style.cursor='col-resize';
  document.body.style.userSelect='none';
  document.addEventListener('mousemove',onResize);
  document.addEventListener('mouseup',stopResize);
  document.getElementById(type==='tree'?'dragBarTree':'dragBarMain').classList.add('active');
}
function onResize(e){
  const dx=e.clientX-startX;
  if(resizing==='tree'){
    let w=startW+dx;
    w=Math.max(50,Math.min(500,w));
    sidebar.style.width=w+'px';
  }else{
    let ew=startW.editor+dx;
    const minW=200;
    if(ew<minW)ew=minW;
    if(startW.total-ew<minW)ew=startW.total-minW;
    editorPanel.style.flex='none';
    editorPanel.style.width=ew+'px';
    previewPanel.style.flex='none';
    previewPanel.style.width=(startW.total-ew)+'px';
  }
}
async function stopResize(){
  document.body.style.cursor='';document.body.style.userSelect='';
  document.removeEventListener('mousemove',onResize);
  document.removeEventListener('mouseup',stopResize);
  document.querySelectorAll('.drag-bar-tree,.drag-bar-main').forEach(b=>b.classList.remove('active'));
  resizing=null;
}

// === Mobile tabs ===
function mobileTab(tab){
  document.querySelectorAll('.mb-t').forEach(t=>t.classList.remove('act'));
  document.getElementById('tab-'+tab).classList.add('act');
  if(tab==='files'){sidebar.classList.add('open');editorPanel.classList.add('hide');previewPanel.classList.remove('act')}
  else if(tab==='edit'){sidebar.classList.remove('open');editorPanel.classList.remove('hide');previewPanel.classList.remove('act')}
  else{sidebar.classList.remove('open');editorPanel.classList.add('hide');previewPanel.classList.add('act');updatePreview()}
}

// === Toast ===
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// Close sidebar on click outside (mobile)
document.addEventListener('click',e=>{
  if(window.innerWidth<=768&&sidebar.classList.contains('open')){
    if(!sidebar.contains(e.target)&&!e.target.closest('#btn-sb')){
      sidebar.classList.remove('open');
    }
  }
});
</script>
