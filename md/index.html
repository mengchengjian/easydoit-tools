<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark-dimmed.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
*,::before,::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#121210;
  --bg2:#1a1a17;
  --bg3:#21211d;
  --bdr:rgba(255,255,255,0.06);
  --bdr2:rgba(255,255,255,0.10);

  --tx1:rgba(255,255,255,0.87);
  --tx2:rgba(255,255,255,0.50);
  --tx3:rgba(255,255,255,0.28);
  --tx4:rgba(255,255,255,0.14);

  --accent:#d4a574;
  --accent-bg:rgba(212,165,116,0.10);
  --red:#e05555;
  --red-bg:rgba(224,85,85,0.10);

  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Noto Sans SC",sans-serif;
  --mono:"SF Mono","JetBrains Mono","Fira Code","Cascadia Code",monospace;

  --r4:4px; --r6:6px; --r8:8px; --r12:12px;
}

html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--tx1);
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
}

::selection{background:var(--accent-bg);color:var(--accent)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.12)}

/* ---------- top bar ---------- */
.top{
  height:44px;padding:0 16px;
  background:var(--bg2);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;
  flex-shrink:0;z-index:20;
  gap:12px;
}
.top-l{display:flex;align-items:center;gap:10px}
.top-l svg{color:var(--accent);opacity:0.7}
.top-l span{font-size:12px;font-weight:500;color:var(--tx2);letter-spacing:0.3px}

.top-c{
  display:flex;align-items:center;gap:2px;
  overflow-x:auto;flex:1;justify-content:center;
}
.top-c::-webkit-scrollbar{display:none}

.btn{
  height:28px;padding:0 9px;
  border-radius:var(--r6);
  font-size:11.5px;font-family:var(--font);
  color:var(--tx2);background:transparent;
  border:1px solid transparent;
  cursor:pointer;white-space:nowrap;
  transition:all .15s;
  display:inline-flex;align-items:center;gap:3px;
  letter-spacing:0.1px;
}
.btn:hover{background:rgba(255,255,255,0.04);color:var(--tx1)}
.btn:active{background:rgba(255,255,255,0.08)}
.btn.primary{
  background:var(--accent-bg);
  color:var(--accent);
  border-color:rgba(212,165,116,0.2);
  font-weight:500;
}
.btn.primary:hover{background:rgba(212,165,116,0.18)}
.sep{width:1px;height:16px;background:var(--bdr);margin:0 4px}

.top-r{display:flex;align-items:center;gap:2px}
.top-r .btn{padding:0 6px;font-size:11px}

/* ---------- layout ---------- */
.main{display:flex;flex:1;overflow:hidden}

/* ---------- sidebar ---------- */
.sidebar{
  width:240px;min-width:50px;
  background:var(--bg2);
  border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;
  flex-shrink:0;
  transition:width .25s cubic-bezier(0.16,1,0.3,1);
}
.sidebar.closed{width:0;min-width:0;border-right:none}

.side-hd{
  height:36px;padding:0 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--bdr);
  flex-shrink:0;
}
.side-hd span{font-size:10.5px;color:var(--tx3);letter-spacing:0.5px;text-transform:uppercase;font-weight:500}
.side-hd-act{display:flex;gap:1px}
.side-hd-act button{
  width:24px;height:24px;border-radius:var(--r4);
  background:transparent;border:none;color:var(--tx3);
  cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.side-hd-act button:hover{background:rgba(255,255,255,0.05);color:var(--tx1)}

.side-tree{flex:1;overflow-y:auto;padding:4px 0}

.tree-group{margin:0}
.tree-item{
  display:flex;align-items:center;
  padding:4px 8px;gap:6px;
  cursor:pointer;font-size:12.5px;
  color:var(--tx2);border-radius:var(--r4);
  margin:0 4px;user-select:none;
  transition:all .1s;
  -webkit-user-drag:element;
}
.tree-item:hover{background:rgba(255,255,255,0.03);color:var(--tx1)}
.tree-item.sel{background:var(--accent-bg);color:var(--accent)}
.tree-item .ti-ico{width:15px;text-align:center;flex-shrink:0;font-size:12px}
.tree-item .ti-arrow{width:12px;text-align:center;flex-shrink:0;font-size:8px;color:var(--tx3);transition:transform .15s}
.tree-item .ti-arrow.on{transform:rotate(90deg);color:var(--tx2)}
.tree-item .ti-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-item .ti-act{display:none;gap:1px;flex-shrink:0}
.tree-item:hover .ti-act{display:flex}
.tree-item .ti-act button{
  width:20px;height:20px;padding:0;
  border:none;background:none;color:var(--tx3);
  cursor:pointer;font-size:11px;border-radius:3px;
  transition:all .1s;
  display:flex;align-items:center;justify-content:center;
}
.tree-item .ti-act button:hover{background:rgba(255,255,255,0.08);color:var(--tx1)}
.tree-item .ti-act button.del:hover{background:var(--red-bg);color:var(--red)}

.tree-children{overflow:hidden}
.tree-children.folded{display:none}

/* indentation */
.tree-item.f{padding-left:4px}
.tree-item.fl{padding-left:26px}
.tree-children .tree-item.f{padding-left:18px}
.tree-children .tree-item.fl{padding-left:40px}
.tree-children .tree-children .tree-item.f{padding-left:32px}
.tree-children .tree-children .tree-item.fl{padding-left:54px}
.tree-children .tree-children .tree-children .tree-item.f{padding-left:46px}
.tree-children .tree-children .tree-children .tree-item.fl{padding-left:68px}

.tree-group.drop-target>.tree-item,
.tree-group.drop-target{background:var(--accent-bg);border-radius:var(--r6)}
.tree-item.drop-target{outline:2px solid var(--accent);outline-offset:-2px;border-radius:var(--r4)}

/* ---------- drag bars ---------- */
.drag{width:4px;cursor:col-resize;flex-shrink:0;background:transparent;transition:background .15s}
.drag:hover,.drag.on{background:var(--accent)}

/* ---------- editor panel ---------- */
.editor-panel{
  flex:1;display:flex;flex-direction:column;
  min-width:0;background:var(--bg);
}

.ed-hd{
  height:32px;padding:0 12px;
  background:var(--bg3);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.ed-dot{width:7px;height:7px;border-radius:50%}
.ed-dot:nth-child(1){background:#e05555}.ed-dot:nth-child(2){background:#e0b055}.ed-dot:nth-child(3){background:#55b855}
.ed-title{font-size:11px;color:var(--tx3);font-weight:450;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ed-opt{margin-left:auto;display:flex;gap:1px}
.ed-opt button{
  width:24px;height:24px;border-radius:var(--r4);
  background:transparent;border:none;color:var(--tx3);
  cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.ed-opt button:hover{background:rgba(255,255,255,0.05);color:var(--tx1)}
.ed-opt button.on{color:var(--accent);background:var(--accent-bg)}

.ed-area{flex:1;position:relative;overflow:hidden}
.ed-area textarea{
  display:block;width:100%;height:100%;
  background:var(--bg);border:none;outline:none;resize:none;
  padding:28px 24px;
  font-family:var(--mono);
  font-size:14px;line-height:1.8;
  color:var(--tx1);
  caret-color:var(--accent);
  tab-size:2;
}
.ed-area textarea::placeholder{color:var(--tx4)}
.ed-area.show-ln textarea{padding-left:56px}

.ed-ln{
  position:absolute;left:0;top:0;bottom:0;
  width:42px;padding:28px 0;
  background:var(--bg);pointer-events:none;
  border-right:1px solid var(--bdr);
  overflow:hidden;
}
.ed-ln span{
  display:block;text-align:right;padding-right:8px;
  font:11px/1.8 var(--mono);color:var(--tx4);
  font-variant-numeric:tabular-nums;
}

.ed-st{
  height:22px;padding:0 14px;
  background:var(--bg2);
  border-top:1px solid var(--bdr);
  display:flex;align-items:center;gap:20px;
  font-size:10px;color:var(--tx3);
  flex-shrink:0;
}
.ed-st b{font-weight:500;color:var(--tx2)}

/* ---------- preview ---------- */
.preview{
  flex:1;overflow-y:auto;
  background:var(--bg);
  min-width:0;
}
.pr-inner{padding:36px 40px;max-width:780px;margin:0 auto}

/* markdown rendering */
.md{font-size:15px;line-height:1.85;color:var(--tx1)}

.md h1,.md h2,.md h3,.md h4,.md h5,.md h6{
  font-weight:600;line-height:1.25;color:#fff;
  margin:1.4em 0 .5em;letter-spacing:-0.3px;
}
.md h1{font-size:1.75em}
.md h2{font-size:1.4em}
.md h3{font-size:1.15em}

.md p{margin:.7em 0}

.md a{color:var(--accent);text-decoration:none}
.md a:hover{text-decoration:underline}

.md strong{font-weight:600;color:#fff}
.md em{color:var(--tx2)}
.md del{color:var(--tx3)}
.md code{
  font:.88em var(--mono);
  background:var(--bg3);padding:2px 6px;
  border-radius:3px;color:var(--accent);
}
.md pre{
  background:var(--bg2);
  border:1px solid var(--bdr);
  border-radius:var(--r8);padding:20px;
  margin:.7em 0;overflow-x:auto;
}
.md pre code{background:none;padding:0;font-size:.84em;color:var(--tx1);line-height:1.7}
.md blockquote{
  margin:.7em 0;padding:14px 20px;
  border-left:2px solid var(--accent);
  background:var(--accent-bg);
  border-radius:0 var(--r6) var(--r6) 0;
  color:var(--tx2);
}
.md ul,.md ol{padding-left:1.5em;margin:.5em 0}
.md li{margin:.2em 0}
.md li::marker{color:var(--tx3)}
.md table{
  border-collapse:collapse;width:100%;
  margin:.7em 0;font-size:.9em;
  border-radius:var(--r6);overflow:hidden;
}
.md th,.md td{border:1px solid var(--bdr);padding:8px 14px;text-align:left}
.md th{background:var(--bg2);font-weight:600;color:var(--tx1)}
.md tr:nth-child(even){background:rgba(255,255,255,0.015)}
.md img{max-width:100%;border-radius:var(--r6);margin:.5em 0}
.md hr{border:none;border-top:1px solid var(--bdr);margin:2em 0}
.md input[type="checkbox"]{accent-color:var(--accent);margin-right:6px}

.pr-svg{padding:24px;display:flex;justify-content:center}
.pr-svg svg{max-width:100%;max-height:65vh}
.pr-empty{
  display:flex;align-items:center;justify-content:center;
  height:100%;flex-direction:column;gap:12px;
  color:var(--tx3);font-size:13px;
}

/* ---------- context menu ---------- */
.cmenu{
  position:fixed;z-index:100;
  background:var(--bg2);
  border:1px solid var(--bdr2);
  border-radius:var(--r8);padding:4px 0;
  min-width:150px;display:none;
  box-shadow:0 8px 30px rgba(0,0,0,.4);
}
.cmenu-item{
  padding:6px 14px;font-size:12px;
  color:var(--tx2);cursor:pointer;
  transition:all .1s;
}
.cmenu-item:hover{background:rgba(255,255,255,0.04);color:var(--tx1)}
.cmenu-sep{height:1px;background:var(--bdr);margin:4px 0}

/* ---------- modal ---------- */
.md-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  z-index:50;display:none;
  align-items:center;justify-content:center;
}
.md-overlay.open{display:flex}
.md-box{
  background:var(--bg2);
  border:1px solid var(--bdr2);
  border-radius:var(--r12);padding:24px;
  min-width:300px;max-width:420px;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.md-box h3{font-size:14px;font-weight:600;margin-bottom:14px}
.md-box input{
  width:100%;padding:7px 12px;
  background:var(--bg3);border:1px solid var(--bdr);
  border-radius:var(--r6);outline:none;
  color:var(--tx1);font-size:13px;font-family:var(--font);
  margin-bottom:14px;
  transition:border-color .15s;
}
.md-box input:focus{border-color:var(--accent)}
.md-box input::placeholder{color:var(--tx3)}
.md-box .md-act{display:flex;gap:8px;justify-content:flex-end}
.md-box button{
  padding:6px 16px;border-radius:var(--r6);
  cursor:pointer;font-size:12px;font-family:var(--font);
  border:1px solid var(--bdr);
  background:transparent;color:var(--tx2);
  transition:all .15s;
}
.md-box button:hover{background:rgba(255,255,255,.04);color:var(--tx1)}
.md-box button.pri{
  background:var(--accent-bg);
  color:var(--accent);
  border-color:rgba(212,165,116,.2);
}
.md-box button.pri:hover{background:rgba(212,165,116,.18)}
.md-box button.danger{color:var(--red);border-color:var(--red-bg)}
.md-box button.danger:hover{background:var(--red-bg)}

/* ---------- toast ---------- */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--bg2);border:1px solid var(--bdr);
  padding:8px 20px;border-radius:20px;
  font-size:12px;color:var(--tx2);
  z-index:60;opacity:0;
  transition:opacity .25s;pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.35);
}
.toast.show{opacity:1}

/* ---------- mobile ---------- */
@media(max-width:768px){
  .top-c{display:none}
  .sidebar{
    position:fixed;left:0;top:44px;bottom:0;z-index:15;
    width:280px;transform:translateX(-100%);
    transition:transform .25s cubic-bezier(0.16,1,0.3,1);
  }
  .sidebar.open{transform:translateX(0);box-shadow:8px 0 30px rgba(0,0,0,.5)}
  .drag{display:none}
  .editor-panel{border-right:none}
  .preview{display:none}
  .preview.open{display:block}
  .editor-panel.hide{display:none}
  .pr-inner{padding:24px 20px}
}

/* ---------- mobile tab bar ---------- */
.mb{display:none;height:38px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0}
.mb>div{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.mb>div.cur{color:var(--accent);border-bottom-color:var(--accent)}
@media(max-width:768px){.mb{display:flex}}
</style>
</head>
<body>

<div class="top">
  <div class="top-l">
    <button class="btn" onclick="toggleSide()" id="tog-side">☰</button>
    <svg width="13" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
  </div>
  <div class="top-c">
    <button class="btn" onclick="ins('**','**')" title="Bold"><b>B</b></button>
    <button class="btn" onclick="ins('*','*')" title="Italic"><i>I</i></button>
    <button class="btn" onclick="ins('~~','~~')" title="Strikethrough"><s>S</s></button>
    <span class="sep"></span>
    <button class="btn" onclick="insH()">H</button>
    <button class="btn" onclick="insL('ul')">List</button>
    <button class="btn" onclick="insL('ol')">1.</button>
    <button class="btn" onclick="ins('> ','')">&ldquo;</button>
    <span class="sep"></span>
    <button class="btn" onclick="ins('\`','\`')">&lt;/&gt;</button>
    <button class="btn" onclick="ins('\n\`\`\`\n\n\`\`\`\n','')">Code</button>
    <button class="btn" onclick="ins('[','](url)')">Link</button>
    <button class="btn" onclick="ins('![alt](','')')">Img</button>
    <span class="sep"></span>
    <button class="btn" onclick="insTable()">Table</button>
    <button class="btn" onclick="ins('---\n','')">HR</button>
  </div>
  <div class="top-r">
    <button class="btn" onclick="toggleLN()" id="btn-ln">#</button>
    <button class="btn" onclick="downloadCur()">Export</button>
    <button class="btn primary" onclick="copyHTML()">Copy HTML</button>
  </div>
</div>

<div class="mb">
  <div class="cur" id="mb-files" onclick="mobTab('files')">Files</div>
  <div id="mb-edit" onclick="mobTab('edit')">Edit</div>
  <div id="mb-preview" onclick="mobTab('preview')">Preview</div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="side-hd">
      <span>Files</span>
      <div class="side-hd-act">
        <button onclick="mkFolder(null)">+</button>
        <button onclick="mkFile(null)">N</button>
        <input type="file" id="upInput" accept=".md,.txt,.svg,.markdown" style="display:none" multiple onchange="doUpload(event)">
        <button onclick="document.getElementById('upInput').click()">&uarr;</button>
      </div>
    </div>
    <div class="side-tree" id="tree"
      ondragover="treeDragover(event)"
      ondragleave="treeDragleave(event)"
      ondrop="treeDrop(event)"></div>
  </div>

  <div class="drag" id="dragL" onmousedown="resizeStart('L',event)"></div>

  <div class="editor-panel" id="edPanel">
    <div class="ed-hd">
      <div class="ed-dot"></div><div class="ed-dot"></div><div class="ed-dot"></div>
      <div class="ed-title" id="edTitle"></div>
      <div class="ed-opt">
        <button onclick="toggleWrap()" id="btn-wrap">&#8629;</button>
        <button onclick="toggleMono()" id="btn-mono">A</button>
      </div>
    </div>
    <div class="ed-area" id="edArea">
      <div class="ed-ln" id="edLn"><span></span></div>
      <textarea id="editor" placeholder="Open or create a file to start writing..."></textarea>
    </div>
    <div class="ed-st">
      <span id="st-ln"><b>0</b> lines</span>
      <span id="st-wd"><b>0</b> words</span>
      <span id="st-ch"><b>0</b> chars</span>
      <span style="margin-left:auto" id="st-sv"></span>
    </div>
  </div>

  <div class="drag" id="dragR" onmousedown="resizeStart('R',event)"></div>

  <div class="preview" id="prevPanel">
    <div class="pr-inner md" id="preview"></div>
  </div>
</div>

<div class="cmenu" id="cmenu"></div>

<div class="md-overlay" id="mdOver"><div class="md-box" id="mdBox"></div></div>

<div class="toast" id="toast"></div>

<script>
// ---- DB ----
const DB='md-editor-db',DBV=1;let db;
function opnDB(){return new Promise((ok,fail)=>{const r=indexedDB.open(DB,DBV);r.onupgradeneeded=e=>{const d=e.target.result;d.objectStoreNames.contains('folders')||d.createObjectStore('folders',{keyPath:'id'});d.objectStoreNames.contains('files')||d.createObjectStore('files',{keyPath:'id'});d.objectStoreNames.contains('settings')||d.createObjectStore('settings',{keyPath:'key'})};r.onsuccess=e=>{db=e.target.result;ok(db)};r.onerror=e=>fail(e)})}
function sto(s,m){return db.transaction(s,m).objectStore(s)}
function put(s,o){return new Promise(r=>{const t=sto(s,'readwrite');t.put(o);t.transaction.oncomplete=()=>r()})}
function get(s,i){return new Promise(r=>{const t=sto(s,'readonly').get(i);t.onsuccess=()=>r(t.result)})}
function all(s){return new Promise(r=>{const t=sto(s,'readonly').getAll();t.onsuccess=()=>r(t.result)})}
function del(s,i){return new Promise(r=>{const t=sto(s,'readwrite').delete(i);t.transaction.oncomplete=()=>r()})}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

// ---- state ----
let cfid=null,cfile=null,texp={},tdata=null;
let lnOn=true,wrapOn=true,monoOn=true;
let dgnode=null,dfid=null;

marked.setOptions({gfm:true,breaks:true,highlight:(c,l)=>{try{return l&&hljs.getLanguage(l)?hljs.highlight(c,{language:l}).value:hljs.highlightAuto(c).value}catch{return c}}});

const ed=document.getElementById('editor'),pr=document.getElementById('preview');
const edPanel=document.getElementById('edPanel'),prPanel=document.getElementById('prevPanel');
const edLn=document.getElementById('edLn'),tree=document.getElementById('tree');
const sidebar=document.getElementById('sidebar'),edTitle=document.getElementById('edTitle');
const stSv=document.getElementById('st-sv');

async function init(){await opnDB();document.getElementById('btn-ln').classList.add('on');await ldtree();await ldLast()}init();

// ---- tree ----
async function ldtree(){tdata={folders:await all('folders'),files:await all('files')};rtree()}
function rtree(){
  const fds=tdata.folders,fls=tdata.files;
  const topFds=fds.filter(f=>!f.parentId).sort((a,b)=>(a.sort||0)-(b.sort||0));
  const topFls=fls.filter(f=>!f.folderId);
  let h='';
  for(const fd of topFds)h+=rFolder(fd,fds,fls);
  for(const fl of topFls)h+=rFile(fl);
  if(!h)h='<div style="padding:24px;text-align:center;color:var(--tx3);font-size:12px;line-height:1.8">No files yet</div>';
  tree.innerHTML=h;
}
function rFolder(fd,fds,fls){
  const on=texp[fd.id]!==false;
  const sfs=fds.filter(f=>f.parentId===fd.id).sort((a,b)=>(a.sort||0)-(b.sort||0));
  const sfls=fls.filter(f=>f.folderId===fd.id);
  let h=`<div class="tree-group" data-fid="${fd.id}"
    ondragover="itemDragover(event,'${fd.id}')"
    ondragleave="itemDragleave(event)"
    ondrop="itemDrop(event,'${fd.id}')">`;
  h+=`<div class="tree-item f" oncontextmenu="cm(event,'folder','${fd.id}')">
    <span class="ti-arrow${on?' on':''}" onclick="event.stopPropagation();tog('${fd.id}')">&#9654;</span>
    <span class="ti-ico" style="color:#d4a574">&#128193;</span>
    <span class="ti-name" onclick="tog('${fd.id}')">${esc(fd.name)}</span>
    <span class="ti-act">
      <button onclick="event.stopPropagation();rnFd('${fd.id}')" title="Rename">&#9998;</button>
      <button class="del" onclick="event.stopPropagation();rmFd('${fd.id}')" title="Delete">&times;</button>
    </span>
  </div>`;
  h+=`<div class="tree-children${on?'':' folded'}">`;
  for(const sf of sfs)h+=rFolder(sf,fds,fls);
  for(const sf of sfls)h+=rFile(sf);
  h+='</div></div>';
  return h;
}
function rFile(fl){
  const ico=fl.type==='svg'?'&#128444;':fl.type==='txt'?'&#128196;':'&#128462;';
  const c=fl.type==='svg'?'#a099d4':'var(--tx3)';
  const cls=fl.id===cfid?'tree-item fl sel':'tree-item fl';
  return `<div class="${cls}" data-file-id="${fl.id}" draggable="true"
    onclick="sel('${fl.id}')"
    ondragstart="fsDragStart(event,'${fl.id}')"
    oncontextmenu="cm(event,'file','${fl.id}')">
    <span class="ti-ico" style="color:${c}">${ico}</span>
    <span class="ti-name">${esc(fl.name)}</span>
    <span class="ti-act">
      <button onclick="event.stopPropagation();rnFl('${fl.id}','${esc(fl.name)}')" title="Rename">&#9998;</button>
      <button class="del" onclick="event.stopPropagation();rmFl('${fl.id}')" title="Delete">&times;</button>
    </span>
  </div>`;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function tog(id){texp[id]=texp[id]===false?true:false;await saveSettings();rtree()}

async function sel(id){
  if(cfid)await saveSilent();
  const fl=await get('files',id);if(!fl)return;
  cfid=id;cfile=fl;edTitle.textContent=fl.name;
  ed.value=fl.content||'';ed.readOnly=fl.type==='svg';
  updPrev();updLn();rtree();
}

async function saveSilent(){
  if(!cfile||!cfid||cfile.type==='svg')return;
  const c=ed.value;
  if(c===cfile.content)return;
  cfile.content=c;cfile.updatedAt=Date.now();
  await put('files',cfile);
}
async function saveCur(){await saveSilent();stSv.textContent='Saved';setTimeout(()=>{stSv.textContent=''},1500)}

// ---- file ops ----
async function mkFolder(pid){
  const n=prompt('Folder name:','New Folder');if(!n||!n.trim())return;
  await put('folders',{id:uid(),name:n.trim(),parentId:pid||null,sort:0,createdAt:Date.now()});
  await ldtree();texp[n.trim()]=true;rtree();
}
async function mkFile(fid){
  const n=prompt('File name:','untitled.md');if(!n||!n.trim())return;
  const t=n.endsWith('.svg')?'svg':n.endsWith('.txt')?'txt':'md';
  const fl={id:uid(),name:n.trim(),type:t,folderId:fid||null,content:'',createdAt:Date.now(),updatedAt:Date.now()};
  await put('files',fl);
  if(fid)texp[fid]=true;
  if(cfid)await saveSilent();
  cfid=fl.id;cfile=fl;await ldtree();
  edTitle.textContent=fl.name;ed.value='';ed.readOnly=fl.type==='svg';
  updPrev();updLn();
}
async function doUpload(e){
  for(const f of e.target.files){
    const c=await new Promise(r=>{const fr=new FileReader();fr.onload=ev=>r(ev.target.result);fr.readAsText(f)});
    await put('files',{id:uid(),name:f.name,type:f.name.endsWith('.svg')?'svg':f.name.endsWith('.txt')?'txt':'md',folderId:null,content:c,createdAt:Date.now(),updatedAt:Date.now()});
  }
  await ldtree();rtree();toast('Imported '+e.target.files.length+' file(s)');e.target.value='';
}
async function rnFl(id,oname){
  const nn=prompt('Rename:',oname);if(!nn||!nn.trim()||nn.trim()===oname)return;
  const fl=await get('files',id);if(!fl)return;
  fl.name=nn.trim();fl.type=nn.endsWith('.svg')?'svg':nn.endsWith('.txt')?'txt':'md';fl.updatedAt=Date.now();
  await put('files',fl);if(cfid===id){cfile=fl;edTitle.textContent=fl.name}
  await ldtree();rtree();
}
async function rnFd(id){
  const fd=await get('folders',id);if(!fd)return;
  const nn=prompt('Rename folder:',fd.name);if(!nn||!nn.trim()||nn.trim()===fd.name)return;
  fd.name=nn.trim();await put('folders',fd);await ldtree();rtree();
}
async function rmFl(id){
  if(!confirm('Delete this file?'))return;
  await del('files',id);
  if(cfid===id){cfid=null;cfile=null;ed.value='';edTitle.textContent='';updPrev()}
  await ldtree();rtree();
}
async function rmFd(id){
  if(!confirm('Delete this folder and everything inside?'))return;
  const fds=await all('folders'),fls=await all('files');
  async function rec(fid){
    for(const fd of fds.filter(f=>f.parentId===fid))await rec(fd.id);
    for(const fl of fls.filter(f=>f.folderId===fid)){
      if(fl.id===cfid){cfid=null;cfile=null;ed.value='';edTitle.textContent='';updPrev()}
      await del('files',fl.id);
    }
    await del('folders',fid);
  }
  await rec(id);await ldtree();rtree();
}

// ---- drag & drop ----
function fsDragStart(e,id){dfid=id;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);const img=new Image();img.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';e.dataTransfer.setDragImage(img,0,0);e.target.addEventListener('dragend',function cl(){if(dgnode){dgnode.classList.remove('drop-target');dgnode=null}dfid=null;e.target.removeEventListener('dragend',cl)})}
function itemDragover(e,fid){
  if(!dfid){e.dataTransfer.dropEffect='none';return}
  e.preventDefault();e.dataTransfer.dropEffect='move';
  const el=e.currentTarget;
  if(dgnode)dgnode.classList.remove('drop-target');el.classList.add('drop-target');dgnode=el;
}
function itemDragleave(e){const el=e.currentTarget;if(el.contains(e.relatedTarget))return;el.classList.remove('drop-target')}
async function itemDrop(e,fid){
  e.stopPropagation();e.preventDefault();
  const el=e.currentTarget;el.classList.remove('drop-target');dgnode=null;
  if(!dfid)return;const fl=await get('files',dfid);if(!fl)return;
  fl.folderId=fid;fl.updatedAt=Date.now();await put('files',fl);
  if(cfid===dfid)cfile=fl;dfid=null;texp[fid]=true;await ldtree();rtree();
}
function treeDragover(e){if(!dfid)return;e.preventDefault()}
function treeDragleave(e){if(dgnode){dgnode.classList.remove('drop-target');dgnode=null}}
async function treeDrop(e){
  e.preventDefault();if(!dfid)return;
  let tf=null;
  if(dgnode){tf=dgnode.getAttribute('data-fid');dgnode.classList.remove('drop-target');dgnode=null}
  const fl=await get('files',dfid);if(!fl)return;
  fl.folderId=tf;fl.updatedAt=Date.now();await put('files',fl);
  if(cfid===dfid)cfile=fl;dfid=null;if(tf)texp[tf]=true;await ldtree();rtree();
}

// ---- context menu ----
function cm(e,type,id){
  e.preventDefault();const m=document.getElementById('cmenu');
  let h='';
  if(type==='folder'){h+=`<div class="cmenu-item" onclick="mkFile('${id}');hcm()">New File</div><div class="cmenu-item" onclick="mkFolder('${id}');hcm()">New Folder</div><div class="cmenu-sep"></div><div class="cmenu-item" onclick="rnFd('${id}');hcm()">Rename</div><div class="cmenu-item" onclick="rmFd('${id}');hcm()" style="color:var(--red)">Delete</div>`}
  else{h+=`<div class="cmenu-item" onclick="rnFl('${id}','');hcm()">Rename</div><div class="cmenu-sep"></div><div class="cmenu-item" onclick="dlFile('${id}');hcm()">Download</div><div class="cmenu-item" onclick="rmFl('${id}');hcm()" style="color:var(--red)">Delete</div>`}
  m.innerHTML=h;m.style.display='block';m.style.left=Math.min(e.clientX,innerWidth-170)+'px';m.style.top=Math.min(e.clientY,innerHeight-200)+'px';
  setTimeout(()=>document.addEventListener('click',hcm,{once:true}),0);
}
function hcm(){document.getElementById('cmenu').style.display='none'}

// ---- download ----
async function dlFile(id){const fl=await get('files',id);if(!fl)return;const b=new Blob([fl.content],{type:fl.type==='svg'?'image/svg+xml':'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fl.name;a.click();URL.revokeObjectURL(a.href)}
async function downloadCur(){
  if(!cfile){const b=new Blob([ed.value],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='untitled.md';a.click();URL.revokeObjectURL(a.href);return}
  await saveSilent();dlFile(cfid);
}

// ---- preview ----
function updPrev(){
  if(cfile&&cfile.type==='svg'){pr.innerHTML='<div class="pr-svg">'+cfile.content+'</div>';return}
  pr.innerHTML=ed.value?marked.parse(ed.value):'<div class="pr-empty"><div style="opacity:0.1"><svg width="36" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><span>Preview</span></div>';
  updStat()
}
function updStat(){
  const t=ed.value,ln=t?t.split('\n').length:0,wd=t.trim()?t.trim().split(/\s+/).length:0;
  document.getElementById('st-ln').innerHTML='<b>'+ln+'</b> lines';
  document.getElementById('st-wd').innerHTML='<b>'+wd+'</b> words';
  document.getElementById('st-ch').innerHTML='<b>'+t.length+'</b> chars';
}
function updLn(){
  const ln=ed.value.split('\n').length;let h='';
  for(let i=1;i<=ln;i++)h+='<span>'+i+'</span>';
  edLn.innerHTML=h;edLn.style.display=lnOn?'':'none';
  document.getElementById('edArea').classList.toggle('show-ln',lnOn);
}
function toggleLN(){lnOn=!lnOn;document.getElementById('btn-ln').classList.toggle('on',lnOn);updLn()}
function toggleWrap(){wrapOn=!wrapOn;document.getElementById('btn-wrap').classList.toggle('on',!wrapOn);ed.style.whiteSpace=wrapOn?'':'pre';ed.style.overflowX=wrapOn?'':'auto'}
function toggleMono(){monoOn=!monoOn;document.getElementById('btn-mono').classList.toggle('on',!monoOn);ed.style.fontFamily=monoOn?'':'var(--font)'}

function copyHTML(){updPrev();const h='<!DOCTYPE html>\n<html>\n<head><meta charset="UTF-8"><style>body{font-family:-apple-system,sans-serif;max-width:760px;margin:48px auto;padding:0 24px;line-height:1.85;color:#222}pre{background:#f5f5f5;padding:16px;border-radius:6px}code{background:#f5f5f5;padding:2px 5px;border-radius:3px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ddd;padding:8px}th{background:#f9f9f9}img{max-width:100%}</style></head>\n<body>\n'+pr.innerHTML+'\n</body>\n</html>';navigator.clipboard.writeText(h).then(()=>toast('Copied'))}

// ---- settings ----
async function saveSettings(){await put('settings',{key:'texp',value:JSON.stringify(texp)})}
async function ldLast(){
  const s=await get('settings','texp');if(s)texp=JSON.parse(s.value);
  const lf=await get('settings','lastFile');if(!lf)return;
  const fl=await get('files',lf.value);if(!fl)return;
  cfid=lf.value;cfile=fl;edTitle.textContent=fl.name;ed.value=fl.content||'';ed.readOnly=fl.type==='svg';
  updPrev();updLn();
}

// ---- editor events ----
let st;
ed.addEventListener('input',()=>{updPrev();updLn();clearTimeout(st);st=setTimeout(async()=>{await saveSilent();if(cfid)await put('settings',{key:'lastFile',value:cfid})},600)});
ed.addEventListener('scroll',()=>{edLn.style.transform='translateY('+(-ed.scrollTop+28)+'px)'});
ed.addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();const s=ed.selectionStart,d=ed.selectionEnd;ed.value=ed.value.substring(0,s)+'  '+ed.value.substring(d);ed.selectionStart=ed.selectionEnd=s+2;updPrev();updLn()}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCur()}
});

// ---- toolbar ----
function ins(b,a){const s=ed.selectionStart,d=ed.selectionEnd,v=ed.value.substring(s,d);ed.value=ed.value.substring(0,s)+b+v+a+ed.value.substring(d);ed.selectionStart=s+b.length;ed.selectionEnd=d+b.length;ed.focus();updPrev();updLn()}
function insH(){const s=ed.selectionStart,ls=ed.value.lastIndexOf('\n',s-1)+1;const le=ed.value.indexOf('\n',s)===-1?ed.value.length:ed.value.indexOf('\n',s);const line=ed.value.substring(ls,le);const m=line.match(/^(#{1,6})\s/);let l=m?m[1].length:0;l=l>=6?0:l+1;ed.value=ed.value.substring(0,ls)+(l===0?line.replace(/^#{1,6}\s*/,''):'#'.repeat(l)+' '+line.replace(/^#{1,6}\s*/,''))+ed.value.substring(le);ed.focus();updPrev();updLn()}
function insL(t){const s=ed.selectionStart,ls=ed.value.lastIndexOf('\n',s-1)+1;const le=ed.value.indexOf('\n',s)===-1?ed.value.length:ed.value.indexOf('\n',s);const line=ed.value.substring(ls,le);const p=t==='ul'?'- ':'1. ';const h=/^[\-\*\+]\s/.test(line)||/^\d+\.\s/.test(line);ed.value=ed.value.substring(0,ls)+(h?line.replace(/^[\-\*\+]\s|^\d+\.\s/,''):p+line)+ed.value.substring(le);ed.focus();updPrev();updLn()}
function insTable(){const t='\n| H1 | H2 | H3 |\n|---|---|---|\n|   |   |   |\n';const s=ed.selectionStart;ed.value=ed.value.substring(0,s)+t+ed.value.substring(s);ed.selectionStart=ed.selectionEnd=s+t.length;ed.focus();updPrev();updLn()}

// ---- sidebar toggle ----
function toggleSide(){
  if(innerWidth<=768){sidebar.classList.toggle('open');return}
  sidebar.classList.toggle('closed');
  document.getElementById('dragL').style.display=sidebar.classList.contains('closed')?'none':'';
}

// ---- resize ----
let rs=null,rsX,rsW;
function resizeStart(t,e){
  rs=t;rsX=e.clientX;
  if(t==='L')rsW=sidebar.offsetWidth;
  else{rsW={ed:edPanel.offsetWidth,pr:prPanel.offsetWidth,tot:edPanel.offsetWidth+prPanel.offsetWidth}}
  document.body.style.cursor='col-resize';document.body.style.userSelect='none';
  document.addEventListener('mousemove',rsMove);document.addEventListener('mouseup',rsEnd);
  document.getElementById(t==='L'?'dragL':'dragR').classList.add('on');
}
function rsMove(e){
  const dx=e.clientX-rsX;
  if(rs==='L'){let w=rsW+dx;w=Math.max(50,Math.min(500,w));sidebar.style.width=w+'px'}
  else{let ew=rsW.ed+dx;const min=200;if(ew<min)ew=min;if(rsW.tot-ew<min)ew=rsW.tot-min;edPanel.style.flex='none';edPanel.style.width=ew+'px';prPanel.style.flex='none';prPanel.style.width=(rsW.tot-ew)+'px'}
}
function rsEnd(){
  document.body.style.cursor='';document.body.style.userSelect='';
  document.removeEventListener('mousemove',rsMove);document.removeEventListener('mouseup',rsEnd);
  document.querySelectorAll('.drag').forEach(b=>b.classList.remove('on'));rs=null;
}

// ---- mobile ----
function mobTab(t){
  document.querySelectorAll('.mb>div').forEach(e=>e.classList.remove('cur'));
  document.getElementById('mb-'+t).classList.add('cur');
  if(t==='files'){sidebar.classList.add('open');edPanel.classList.add('hide');prPanel.classList.remove('open')}
  else if(t==='edit'){sidebar.classList.remove('open');edPanel.classList.remove('hide');prPanel.classList.remove('open')}
  else{sidebar.classList.remove('open');edPanel.classList.add('hide');prPanel.classList.add('open');updPrev()}
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}

document.addEventListener('click',e=>{
  if(innerWidth<=768&&sidebar.classList.contains('open')&&!sidebar.contains(e.target)&&!e.target.closest('#tog-side'))sidebar.classList.remove('open');
});
</script>
