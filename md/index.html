<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor — EasyDoIt</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
/* ============================================
   Design System — Dark Glass Developer Tool
   ============================================ */
*,::before,::after{margin:0;padding:0;box-sizing:border-box}

:root{
  /* Core palette */
  --bg-base:#09090d;
  --bg-elevated:#111118;
  --bg-surface:#16161f;
  --bg-surface2:#1c1c27;
  --bg-glass:rgba(22,22,31,0.85);

  /* Borders */
  --border-subtle:rgba(255,255,255,0.04);
  --border-default:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.10);
  --border-accent:rgba(99,102,241,0.35);

  /* Text */
  --text-primary:rgba(255,255,255,0.92);
  --text-secondary:rgba(255,255,255,0.55);
  --text-tertiary:rgba(255,255,255,0.30);
  --text-disabled:rgba(255,255,255,0.15);

  /* Accent */
  --accent:#818cf8;
  --accent-strong:#6366f1;
  --accent-soft:rgba(99,102,241,0.12);
  --accent-glow:rgba(99,102,241,0.25);
  --accent-gradient:linear-gradient(135deg,#818cf8,#6366f1,#8b5cf6);

  /* Semantic */
  --success:#34d399;
  --warning:#fbbf24;
  --danger:#f87171;
  --danger-soft:rgba(248,113,113,0.12);
  --info:#38bdf8;

  /* Surfaces */
  --shadow-sm:0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow:0 0 20px rgba(99,102,241,0.15);

  /* Radii */
  --radius-xs:4px;
  --radius-sm:8px;
  --radius-md:12px;
  --radius-lg:16px;
  --radius-xl:20px;

  /* Spacing */
  --space-xs:4px;
  --space-sm:8px;
  --space-md:12px;
  --space-lg:16px;
  --space-xl:24px;

  /* Typography */
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
  --mono:"SF Mono","JetBrains Mono","Fira Code","Cascadia Code","Menlo",monospace;

  /* Motion */
  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --ease-in-out:cubic-bezier(0.65,0,0.35,1);
  --duration-fast:120ms;
  --duration-base:200ms;
  --duration-slow:350ms;
}

/* ============================================
   Base
   ============================================ */
body{
  font-family:var(--font);
  background:var(--bg-base);
  color:var(--text-primary);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

::selection{background:var(--accent-soft);color:var(--accent)}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:20px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.14)}
::-webkit-scrollbar-corner{background:transparent}

/* ============================================
   Header
   ============================================ */
.hdr{
  background:var(--bg-glass);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border-subtle);
  height:48px;
  padding:0 var(--space-lg);
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  z-index:30;
  gap:var(--space-md);
  position:relative;
}

.hdr::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--border-accent),transparent);
  opacity:0.5;
}

.hl{display:flex;align-items:center;gap:var(--space-md);flex-shrink:0}
.hl-logo{
  width:28px;height:28px;
  border-radius:var(--radius-sm);
  background:var(--accent-gradient);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:700;
  font-family:var(--mono);
  box-shadow:0 2px 12px rgba(99,102,241,0.3);
}
.hl-t{font-size:13px;font-weight:600;letter-spacing:-0.3px;white-space:nowrap}
.hl-t span{color:var(--text-tertiary);font-weight:400;margin-left:2px}

/* Toolbar */
.hm{
  display:flex;align-items:center;gap:var(--space-xs);
  overflow-x:auto;scrollbar-width:none;
  flex:1;justify-content:center;
}
.hm::-webkit-scrollbar{display:none}

.btn{
  padding:5px 10px;
  border:1px solid var(--border-default);
  border-radius:var(--radius-xs);
  background:rgba(255,255,255,0.03);
  color:var(--text-secondary);
  cursor:pointer;
  font-size:11px;font-family:var(--font);font-weight:500;
  transition:all var(--duration-fast) var(--ease-out);
  white-space:nowrap;
  display:inline-flex;align-items:center;gap:3px;
  line-height:1.4;height:30px;
  position:relative;
}
.btn:hover{
  background:rgba(255,255,255,0.06);
  color:var(--text-primary);
  border-color:var(--border-strong);
}
.btn:active{transform:scale(0.96)}
.btn-p{
  background:var(--accent-gradient);
  border-color:transparent;
  color:#fff;
  font-weight:600;
  box-shadow:0 2px 8px var(--accent-glow);
}
.btn-p:hover{
  color:#fff;
  box-shadow:0 4px 16px var(--accent-glow);
  transform:translateY(-1px);
}
.btn-p:active{transform:scale(0.96) translateY(0)}
.btn-s{font-size:11px;padding:4px 8px}
.btn-gh{
  background:transparent;
  border-color:transparent;
  padding:4px 6px;
  color:var(--text-secondary);
}
.btn-gh:hover{background:rgba(255,255,255,0.05);color:var(--text-primary);border-color:transparent}

.hr{display:flex;align-items:center;gap:var(--space-xs);flex-shrink:0}

.divider{width:1px;height:20px;background:var(--border-default);margin:0 2px}

/* ============================================
   Mobile tabs
   ============================================ */
.mb{display:none;border-bottom:1px solid var(--border-subtle);background:var(--bg-elevated);flex-shrink:0}
.mb-t{flex:1;padding:11px;text-align:center;font-size:12px;font-weight:500;color:var(--text-tertiary);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--duration-base) var(--ease-out)}
.mb-t.act{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-soft)}

/* ============================================
   Main layout
   ============================================ */
.ct{display:flex;flex:1;overflow:hidden}

/* ============================================
   Sidebar (File Tree)
   ============================================ */
.sb{
  width:240px;min-width:50px;
  background:var(--bg-elevated);
  border-right:1px solid var(--border-subtle);
  display:flex;flex-direction:column;
  overflow:hidden;flex-shrink:0;
  transition:width var(--duration-slow) var(--ease-out);
}
.sb.collapsed{width:0;min-width:0;border-right:none}

.sb-header{
  height:40px;padding:0 var(--space-md);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border-subtle);
  flex-shrink:0;gap:var(--space-xs);
}
.sb-header-t{
  font-size:11px;font-weight:600;color:var(--text-tertiary);
  text-transform:uppercase;letter-spacing:0.8px;
}
.sb-header-acts{display:flex;gap:2px}
.sb-header-acts button{
  width:26px;height:26px;
  border:1px solid transparent;
  border-radius:var(--radius-xs);
  background:transparent;
  color:var(--text-tertiary);
  cursor:pointer;font-size:12px;
  transition:all var(--duration-fast) var(--ease-out);
  display:flex;align-items:center;justify-content:center;
}
.sb-header-acts button:hover{background:rgba(255,255,255,0.05);color:var(--text-primary);border-color:var(--border-default)}

.sb-tree{flex:1;overflow-y:auto;padding:var(--space-xs) 0}

/* Tree items */
.tree-group{margin:0}

.tree-item{
  display:flex;align-items:center;
  padding:5px var(--space-sm);
  cursor:pointer;font-size:12px;gap:var(--space-xs);
  color:var(--text-secondary);
  transition:all var(--duration-fast) var(--ease-out);
  border-radius:var(--radius-xs);
  margin:1px var(--space-sm);
  position:relative;user-select:none;
  -webkit-user-drag:element;
}
.tree-item:hover{background:rgba(255,255,255,0.04);color:var(--text-primary)}
.tree-item.act{background:var(--accent-soft);color:var(--accent)}
.tree-item.act .ti-icon{color:var(--accent)!important}
.tree-group.drag-over>.tree-item,
.tree-group.drag-over{background:var(--accent-soft);border-radius:var(--radius-sm)}
.tree-item.drag-over{outline:2px solid var(--accent);outline-offset:-2px;border-radius:var(--radius-xs)}

.tree-item .ti-icon{width:16px;text-align:center;flex-shrink:0;font-size:12px;line-height:1}
.tree-item .ti-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5;font-size:12px}

.tree-item .ti-actions{display:none;gap:2px;flex-shrink:0}
.tree-item:hover .ti-actions{display:flex}
.tree-item .ti-act{
  width:22px;height:22px;padding:0;
  border:none;background:none;
  color:var(--text-tertiary);cursor:pointer;
  font-size:11px;border-radius:var(--radius-xs);
  transition:all var(--duration-fast) var(--ease-out);
  display:flex;align-items:center;justify-content:center;
}
.tree-item .ti-act:hover{background:rgba(255,255,255,0.08);color:var(--text-primary)}
.tree-item .ti-act.del:hover{background:var(--danger-soft);color:var(--danger)}
.tree-item .ti-act.rename:hover{color:var(--accent)}

/* Tree indentation */
.tree-item.folder{padding-left:var(--space-xs)}
.tree-item.file{padding-left:28px}
.tree-children .tree-item.folder{padding-left:20px}
.tree-children .tree-item.file{padding-left:40px}
.tree-children .tree-children .tree-item.folder{padding-left:36px}
.tree-children .tree-children .tree-item.file{padding-left:56px}
.tree-children .tree-children .tree-children .tree-item.folder{padding-left:52px}
.tree-children .tree-children .tree-children .tree-item.file{padding-left:72px}

.tree-item .arrow{
  width:14px;text-align:center;flex-shrink:0;
  font-size:8px;transition:transform var(--duration-fast) var(--ease-out);
  line-height:1;color:var(--text-tertiary);
}
.tree-item .arrow.open{transform:rotate(90deg);color:var(--text-secondary)}

.tree-children{overflow:hidden}
.tree-children.collapsed{display:none}

.tree-inline-input{
  flex:1;
  background:var(--bg-surface2);
  border:1px solid var(--accent);
  border-radius:var(--radius-xs);
  color:var(--text-primary);
  font-size:12px;padding:3px 6px;
  outline:none;font-family:var(--font);
}

/* Drag bar tree */
.drag-bar-tree{
  width:4px;background:transparent;
  cursor:col-resize;flex-shrink:0;z-index:5;
  transition:background var(--duration-fast) var(--ease-out);
  position:relative;
}
.drag-bar-tree::after{
  content:'';position:absolute;inset:0 -2px;
}
.drag-bar-tree:hover,.drag-bar-tree.active{
  background:var(--accent);
  box-shadow:0 0 8px var(--accent-glow);
}

/* ============================================
   Editor Panel
   ============================================ */
.ep{
  flex:1;display:flex;flex-direction:column;
  min-width:0;background:var(--bg-surface);
}

.ep-header{
  height:36px;
  background:var(--bg-surface2);
  border-bottom:1px solid var(--border-subtle);
  display:flex;align-items:center;
  padding:0 var(--space-md);gap:var(--space-sm);
  flex-shrink:0;
}
.ep-dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong)}
.ep-dot:nth-child(1){background:#ff5f57}.ep-dot:nth-child(2){background:#febc2e}.ep-dot:nth-child(3){background:#28c840}
.ep-title{
  font-size:11px;color:var(--text-tertiary);margin-left:var(--space-xs);
  font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ep-cm{display:flex;align-items:center;gap:var(--space-xs);margin-left:auto}
.ep-cmb{
  width:26px;height:26px;
  border:1px solid transparent;border-radius:var(--radius-xs);
  background:transparent;
  color:var(--text-tertiary);cursor:pointer;
  font-size:12px;
  transition:all var(--duration-fast) var(--ease-out);
  display:flex;align-items:center;justify-content:center;
}
.ep-cmb:hover{background:rgba(255,255,255,0.05);color:var(--text-primary);border-color:var(--border-default)}
.ep-cmb.act{background:var(--accent-soft);border-color:var(--border-accent);color:var(--accent)}

.ep-edit{flex:1;position:relative;overflow:hidden}
.ep-edit textarea{
  width:100%;height:100%;
  background:var(--bg-surface);
  border:none;outline:none;resize:none;
  padding:var(--space-lg) 20px;
  font-family:var(--mono);
  font-size:13.5px;line-height:1.75;
  color:var(--text-primary);
  tab-size:2;
  caret-color:var(--accent);
}
.ep-edit textarea::placeholder{color:var(--text-disabled)}

.ep-edit .ln{
  position:absolute;left:0;top:0;bottom:0;
  width:44px;
  background:var(--bg-elevated);
  border-right:1px solid var(--border-subtle);
  overflow:hidden;pointer-events:none;
  padding:var(--space-lg) 0;
}
.ep-edit .ln span{
  display:block;text-align:right;
  padding-right:10px;
  font-size:11.5px;font-family:var(--mono);
  color:var(--text-disabled);line-height:1.75;
  font-variant-numeric:tabular-nums;
}
.ep-edit.show-ln textarea{padding-left:60px}

.ep-st{
  height:24px;
  background:var(--bg-surface2);
  border-top:1px solid var(--border-subtle);
  display:flex;align-items:center;
  padding:0 var(--space-md);
  font-size:10px;color:var(--text-tertiary);
  gap:var(--space-lg);flex-shrink:0;
}
.ep-st span{display:flex;align-items:center;gap:var(--space-xs)}
.ep-st b{color:var(--text-secondary);font-weight:500}

/* ============================================
   Drag bar main
   ============================================ */
.drag-bar-main{
  width:4px;background:transparent;
  cursor:col-resize;flex-shrink:0;z-index:5;
  transition:background var(--duration-fast) var(--ease-out);
}
.drag-bar-main:hover,.drag-bar-main.active{
  background:var(--accent);
  box-shadow:0 0 8px var(--accent-glow);
}

/* ============================================
   Preview Panel
   ============================================ */
.pp{
  flex:1;overflow-y:auto;
  background:var(--bg-base);
  min-width:0;
}
.pp-inner{padding:32px 36px;max-width:860px;margin:0 auto}

.md-body{
  font-size:14.5px;line-height:1.85;
  color:var(--text-primary);
}
.md-body h1,.md-body h2,.md-body h3,.md-body h4,.md-body h5,.md-body h6{
  margin:1.6em 0 .6em;line-height:1.3;font-weight:700;
  letter-spacing:-0.4px;color:#fff;
}
.md-body h1{font-size:1.9em;border-bottom:1px solid var(--border-default);padding-bottom:.35em}
.md-body h2{font-size:1.55em;border-bottom:1px solid var(--border-subtle);padding-bottom:.3em}
.md-body h3{font-size:1.3em}
.md-body h4{font-size:1.15em}
.md-body p{margin:.85em 0}
.md-body a{color:var(--accent);text-decoration:none;transition:color var(--duration-fast)}
.md-body a:hover{color:var(--info)}
.md-body strong{font-weight:700;color:rgba(255,255,255,0.96)}
.md-body em{font-style:italic;color:var(--text-secondary)}
.md-body del{color:var(--text-tertiary)}
.md-body ul,.md-body ol{padding-left:1.6em;margin:.65em 0}
.md-body li{margin:.25em 0}
.md-body li::marker{color:var(--text-tertiary)}
.md-body blockquote{
  margin:.85em 0;padding:var(--space-md) var(--space-lg);
  border-left:3px solid var(--accent);
  background:var(--accent-soft);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  color:var(--text-secondary);
}
.md-body code{
  font-family:var(--mono);font-size:.88em;
  background:var(--bg-surface2);
  padding:2px 7px;border-radius:var(--radius-xs);
  color:var(--accent);
}
.md-body pre{
  background:var(--bg-elevated);
  border:1px solid var(--border-default);
  border-radius:var(--radius-sm);
  padding:var(--space-lg);
  overflow-x:auto;margin:.85em 0;
}
.md-body pre code{background:none;padding:0;color:var(--text-primary);font-size:.85em;line-height:1.65}
.md-body table{
  border-collapse:collapse;width:100%;
  margin:.85em 0;font-size:.92em;
  border-radius:var(--radius-sm);
  overflow:hidden;
}
.md-body th,.md-body td{
  border:1px solid var(--border-default);
  padding:9px 14px;text-align:left;
}
.md-body th{background:var(--bg-surface2);font-weight:600;color:var(--text-primary)}
.md-body tr:nth-child(even){background:rgba(255,255,255,0.02)}
.md-body tr:hover{background:rgba(255,255,255,0.03)}
.md-body img{max-width:100%;border-radius:var(--radius-sm);margin:.65em 0}
.md-body hr{border:none;border-top:1px solid var(--border-default);margin:2em 0}
.md-body input[type="checkbox"]{margin-right:8px;accent-color:var(--accent)}

.pp-svg{display:flex;align-items:flex-start;justify-content:center;padding:var(--space-xl)}
.pp-svg svg{max-width:100%;max-height:70vh;height:auto}
.pp-empty{
  display:flex;align-items:center;justify-content:center;
  height:100%;color:var(--text-tertiary);font-size:13px;
  flex-direction:column;gap:var(--space-md);
}

/* ============================================
   Context menu
   ============================================ */
.cmenu{
  position:fixed;
  background:var(--bg-glass);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  padding:var(--space-xs) 0;
  z-index:100;min-width:160px;
  box-shadow:var(--shadow-lg);
  display:none;
}
.cmenu-item{
  padding:7px 14px;font-size:12px;cursor:pointer;
  color:var(--text-secondary);
  transition:all var(--duration-fast) var(--ease-out);
}
.cmenu-item:hover{background:rgba(255,255,255,0.05);color:var(--text-primary)}
.cmenu-sep{height:1px;background:var(--border-default);margin:var(--space-xs) 0}

/* ============================================
   Modal
   ============================================ */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  z-index:50;display:none;
  align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--bg-glass);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-lg);
  padding:var(--space-xl);
  min-width:320px;max-width:440px;
  box-shadow:var(--shadow-lg);
}
.modal-title{font-size:14px;font-weight:600;margin-bottom:var(--space-md);color:var(--text-primary)}
.modal-input{
  width:100%;padding:8px 12px;
  background:var(--bg-surface2);
  border:1px solid var(--border-default);
  border-radius:var(--radius-sm);
  color:var(--text-primary);font-size:13px;
  font-family:var(--font);outline:none;
  margin-bottom:var(--space-md);
  transition:border-color var(--duration-fast) var(--ease-out);
}
.modal-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.modal-input::placeholder{color:var(--text-tertiary)}
.modal-acts{display:flex;gap:var(--space-sm);justify-content:flex-end}
.modal-acts button{
  padding:7px 18px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:12px;font-family:var(--font);font-weight:500;
  transition:all var(--duration-fast) var(--ease-out);
  border:1px solid var(--border-default);
  background:rgba(255,255,255,0.03);color:var(--text-secondary);
}
.modal-acts button:hover{background:rgba(255,255,255,0.06);color:var(--text-primary)}
.modal-acts button.primary{
  background:var(--accent-gradient);
  border-color:transparent;
  color:#fff;
  box-shadow:0 2px 8px var(--accent-glow);
}
.modal-acts button.primary:hover{box-shadow:0 4px 16px var(--accent-glow)}
.modal-acts button.danger{color:var(--danger);border-color:var(--danger-soft)}
.modal-acts button.danger:hover{background:var(--danger-soft)}

/* ============================================
   Toast
   ============================================ */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--bg-glass);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid var(--border-strong);
  padding:9px 22px;border-radius:24px;
  font-size:12px;color:var(--text-secondary);
  z-index:60;opacity:0;
  transition:opacity var(--duration-slow) var(--ease-out);
  pointer-events:none;
  box-shadow:var(--shadow-md);
}
.toast.show{opacity:1}

/* ============================================
   Responsive
   ============================================ */
@media(max-width:768px){
  .hm{display:none}
  .sb{
    position:fixed;left:0;top:48px;bottom:0;z-index:25;

}
</style>
</head>
<body>

<header class="hdr">
  <div class="hl">
    <button class="btn btn-s btn-gh" onclick="toggleSidebar()" id="btn-sb" title="Toggle sidebar">☰</button>
    <div class="hl-logo">M↓</div>
    <div class="hl-t">Markdown <span>Editor</span></div>
  </div>

</header>

<div class="mb">
  <div class="mb-t act" id="tab-files" onclick="mobileTab('files')">Files</div>
  <div class="mb-t" id="tab-edit" onclick="mobileTab('edit')">Edit</div>
  <div class="mb-t" id="tab-preview" onclick="mobileTab('preview')">Preview</div>
</div>

<div class="ct" id="main-container">
  <div class="sb" id="sidebar">
    <div class="sb-header">
      <span class="sb-header-t">Files</span>
      <div class="sb-header-acts">
        <button onclick="createFolder(null)" title="New Folder">+</button>
        <button onclick="createFile(null)" title="New File">N</button>
        <input type="file" id="fileUpload" accept=".md,.txt,.svg,.markdown" style="display:none" multiple onchange="uploadFiles(event)">
        <button onclick="document.getElementById('fileUpload').click()" title="Import">↑</button>
      </div>
    </div>
    <div class="sb-tree" id="file-tree"
      ondragover="onTreeDragOver(event)"
      ondragleave="onTreeDragLeave(event)"
      ondrop="onTreeDrop(event)">
    </div>
  </div>

  <div class="drag-bar-tree" id="dragBarTree" onmousedown="startResize('tree',event)"></div>

  <div class="ep" id="editor-panel">
    <div class="ep-header">
      <div class="ep-dot"></div><div class="ep-dot"></div><div class="ep-dot"></div>
      <div class="ep-title" id="file-name"></div>
      <div class="ep-cm">
        <button class="ep-cmb" onclick="toggleWrap()" id="btn-wrap" title="Word Wrap">↩</button>
        <button class="ep-cmb" onclick="toggleMonospace()" id="btn-mono" title="Font">A</button>
      </div>
    </div>
    <div class="ep-edit" id="editor-area">
      <div class="ln" id="line-nums"><span></span></div>
      <textarea id="editor" placeholder="Open or create a file to start editing..."></textarea>
    </div>
    <div class="ep-st">
      <span id="stat-lines"><b>0</b> lines</span>
      <span id="stat-words"><b>0</b> words</span>

  <div class="drag-bar-main" id="dragBarMain" onmousedown="startResize('main',event)"></div>

    <div class="pp-inner md-body" id="preview"></div>
  </div>
</div>

<div class="cmenu" id="context-menu"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// === IndexedDB ===
const DB_NAME='md-editor-db', DB_VER=1;
let db;
function openDB(){
  return new Promise((resolve,reject)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('folders')) d.createObjectStore('folders',{keyPath:'id'});
      if(!d.objectStoreNames.contains('files')) d.createObjectStore('files',{keyPath:'id'});
      if(!d.objectStoreNames.contains('settings')) d.createObjectStore('settings',{keyPath:'key'});
    };
    r.onsuccess=e=>{db=e.target.result;resolve(db)};
    r.onerror=e=>reject(e);
  });
}
function tx(store,mode){return db.transaction(store,mode).objectStore(store)}
function dbPut(store,obj){return new Promise(r=>{const t=tx(store,'readwrite');t.put(obj);t.transaction.oncomplete=()=>r()})}
function dbGet(store,id){return new Promise(r=>{const t=tx(store,'readonly').get(id);t.onsuccess=()=>r(t.result)})}
function dbGetAll(store){return new Promise(r=>{const t=tx(store,'readonly').getAll();t.onsuccess=()=>r(t.result)})}
function dbDelete(store,id){return new Promise(r=>{const t=tx(store,'readwrite').delete(id);t.transaction.oncomplete=()=>r()})}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

// === State ===
let currentFileId=null, currentFile=null, treeExpanded={}, treeData=null;
let showLineNums=true, wordWrap=true, monoFont=true;
let dragOverNode=null, dragFileId=null;

// === Marked config ===
marked.setOptions({
  gfm:true, breaks:true,
  highlight:function(code,lang){
    if(lang&&hljs.getLanguage(lang)){
      try{return hljs.highlight(code,{language:lang}).value}catch{}
    }
    return hljs.highlightAuto(code).value;
  }
});

// === Init ===
const editor=document.getElementById('editor');
const preview=document.getElementById('preview');
const previewPanel=document.getElementById('preview-panel');
const editorPanel=document.getElementById('editor-panel');
const lineNums=document.getElementById('line-nums');
const statSave=document.getElementById('stat-save');
const fileName=document.getElementById('file-name');
const fileTree=document.getElementById('file-tree');
const sidebar=document.getElementById('sidebar');

async function init(){
  await openDB();
  document.getElementById('btn-ln').classList.add('act');
  await loadTree();
  await loadLastFile();
}
init();

// === Tree ===
async function loadTree(){
  const folders=await dbGetAll('folders');
  const files=await dbGetAll('files');
  treeData={folders,files};
  renderTree();
}
function renderTree(){
  const {folders,files}=treeData;
  const rootFolders=folders.filter(f=>!f.parentId).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  const rootFiles=files.filter(f=>!f.folderId);
  let h='';
  for(const fd of rootFolders) h+=renderFolder(fd,folders,files);
  for(const fl of rootFiles) h+=renderFile(fl);
  if(!h) h='<div style="padding:20px;text-align:center;font-size:11px;color:var(--text-tertiary);line-height:1.8">No files yet<br><span style="font-size:10px">Create or import to start</span></div>';
  fileTree.innerHTML=h;
}
function renderFolder(fd,folders,files){
  const expanded=treeExpanded[fd.id]!==false;
  const subFolders=folders.filter(f=>f.parentId===fd.id).sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  const subFiles=files.filter(f=>f.folderId===fd.id);
  const arrow=expanded?'arrow open':'arrow';
  let h=`<div class="tree-group" data-folder-id="${fd.id}"
    ondragover="onItemDragOver(event,'${fd.id}')"
    ondragleave="onItemDragLeave(event)"
    ondrop="onItemDrop(event,'${fd.id}')">`;
  h+=`<div class="tree-item folder"
    oncontextmenu="onContextMenu(event,'folder','${fd.id}')">
    <span class="arrow" onclick="event.stopPropagation();toggleFolder('${fd.id}')">▶</span>
    <span class="ti-icon" style="color:#fbbf24">📁</span>
    <span class="ti-name" onclick="toggleFolder('${fd.id}')">${esc(fd.name)}</span>
    <span class="ti-actions">
      <button class="ti-act rename" onclick="event.stopPropagation();renameFolder('${fd.id}','${esc(fd.name)}')" title="Rename">&#9998;</button>
      <button class="ti-act del" onclick="event.stopPropagation();deleteFolder('${fd.id}')" title="Delete">&times;</button>
    </span>
  </div>`;
  h+=`<div class="tree-children${expanded?'':' collapsed'}">`;
  for(const sf of subFolders) h+=renderFolder(sf,folders,files);
  for(const sf of subFiles) h+=renderFile(sf);
  h+='</div></div>';
  return h;
}
function renderFile(fl){
  const icon=fl.type==='svg'?'🖼':fl.type==='txt'?'📝':'📄';
  const color=fl.type==='svg'?'#a78bfa':'var(--text-tertiary)';
  const cls=fl.id===currentFileId?'tree-item file act':'tree-item file';
  return `<div class="${cls}" data-file-id="${fl.id}" draggable="true"
    onclick="selectFile('${fl.id}')"
    ondragstart="onFileDragStart(event,'${fl.id}')"
    oncontextmenu="onContextMenu(event,'file','${fl.id}')">
    <span class="ti-icon" style="color:${color}">${icon}</span>
    <span class="ti-name">${esc(fl.name)}</span>
    <span class="ti-actions">
      <button class="ti-act rename" onclick="event.stopPropagation();renameFile('${fl.id}','${esc(fl.name)}')" title="Rename">&#9998;</button>
      <button class="ti-act del" onclick="event.stopPropagation();deleteFile('${fl.id}')" title="Delete">&times;</button>
    </span>
  </div>`;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
async function toggleFolder(id){
  treeExpanded[id]=treeExpanded[id]===false?true:false;
  await saveSettings();
  renderTree();
}
async function selectFile(id){
  if(currentFileId) await saveCurrentFileSilent();
  const fl=await dbGet('files',id);
  if(!fl)return;
  currentFileId=id;
  currentFile=fl;
  fileName.textContent=fl.name;
  editor.value=fl.content||'';
  editor.readOnly=fl.type==='svg';
  updatePreview();
  updateLineNums();
  renderTree();
}
async function saveCurrentFileSilent(){
  if(!currentFile||!currentFileId)return;
  if(currentFile.type==='svg')return;
  const content=editor.value;
  if(content===currentFile.content)return;
  currentFile.content=content;
  currentFile.updatedAt=Date.now();
  await dbPut('files',currentFile);
}
async function saveCurrent(){
  await saveCurrentFileSilent();
  statSave.textContent='Saved '+new Date().toLocaleTimeString();
  setTimeout(()=>{statSave.textContent=''},2000);
}

// === File ops ===
async function createFolder(parentId){
  const name=prompt('Folder name:','New Folder');
  if(!name||!name.trim())return;
  const fd={id:uid(),name:name.trim(),parentId:parentId||null,sortOrder:0,createdAt:Date.now()};
  await dbPut('folders',fd);
  await loadTree();
  treeExpanded[fd.id]=true;
  renderTree();
}
async function createFile(folderId){
  const name=prompt('File name (with extension):','untitled.md');
  if(!name||!name.trim())return;
  const type=name.endsWith('.svg')?'svg':name.endsWith('.txt')?'txt':'md';
  const fl={id:uid(),name:name.trim(),type,folderId:folderId||null,content:'',createdAt:Date.now(),updatedAt:Date.now()};
  await dbPut('files',fl);
  if(folderId)treeExpanded[folderId]=true;
  if(currentFileId)await saveCurrentFileSilent();
  currentFileId=fl.id;
  currentFile=fl;
  await loadTree();
  fileName.textContent=fl.name;
  editor.value=fl.content||'';
  editor.readOnly=fl.type==='svg';
  updatePreview();
  updateLineNums();
}
async function uploadFiles(e){
  const files=e.target.files;
  if(!files.length)return;
  for(const f of files){
    const type=f.name.endsWith('.svg')?'svg':f.name.endsWith('.txt')?'txt':'md';
    const content=await new Promise(r=>{
      const reader=new FileReader();
      reader.onload=ev=>r(ev.target.result);
      reader.readAsText(f);
    });
    const fl={id:uid(),name:f.name,type,folderId:null,content,createdAt:Date.now(),updatedAt:Date.now()};
    await dbPut('files',fl);
  }
  await loadTree();
  renderTree();
  toast('Imported '+files.length+' file(s)');
  e.target.value='';
}
async function renameFile(id,oldName){
  const newName=prompt('Rename:',oldName);
  if(!newName||!newName.trim()||newName.trim()===oldName)return;
  const fl=await dbGet('files',id);
  if(!fl)return;
  const type=newName.endsWith('.svg')?'svg':newName.endsWith('.txt')?'txt':'md';
  fl.name=newName.trim();fl.type=type;fl.updatedAt=Date.now();
  await dbPut('files',fl);
  if(currentFileId===id){currentFile=fl;fileName.textContent=fl.name;}
  await loadTree();
  renderTree();
}
async function renameFolder(id,oldName){
  const newName=prompt('Rename folder:',oldName);
  if(!newName||!newName.trim()||newName.trim()===oldName)return;
  const fd=await dbGet('folders',id);
  if(!fd)return;
  fd.name=newName.trim();
  await dbPut('folders',fd);
  await loadTree();
  renderTree();
}
async function deleteFile(id){
  if(!confirm('Delete this file?'))return;
  const fl=await dbGet('files',id);
  await dbDelete('files',id);
  if(currentFileId===id){currentFileId=null;currentFile=null;editor.value='';fileName.textContent='';updatePreview();}
  await loadTree();
  renderTree();
}
async function deleteFolder(id){
  if(!confirm('Delete this folder and all its contents?'))return;
  const folders=await dbGetAll('folders');
  const files=await dbGetAll('files');
  async function delRecursive(folderId){
    for(const fd of folders.filter(f=>f.parentId===folderId)) await delRecursive(fd.id);
    for(const fl of files.filter(f=>f.folderId===folderId)){
      if(fl.id===currentFileId){currentFileId=null;currentFile=null;editor.value='';fileName.textContent='';updatePreview();}
      await dbDelete('files',fl.id);
    }
    await dbDelete('folders',folderId);
  }
  await delRecursive(id);
  await loadTree();
  renderTree();
}

// === Drag & Drop ===
function onFileDragStart(e,fileId){
  dragFileId=fileId;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',fileId);
  const img=new Image();img.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
  e.dataTransfer.setDragImage(img,0,0);
  e.target.addEventListener('dragend',function dragEndCleanup(){
    if(dragOverNode){dragOverNode.classList.remove('drag-over');dragOverNode=null;}
    dragFileId=null;
    e.target.removeEventListener('dragend',dragEndCleanup);
  });
}
function onItemDragOver(e,folderId){
  if(!dragFileId){e.dataTransfer.dropEffect='none';return;}
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const el=e.currentTarget;
  if(dragOverNode) dragOverNode.classList.remove('drag-over');
  el.classList.add('drag-over');
  dragOverNode=el;
}
function onItemDragLeave(e){
  const el=e.currentTarget;
  if(el.contains(e.relatedTarget))return;
  el.classList.remove('drag-over');
}
async function onItemDrop(e,folderId){
  e.stopPropagation();
  e.preventDefault();
  const el=e.currentTarget;
  el.classList.remove('drag-over');
  dragOverNode=null;
  if(!dragFileId)return;
  const fl=await dbGet('files',dragFileId);
  if(!fl)return;
  fl.folderId=folderId;fl.updatedAt=Date.now();
  await dbPut('files',fl);
  if(currentFileId===dragFileId)currentFile=fl;
  dragFileId=null;
  treeExpanded[folderId]=true;
  await loadTree();
  renderTree();
}
function onTreeDragOver(e){
  if(!dragFileId)return;
  e.preventDefault();
}
function onTreeDragLeave(e){
  if(dragOverNode){dragOverNode.classList.remove('drag-over');dragOverNode=null;}
}
async function onTreeDrop(e){
  e.preventDefault();
  if(!dragFileId)return;
  let targetFolderId=null;
  if(dragOverNode){
    targetFolderId=dragOverNode.getAttribute('data-folder-id');
    dragOverNode.classList.remove('drag-over');
    dragOverNode=null;
  }
  const fl=await dbGet('files',dragFileId);
  if(!fl)return;
  fl.folderId=targetFolderId;fl.updatedAt=Date.now();
  await dbPut('files',fl);
  if(currentFileId===dragFileId)currentFile=fl;
  dragFileId=null;
  if(targetFolderId) treeExpanded[targetFolderId]=true;
  await loadTree();
  renderTree();
}

// === Context menu ===
function onContextMenu(e,type,id){
  e.preventDefault();
  const cm=document.getElementById('context-menu');
  let h='';
  if(type==='folder'){
    h+=`<div class="cmenu-item" onclick="createFile('${id}');hideCmenu()">New File</div>`;
    h+=`<div class="cmenu-item" onclick="createFolder('${id}');hideCmenu()">New Subfolder</div>`;
    h+=`<div class="cmenu-sep"></div>`;
    h+=`<div class="cmenu-item" onclick="renameFolder('${id}','');hideCmenu()">Rename</div>`;
    h+=`<div class="cmenu-item" onclick="deleteFolder('${id}');hideCmenu()" style="color:var(--danger)">Delete</div>`;
  }else{
    h+=`<div class="cmenu-item" onclick="renameFile('${id}','');hideCmenu()">Rename</div>`;
    h+=`<div class="cmenu-sep"></div>`;
    h+=`<div class="cmenu-item" onclick="downloadFile('${id}');hideCmenu()">Download</div>`;
    h+=`<div class="cmenu-item" onclick="deleteFile('${id}');hideCmenu()" style="color:var(--danger)">Delete</div>`;
  }
  cm.innerHTML=h;
  cm.style.display='block';
  cm.style.left=Math.min(e.clientX,window.innerWidth-180)+'px';
  cm.style.top=Math.min(e.clientY,window.innerHeight-220)+'px';
  setTimeout(()=>document.addEventListener('click',hideCmenu,{once:true}),0);
}
function hideCmenu(){document.getElementById('context-menu').style.display='none'}

// === Download ===
async function downloadFile(id){
  const fl=await dbGet('files',id);
  if(!fl)return;
  const blob=new Blob([fl.content],{type:fl.type==='svg'?'image/svg+xml':'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=fl.name;
  a.click();
  URL.revokeObjectURL(a.href);
}
async function downloadCurrent(){
  if(!currentFile){
    const blob=new Blob([editor.value],{type:'text/markdown'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='untitled.md';a.click();URL.revokeObjectURL(a.href);
    return;
  }
  await saveCurrentFileSilent();
  downloadFile(currentFileId);
}

// === Preview ===
function updatePreview(){
  const fl=currentFile;
  if(fl&&fl.type==='svg'){
    preview.innerHTML='<div class="pp-svg">'+fl.content+'</div>';
    return;
  }
  const text=editor.value;
  preview.innerHTML=text?marked.parse(text):'<div class="pp-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="width:40px;height:40px;opacity:0.15"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span style="font-size:12px">Preview will appear here</span></div>';
  updateStats();
}
function updateStats(){
  const text=editor.value;
  const lines=text?text.split('\n').length:0;
  const words=text.trim()?text.trim().split(/\s+/).length:0;
  document.getElementById('stat-lines').innerHTML='<b>'+lines+'</b> lines';
  document.getElementById('stat-words').innerHTML='<b>'+words+'</b> words';
  document.getElementById('stat-chars').innerHTML='<b>'+text.length+'</b> chars';
}
function updateLineNums(){
  const lines=editor.value.split('\n').length;
  let h='';
  for(let i=1;i<=lines;i++)h+='<span>'+i+'</span>';
  lineNums.innerHTML=h;
  if(showLineNums)document.getElementById('editor-area').classList.add('show-ln');
  else document.getElementById('editor-area').classList.remove('show-ln');
}

// === Settings persistence ===
async function saveSettings(){
  await dbPut('settings',{key:'treeExpanded',value:JSON.stringify(treeExpanded)});
}
async function loadSettings(){
  const s=await dbGet('settings','treeExpanded');
  if(s)treeExpanded=JSON.parse(s.value);
  const lf=await dbGet('settings','lastFileId');
  return lf?lf.value:null;
}
async function saveLastFileId(){
  await dbPut('settings',{key:'lastFileId',value:currentFileId||''});
}
async function loadLastFile(){
  const lastId=await loadSettings();
  if(lastId){
    const fl=await dbGet('files',lastId);
    if(fl){
      currentFileId=lastId;
      currentFile=fl;
      fileName.textContent=fl.name;
      editor.value=fl.content||'';
      editor.readOnly=fl.type==='svg';
    }
  }
  updatePreview();
  updateLineNums();
}

// === Editor events ===
let saveTimer;
editor.addEventListener('input',()=>{
  updatePreview();updateLineNums();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    await saveCurrentFileSilent();
    if(currentFileId)await saveLastFileId();
  },800);
});
editor.addEventListener('scroll',()=>{
  lineNums.style.transform='translateY('+(-editor.scrollTop+16)+'px)';
});
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();const s=editor.selectionStart,ed=editor.selectionEnd;editor.value=editor.value.substring(0,s)+'  '+editor.value.substring(ed);editor.selectionStart=editor.selectionEnd=s+2;updatePreview();updateLineNums()}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCurrent()}
});

// === Toolbar functions ===
function ins(before,after){
  const start=editor.selectionStart,end=editor.selectionEnd,sel=editor.value.substring(start,end);
  editor.value=editor.value.substring(0,start)+before+sel+after+editor.value.substring(end);
  if(before.includes('\n')){editor.selectionStart=editor.selectionEnd=start+before.length+sel.length}
  else{editor.selectionStart=start+before.length;editor.selectionEnd=end+before.length}
  editor.focus();updatePreview();updateLineNums();
}
function insH(){
  const start=editor.selectionStart,ls=editor.value.lastIndexOf('\n',start-1)+1;
  const line=editor.value.substring(ls,editor.value.indexOf('\n',start)===-1?editor.value.length:editor.value.indexOf('\n',start));
  const m=line.match(/^(#{1,6})\s/);let l=m?m[1].length:0;l=l>=6?0:l+1;
  const nl=l===0?line.replace(/^#{1,6}\s*/,''):'#'.repeat(l)+' '+line.replace(/^#{1,6}\s*/,'');
  const le=editor.value.indexOf('\n',start)===-1?editor.value.length:editor.value.indexOf('\n',start);
  editor.value=editor.value.substring(0,ls)+nl+editor.value.substring(le);editor.focus();updatePreview();updateLineNums();
}
function insL(type){
  const start=editor.selectionStart,ls=editor.value.lastIndexOf('\n',start-1)+1;
  const line=editor.value.substring(ls,editor.value.indexOf('\n',start)===-1?editor.value.length:editor.value.indexOf('\n',start));
  const prefix=type==='ul'?'- ':'1. ';const has=/^[\-\*\+]\s/.test(line)||/^\d+\.\s/.test(line);
  const nl=has?line.replace(/^[\-\*\+]\s|^\d+\.\s/,''):prefix+line;
  const le=editor.value.indexOf('\n',start)===-1?editor.value.length:editor.value.indexOf('\n',start);
  editor.value=editor.value.substring(0,ls)+nl+editor.value.substring(le);editor.focus();updatePreview();updateLineNums();
}
function insTable(){
  const tpl='\n| Header 1 | Header 2 | Header 3 |\n|----------|----------|----------|\n| Cell     | Cell     | Cell     |\n';
  const s=editor.selectionStart;editor.value=editor.value.substring(0,s)+tpl+editor.value.substring(s);
  editor.selectionStart=editor.selectionEnd=s+tpl.length;editor.focus();updatePreview();updateLineNums();
}

function toggleLineNum(){showLineNums=!showLineNums;document.getElementById('btn-ln').classList.toggle('act',showLineNums);updateLineNums()}
function toggleWrap(){wordWrap=!wordWrap;const b=document.getElementById('btn-wrap');b.classList.toggle('act',!wordWrap);editor.style.whiteSpace=wordWrap?'':'pre';editor.style.overflowX=wordWrap?'':'auto'}
function toggleMonospace(){monoFont=!monoFont;const b=document.getElementById('btn-mono');b.classList.toggle('act',!monoFont);editor.style.fontFamily=monoFont?'':'var(--font)'}

function copyHTML(){
  updatePreview();
  const html='<!DOCTYPE html>\n<html>\n<head><meta charset="UTF-8"><style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:800px;margin:40px auto;padding:0 20px;line-height:1.8;color:#333;background:#fff}pre{background:#f5f5f5;padding:16px;border-radius:8px;overflow-x:auto}code{background:#f5f5f5;padding:2px 6px;border-radius:4px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ddd;padding:8px}th{background:#f9f9f9}img{max-width:100%}</style></head>\n<body>\n'+preview.innerHTML+'\n</body>\n</html>';
  navigator.clipboard.writeText(html).then(()=>toast('HTML copied to clipboard'));
}

// === Sidebar toggle ===
function toggleSidebar(){
  if(window.innerWidth<=768){
    sidebar.classList.toggle('open');
    return;
  }
  sidebar.classList.toggle('collapsed');
  document.getElementById('dragBarTree').style.display=sidebar.classList.contains('collapsed')?'none':'';
}

// === Resize ===
let resizing=null,startX,startW;
function startResize(type,e){
  resizing=type;startX=e.clientX;
  if(type==='tree')startW=sidebar.offsetWidth;
  else{
    startW=editorPanel.offsetWidth;
    const ppW=previewPanel.offsetWidth;
    startW={editor:startW,preview:ppW,total:startW+ppW};
  }
  document.body.style.cursor='col-resize';
  document.body.style.userSelect='none';
  document.addEventListener('mousemove',onResize);
  document.addEventListener('mouseup',stopResize);
  document.getElementById(type==='tree'?'dragBarTree':'dragBarMain').classList.add('active');
}
function onResize(e){
  const dx=e.clientX-startX;
  if(resizing==='tree'){
    let w=startW+dx;
    w=Math.max(50,Math.min(500,w));
    sidebar.style.width=w+'px';
  }else{
    let ew=startW.editor+dx;
    const minW=200;
    if(ew<minW)ew=minW;
    if(startW.total-ew<minW)ew=startW.total-minW;
    editorPanel.style.flex='none';
    editorPanel.style.width=ew+'px';
    previewPanel.style.flex='none';
    previewPanel.style.width=(startW.total-ew)+'px';
  }
}
async function stopResize(){
  document.body.style.cursor='';document.body.style.userSelect='';
  document.removeEventListener('mousemove',onResize);
  document.removeEventListener('mouseup',stopResize);
  document.querySelectorAll('.drag-bar-tree,.drag-bar-main').forEach(b=>b.classList.remove('active'));
  resizing=null;
}

// === Mobile tabs ===
function mobileTab(tab){
  document.querySelectorAll('.mb-t').forEach(t=>t.classList.remove('act'));
  document.getElementById('tab-'+tab).classList.add('act');
  if(tab==='files'){sidebar.classList.add('open');editorPanel.classList.add('hide');previewPanel.classList.remove('act')}
  else if(tab==='edit'){sidebar.classList.remove('open');editorPanel.classList.remove('hide');previewPanel.classList.remove('act')}
  else{sidebar.classList.remove('open');editorPanel.classList.add('hide');previewPanel.classList.add('act');updatePreview()}
}

// === Toast ===
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

document.addEventListener('click',e=>{
  if(window.innerWidth<=768&&sidebar.classList.contains('open')){
    if(!sidebar.contains(e.target)&&!e.target.closest('#btn-sb')){
      sidebar.classList.remove('open');
    }
  }
});
</script>
</body>
