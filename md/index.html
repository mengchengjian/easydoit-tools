<!DOCTYPE html>
<html lang="zh-CN" data-theme="apple">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark-dimmed.min.css" id="hljs-theme">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
*,::before,::after{margin:0;padding:0;box-sizing:border-box}

/* ===== THEME: Apple ===== */
:root,[data-theme="apple"]{
  --bg:oklch(97% 0.003 60);--bg2:oklch(93% 0.006 60);--bg3:oklch(88% 0.01 60);
  --bdr:oklch(0% 0 0 / 0.06);--bdr2:oklch(0% 0 0 / 0.10);
  --tx1:oklch(18% 0.01 60);--tx2:oklch(40% 0.01 60);
  --tx3:oklch(65% 0.005 60);--tx4:oklch(82% 0.005 60);
  --accent:oklch(52% 0.18 250);--accent-bg:oklch(52% 0.18 250 / 0.08);--accent-bdr:oklch(52% 0.18 250 / 0.18);
  --red:oklch(50% 0.18 25);--red-bg:oklch(50% 0.18 25 / 0.07);
  --h-color:oklch(12% 0.01 60);--strong-color:oklch(15% 0.01 60);
  --svg-ico:oklch(45% 0.06 250);--overlay:oklch(0% 0 0 / 0.2);
  --shadow:oklch(0% 0 0 / 0.08);--shadow-sm:oklch(0% 0 0 / 0.05);
  --btn-hover:oklch(0% 0 0 / 0.04);--btn-active:oklch(0% 0 0 / 0.07);
  --item-hover:oklch(0% 0 0 / 0.03);--table-stripe:oklch(0% 0 0 / 0.015);
  --scroll-thumb:oklch(0% 0 0 / 0.08);--scroll-thumb-hover:oklch(0% 0 0 / 0.15);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC",sans-serif;
  --mono:"SF Mono","JetBrains Mono","Fira Code",monospace;
  --r4:8px;--r6:10px;--r8:12px;--r12:16px;--fw-title:600;--fw-btn:500;color-scheme:light;
}

/* ===== THEME: Obsidian ===== */
[data-theme="obsidian"]{
  --bg:oklch(13% 0.008 285);--bg2:oklch(17% 0.008 285);--bg3:oklch(22% 0.01 285);
  --bdr:oklch(100% 0 0 / 0.06);--bdr2:oklch(100% 0 0 / 0.10);
  --tx1:oklch(92% 0 0);--tx2:oklch(72% 0.005 285);--tx3:oklch(52% 0.005 285);--tx4:oklch(35% 0.005 285);
  --accent:oklch(65% 0.13 280);--accent-bg:oklch(65% 0.13 280 / 0.10);--accent-bdr:oklch(65% 0.13 280 / 0.18);
  --red:oklch(55% 0.16 20);--red-bg:oklch(55% 0.16 20 / 0.10);
  --h-color:oklch(95% 0 0);--strong-color:oklch(95% 0 0);
  --svg-ico:oklch(65% 0.06 280);--overlay:oklch(0% 0 0 / 0.5);
  --shadow:oklch(0% 0 0 / 0);--shadow-sm:oklch(0% 0 0 / 0);
  --btn-hover:oklch(100% 0 0 / 0.04);--btn-active:oklch(100% 0 0 / 0.08);
  --item-hover:oklch(100% 0 0 / 0.03);--table-stripe:oklch(100% 0 0 / 0.015);
  --scroll-thumb:oklch(100% 0 0 / 0.06);--scroll-thumb-hover:oklch(100% 0 0 / 0.12);
  --font:-apple-system,BlinkMacSystemFont,"Inter","PingFang SC",sans-serif;
  --mono:"JetBrains Mono","SF Mono","Fira Code",monospace;
  --r4:6px;--r6:8px;--r8:10px;--r12:12px;--fw-title:600;--fw-btn:500;color-scheme:dark;
}

/* ===== THEME: Linear ===== */
[data-theme="linear"]{
  --bg:oklch(12% 0.006 240);--bg2:oklch(16% 0.008 240);--bg3:oklch(22% 0.01 240);
  --bdr:oklch(100% 0 0 / 0.04);--bdr2:oklch(100% 0 0 / 0.06);
  --tx1:oklch(94% 0 0);--tx2:oklch(72% 0.003 240);--tx3:oklch(48% 0.003 240);--tx4:oklch(30% 0.003 240);
  --accent:oklch(72% 0.16 210);--accent-bg:oklch(72% 0.16 210 / 0.10);--accent-bdr:oklch(72% 0.16 210 / 0.18);
  --red:oklch(58% 0.16 20);--red-bg:oklch(58% 0.16 20 / 0.10);
  --h-color:oklch(96% 0 0);--strong-color:oklch(96% 0 0);
  --svg-ico:oklch(72% 0.08 210);--overlay:oklch(0% 0 0 / 0.55);
  --shadow:oklch(0% 0 0 / 0);--shadow-sm:oklch(0% 0 0 / 0);
  --btn-hover:oklch(100% 0 0 / 0.05);--btn-active:oklch(100% 0 0 / 0.10);
  --item-hover:oklch(100% 0 0 / 0.04);--table-stripe:oklch(100% 0 0 / 0.02);
  --scroll-thumb:oklch(100% 0 0 / 0.05);--scroll-thumb-hover:oklch(100% 0 0 / 0.10);
  --font:-apple-system,BlinkMacSystemFont,"Inter","PingFang SC",sans-serif;
  --mono:"JetBrains Mono","SF Mono","Fira Code",monospace;
  --r4:6px;--r6:8px;--r8:10px;--r12:14px;--fw-title:550;--fw-btn:500;color-scheme:dark;
}

/* ===== THEME: VSCode ===== */
[data-theme="vscode"]{
  --bg:oklch(14% 0.004 220);--bg2:oklch(17% 0.004 220);--bg3:oklch(21% 0.006 220);
  --bdr:oklch(100% 0 0 / 0.04);--bdr2:oklch(100% 0 0 / 0.08);
  --tx1:oklch(88% 0 0);--tx2:oklch(68% 0.003 220);--tx3:oklch(48% 0.003 220);--tx4:oklch(32% 0.003 220);
  --accent:oklch(65% 0.16 150);--accent-bg:oklch(65% 0.16 150 / 0.08);--accent-bdr:oklch(65% 0.16 150 / 0.15);
  --red:oklch(55% 0.16 25);--red-bg:oklch(55% 0.16 25 / 0.10);
  --h-color:oklch(92% 0 0);--strong-color:oklch(92% 0 0);
  --svg-ico:oklch(58% 0.06 150);--overlay:oklch(0% 0 0 / 0.5);
  --shadow:oklch(0% 0 0 / 0);--shadow-sm:oklch(0% 0 0 / 0);
  --btn-hover:oklch(100% 0 0 / 0.04);--btn-active:oklch(100% 0 0 / 0.08);
  --item-hover:oklch(100% 0 0 / 0.03);--table-stripe:oklch(100% 0 0 / 0.015);
  --scroll-thumb:oklch(100% 0 0 / 0.05);--scroll-thumb-hover:oklch(100% 0 0 / 0.10);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;
  --mono:"Cascadia Code","JetBrains Mono","SF Mono","Fira Code",monospace;
  --r4:2px;--r6:3px;--r8:4px;--r12:6px;--fw-title:600;--fw-btn:500;color-scheme:dark;
}

[data-theme="apple"] .top{background:oklch(93% 0.006 60 / 0.75);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:0.5px solid oklch(0% 0 0 / 0.08)}
[data-theme="linear"] .top,[data-theme="linear"] .sidebar{backdrop-filter:blur(24px) saturate(120%);-webkit-backdrop-filter:blur(24px) saturate(120%)}
[data-theme="linear"] .top{border-bottom-width:0.5px}
[data-theme="vscode"] .sidebar .tree-item.sel{border-left:2px solid var(--accent);border-radius:0}

html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--tx1);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
::selection{background:var(--accent-bg);color:var(--accent)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-hover)}

.top{height:44px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;flex-shrink:0;z-index:20;gap:12px}
.top-l{display:flex;align-items:center;gap:10px}
.top-l svg{color:var(--accent);opacity:0.7}
.top-l span{font-size:12px;font-weight:500;color:var(--tx2);letter-spacing:0.3px}
.top-c{display:flex;align-items:center;gap:2px;overflow-x:auto;flex:1;justify-content:center}
.top-c::-webkit-scrollbar{display:none}
.btn{height:28px;padding:0 9px;border-radius:var(--r6);font-size:11.5px;font-family:var(--font);color:var(--tx2);background:transparent;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;display:inline-flex;align-items:center;gap:3px;letter-spacing:0.1px;font-weight:var(--fw-btn)}
.btn:hover{background:var(--btn-hover);color:var(--tx1)}
.btn:active{background:var(--btn-active)}
.btn.primary{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bdr);font-weight:500}
.btn.primary:hover{background:color-mix(in srgb,var(--accent-bg) 100%,var(--tx1) 8%)}
.sep{width:1px;height:16px;background:var(--bdr);margin:0 4px}
.top-r{display:flex;align-items:center;gap:4px}
.top-r .btn{padding:0 6px;font-size:11px}
.top-r .btn.theme-btn{padding:0 8px;font-size:11px;gap:4px}
.theme-btn .th-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid var(--bdr2)}
.th-dot.th-apple{background:oklch(52% 0.18 250)}.th-dot.th-obsidian{background:oklch(65% 0.13 280)}.th-dot.th-linear{background:oklch(72% 0.16 210)}.th-dot.th-vscode{background:oklch(65% 0.16 150)}

.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:240px;min-width:50px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s cubic-bezier(0.16,1,0.3,1)}
.sidebar.closed{width:0;min-width:0;border-right:none}
.side-hd{height:36px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);flex-shrink:0}
.side-hd span{font-size:10.5px;color:var(--tx3);letter-spacing:0.5px;text-transform:uppercase;font-weight:500}
.side-hd-act{display:flex;gap:1px}
.side-hd-act button{width:24px;height:24px;border-radius:var(--r4);background:transparent;border:none;color:var(--tx3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.side-hd-act button:hover{background:var(--btn-hover);color:var(--tx1)}
.side-tree{flex:1;overflow-y:auto;padding:4px 0}
.tree-group{margin:0}
.tree-item{display:flex;align-items:center;padding:4px 8px;gap:6px;cursor:pointer;font-size:12.5px;color:var(--tx2);border-radius:var(--r4);margin:0 4px;user-select:none;transition:all .1s;-webkit-user-drag:element}
.tree-item:hover{background:var(--item-hover);color:var(--tx1)}
.tree-item.sel{background:var(--accent-bg);color:var(--accent)}
.tree-item .ti-ico{width:15px;text-align:center;flex-shrink:0;font-size:12px}
.tree-item .ti-arrow{width:12px;text-align:center;flex-shrink:0;font-size:8px;color:var(--tx3);transition:transform .15s}
.tree-item .ti-arrow.on{transform:rotate(90deg);color:var(--tx2)}
.tree-item .ti-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-item .ti-act{display:none;gap:1px;flex-shrink:0}
.tree-item:hover .ti-act{display:flex}
.tree-item .ti-act button{width:20px;height:20px;padding:0;border:none;background:none;color:var(--tx3);cursor:pointer;font-size:11px;border-radius:3px;transition:all .1s;display:flex;align-items:center;justify-content:center}
.tree-item .ti-act button:hover{background:var(--btn-hover);color:var(--tx1)}
.tree-item .ti-act button.del:hover{background:var(--red-bg);color:var(--red)}
.tree-children{overflow:hidden}
.tree-children.folded{display:none}
.tree-item.f{padding-left:4px}.tree-item.fl{padding-left:26px}
.tree-children .tree-item.f{padding-left:18px}.tree-children .tree-item.fl{padding-left:40px}
.tree-children .tree-children .tree-item.f{padding-left:32px}.tree-children .tree-children .tree-item.fl{padding-left:54px}
.tree-children .tree-children .tree-children .tree-item.f{padding-left:46px}.tree-children .tree-children .tree-children .tree-item.fl{padding-left:68px}

.tree-group.drop-target>.tree-item,.tree-group.drop-target{background:var(--accent-bg);border-radius:var(--r6)}
.tree-item.drop-target{outline:2px solid var(--accent);outline-offset:-2px;border-radius:var(--r4)}

.drag{width:4px;cursor:col-resize;flex-shrink:0;background:transparent;transition:background .15s}
.drag:hover,.drag.on{background:var(--accent)}

.editor-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.ed-hd{height:32px;padding:0 12px;background:var(--bg3);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ed-dot{width:7px;height:7px;border-radius:50%}
.ed-dot:nth-child(1){background:#e05555}.ed-dot:nth-child(2){background:#e0b055}.ed-dot:nth-child(3){background:#55b855}
.ed-tabs{display:flex;align-items:center;gap:0;overflow-x:auto;flex:1;height:28px;min-width:0}
.ed-tabs::-webkit-scrollbar{display:none}
.ed-tab{display:inline-flex;align-items:center;height:26px;padding:0 6px 0 10px;font-size:11px;color:var(--tx2);background:var(--bg3);border:1px solid transparent;border-radius:var(--r4) var(--r4) 0 0;cursor:pointer;white-space:nowrap;flex-shrink:0;gap:4px;user-select:none;transition:all .1s;position:relative}
.ed-tab:hover{background:var(--item-hover)}
.ed-tab.active{background:var(--bg);color:var(--tx1);border-color:var(--bdr);border-bottom-color:var(--bg)}
.ed-tab .tab-close{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;border-radius:3px;font-size:10px;color:var(--tx3);flex-shrink:0;line-height:1;transition:all .1s}
.ed-tab .tab-close:hover{background:var(--btn-hover);color:var(--red)}
.ed-tab.single .tab-close{display:none}
.ed-title{font-size:11px;color:var(--tx3);font-weight:450;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none}

.ed-title{font-size:11px;color:var(--tx3);font-weight:450;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ed-opt{margin-left:auto;display:flex;gap:1px}
.ed-opt button{width:24px;height:24px;border-radius:var(--r4);background:transparent;border:none;color:var(--tx3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ed-opt button:hover{background:var(--btn-hover);color:var(--tx1)}
.ed-opt button.on{color:var(--accent);background:var(--accent-bg)}
.ed-area{flex:1;position:relative;overflow:hidden}
.ed-area textarea{display:block;width:100%;height:100%;background:var(--bg);border:none;outline:none;resize:none;padding:28px 24px;font-family:var(--mono);font-size:14px;line-height:1.8;color:var(--tx1);caret-color:var(--accent);tab-size:2}
.ed-area textarea::placeholder{color:var(--tx4)}
.ed-area.show-ln textarea{padding-left:56px}
.ed-ln{position:absolute;left:0;top:0;bottom:0;width:42px;padding:28px 0;background:var(--bg);pointer-events:none;border-right:1px solid var(--bdr);overflow:hidden}
.ed-ln span{display:block;text-align:right;padding-right:8px;font:11px/1.8 var(--mono);color:var(--tx4);font-variant-numeric:tabular-nums}
.ed-st{height:22px;padding:0 14px;background:var(--bg2);border-top:1px solid var(--bdr);display:flex;align-items:center;gap:20px;font-size:10px;color:var(--tx3);flex-shrink:0}
.ed-st b{font-weight:500;color:var(--tx2)}

.preview{flex:1;overflow-y:auto;background:var(--bg);min-width:0}
.pr-inner{padding:36px 40px;max-width:820px;margin:0 auto}

.md{font-size:15px;line-height:1.85;color:var(--tx1)}
.md h1,.md h2,.md h3,.md h4,.md h5,.md h6{font-weight:var(--fw-title);line-height:1.25;color:var(--h-color);margin:1.4em 0 .5em;letter-spacing:-0.3px}
.md h1{font-size:1.75em}.md h2{font-size:1.4em}.md h3{font-size:1.15em}
.md p{margin:.7em 0}
.md a{color:var(--accent);text-decoration:none}.md a:hover{text-decoration:underline}
.md strong{font-weight:var(--fw-title);color:var(--strong-color)}
.md em{color:var(--tx2)}.md del{color:var(--tx3)}
.md code{font:.88em var(--mono);background:var(--bg3);padding:2px 6px;border-radius:3px;color:var(--accent)}
.md pre{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r8);padding:20px;margin:.7em 0;overflow-x:auto}
.md pre code{background:none;padding:0;font-size:.84em;color:var(--tx1);line-height:1.7}
.md blockquote{margin:.7em 0;padding:14px 20px;border-left:2px solid var(--accent);background:var(--accent-bg);border-radius:0 var(--r6) var(--r6) 0;color:var(--tx2)}
.md ul,.md ol{padding-left:1.5em;margin:.5em 0}
.md li{margin:.2em 0}.md li::marker{color:var(--tx3)}
.md table{border-collapse:collapse;width:100%;margin:.7em 0;font-size:.9em;border-radius:var(--r6);overflow:hidden}
.md th,.md td{border:1px solid var(--bdr);padding:8px 14px;text-align:left}
.md th{background:var(--bg2);font-weight:var(--fw-title);color:var(--tx1)}
.md tr:nth-child(even){background:var(--table-stripe)}
.md img{max-width:100%;border-radius:var(--r6);margin:.5em 0}
.md hr{border:none;border-top:1px solid var(--bdr);margin:2em 0}
.md input[type="checkbox"]{accent-color:var(--accent);margin-right:6px}

.md .footnotes{margin-top:2.5em;padding-top:1.5em;border-top:1px solid var(--bdr);font-size:.88em;color:var(--tx2)}
.md .footnotes hr{display:none}
.md .footnotes ol{padding-left:1.5em}
.md .footnotes li{margin:.3em 0}
.md .footnotes li p{display:inline;margin:0}
.md .footnote-ref{font-size:.82em;vertical-align:super;text-decoration:none;color:var(--accent)}
.md .footnote-backref{text-decoration:none;color:var(--accent);margin-left:4px}

.md .katex{font-size:1.08em}
.md .katex-display{margin:1em 0;overflow-x:auto;overflow-y:hidden}
.md .katex-display>.katex{display:inline-block;text-align:initial;max-width:100%}

.md .mermaid-container{margin:1em 0;text-align:center}
.md .mermaid-container svg{max-width:100%;height:auto}
.md pre.mermaid-error{background:var(--red-bg);border:1px solid var(--red);color:var(--red);padding:12px;border-radius:var(--r6);font-size:.85em}

.md [class*="language-echarts"],
.md [class*="language-markmap"],
.md [class*="language-mindmap"],
.md [class*="language-graphviz"],
.md [class*="language-flowchart"],
.md .mermaid-container { min-height: 300px; margin: 1em 0; }
.md .language-mermaid svg { max-width: 100%; height: auto; }
.md pre.mermaid-error,
.md .vditor-reset--error { background: var(--red-bg); border: 1px solid var(--red); color: var(--red); padding: 12px; border-radius: var(--r6); font-size: .85em; white-space: pre-wrap; word-break: break-all; }

.md ul.task-list{list-style:none;padding-left:.5em}
.md ul.task-list>li{display:flex;align-items:flex-start;gap:6px}
.md ul.task-list>li>input[type="checkbox"]{margin-top:.38em;flex-shrink:0}

.pr-svg{padding:24px;display:flex;justify-content:center}
.pr-svg svg{max-width:100%;max-height:65vh}
.pr-empty{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:var(--tx3);font-size:13px}

/* ===== FOCUS MODE ===== */
body.focus .top{transform:translateY(-100%);opacity:0}
body.focus .sidebar{transform:translateX(-100%);opacity:0}
body.focus .drag{display:none}
body.focus .ed-st{transform:translateY(100%);opacity:0}
body.focus .ed-search{display:none!important}
.focus-esc{display:none;position:fixed;right:20px;bottom:20px;z-index:200;width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1px solid var(--bdr2);color:var(--tx3);cursor:pointer;font-size:14px;opacity:0.35;transition:opacity .2s}
body.focus .focus-esc{display:flex;align-items:center;justify-content:center}
.focus-esc:hover{opacity:1}

/* ===== SIDEBAR SEARCH PANEL ===== */
.side-search{flex:1;overflow-y:auto;padding:8px;display:none}
.side-search.on{display:flex;flex-direction:column}
.side-search input{width:100%;height:28px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r6);outline:none;color:var(--tx1);font-size:12px;font-family:var(--font);padding:0 10px;margin-bottom:8px;flex-shrink:0;transition:border-color .15s}
.side-search input:focus{border-color:var(--accent)}
.side-search input::placeholder{color:var(--tx3)}
.sr-list{flex:1;overflow-y:auto}
.sr-item{padding:6px 8px;cursor:pointer;border-radius:var(--r4);margin-bottom:2px;transition:background .1s}
.sr-item:hover{background:var(--item-hover)}
.sr-item .sr-fname{font-size:10.5px;color:var(--tx2);margin-bottom:2px;font-weight:500}
.sr-item .sr-line{font-size:11px;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5}
.sr-item .sr-ln{font-size:9.5px;color:var(--tx4);margin-left:6px;flex-shrink:0}
.sr-hl{color:var(--accent);font-weight:500}
.sr-empty{padding:24px;text-align:center;color:var(--tx3);font-size:12px}

/* ===== SAVE STATUS INDICATOR ===== */
.sv-ind{display:inline-flex;align-items:center;gap:4px;font-size:10px;margin-left:auto}
.sv-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sv-dot.green{background:oklch(60% 0.16 145)}
.sv-dot.amber{background:oklch(70% 0.14 85)}
.sv-dot.red-dot{background:var(--red)}
.sv-txt.saved{color:oklch(60% 0.16 145)}.sv-txt.saving{color:oklch(70% 0.14 85)}.sv-txt.unsaved{color:var(--red)}

/* ===== TEMPLATE MODAL ===== */
.tmpl-list{max-height:300px;overflow-y:auto;margin-bottom:14px}
.tmpl-opt{padding:10px 12px;border-radius:var(--r6);cursor:pointer;border:1px solid var(--bdr);margin-bottom:6px;transition:all .1s;display:flex;flex-direction:column;gap:3px}
.tmpl-opt:hover{background:var(--item-hover)}
.tmpl-opt.sel{border-color:var(--accent);background:var(--accent-bg)}
.tmpl-opt .tmpl-name{font-size:13px;color:var(--tx1);font-weight:500}
.tmpl-opt .tmpl-desc{font-size:11px;color:var(--tx3)}

.theme-drop{position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r8);padding:4px 0;min-width:160px;box-shadow:0 8px 30px var(--shadow);display:none;z-index:110}
.theme-drop.open{display:block}
.theme-opt{padding:7px 14px;font-size:12px;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .1s}
.theme-opt:hover{background:var(--btn-hover);color:var(--tx1)}
.theme-opt.cur{color:var(--accent);background:var(--accent-bg)}
.theme-opt .th-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid var(--bdr2)}

/* ===== SEARCH & REPLACE ===== */
.ed-search{height:36px;padding:0 8px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:none;align-items:center;gap:6px;flex-shrink:0}
.ed-search.on{display:flex}
.ed-search input{height:26px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r4);outline:none;color:var(--tx1);font-size:12px;font-family:var(--font);padding:0 8px;transition:border-color .15s}
.ed-search input:focus{border-color:var(--accent)}
.ed-search .sr-find{width:160px}
.ed-search .sr-repl{width:140px;display:none}
.ed-search .sr-repl.on{display:block}
.ed-search .sr-count{font-size:10px;color:var(--tx3);white-space:nowrap;min-width:40px;text-align:center}
.ed-search .sr-btn{width:24px;height:24px;border-radius:var(--r4);background:transparent;border:none;color:var(--tx3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ed-search .sr-btn:hover{background:var(--btn-hover);color:var(--tx1)}
.ed-search .sr-btn.on{color:var(--accent);background:var(--accent-bg)}
.ed-search .sr-act{height:24px;padding:0 8px;border-radius:var(--r4);background:transparent;border:1px solid var(--bdr);color:var(--tx2);cursor:pointer;font-size:10.5px;font-family:var(--font);transition:all .15s;white-space:nowrap}
.ed-search .sr-act:hover{background:var(--btn-hover);color:var(--tx1)}
.ed-search .sr-act.replace-all{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bdr)}

.side-tabs{height:32px;display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0}
.side-tabs button{flex:1;border:none;background:transparent;color:var(--tx3);font-size:11px;font-family:var(--font);cursor:pointer;position:relative;transition:all .15s;font-weight:450}
.side-tabs button.cur{color:var(--accent)}
.side-tabs button.cur::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--accent);border-radius:1px}
.side-tabs button:hover{color:var(--tx1)}

/* ===== TOC ===== */
.side-toc{flex:1;overflow-y:auto;padding:4px 0;display:none}
.side-toc.on{display:block}
.toc-item{display:flex;align-items:center;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--tx2);border-radius:var(--r4);margin:0 4px;user-select:none;transition:all .1s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toc-item:hover{background:var(--item-hover);color:var(--tx1)}
.toc-item.active{background:var(--accent-bg);color:var(--accent)}
.toc-lv1{padding-left:12px;font-weight:500;font-size:12.5px}
.toc-lv2{padding-left:24px}
.toc-lv3{padding-left:36px}
.toc-lv4{padding-left:48px}
.toc-lv5{padding-left:60px}
.toc-lv6{padding-left:72px}
.toc-empty{padding:24px;text-align:center;color:var(--tx3);font-size:12px}

.cmenu{position:fixed;z-index:100;background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r8);padding:4px 0;min-width:150px;display:none;box-shadow:0 8px 30px var(--shadow)}
.cmenu-item{padding:6px 14px;font-size:12px;color:var(--tx2);cursor:pointer;transition:all .1s}
.cmenu-item:hover{background:var(--btn-hover);color:var(--tx1)}
.cmenu-sep{height:1px;background:var(--bdr);margin:4px 0}

.md-overlay{position:fixed;inset:0;background:var(--overlay);z-index:50;display:none;align-items:center;justify-content:center}
.md-overlay.open{display:flex}
.md-box{background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r12);padding:24px;min-width:300px;max-width:420px;box-shadow:0 12px 40px var(--shadow)}
.md-box h3{font-size:14px;font-weight:var(--fw-title);margin-bottom:14px}
.md-box input{width:100%;padding:7px 12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r6);outline:none;color:var(--tx1);font-size:13px;font-family:var(--font);margin-bottom:14px;transition:border-color .15s}
.md-box input:focus{border-color:var(--accent)}
.md-box input::placeholder{color:var(--tx3)}
.md-box .md-act{display:flex;gap:8px;justify-content:flex-end}
.md-box button{padding:6px 16px;border-radius:var(--r6);cursor:pointer;font-size:12px;font-family:var(--font);border:1px solid var(--bdr);background:transparent;color:var(--tx2);transition:all .15s}
.md-box button:hover{background:var(--btn-hover);color:var(--tx1)}
.md-box button.pri{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bdr)}

.md-box button.danger{color:var(--red);border-color:var(--red-bg)}
.md-box button.danger:hover{background:var(--red-bg)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bdr);padding:8px 20px;border-radius:20px;font-size:12px;color:var(--tx2);z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:0 4px 16px var(--shadow-sm)}

@media(max-width:768px){

const DB='md-editor-db',DBV=1;let db;
function opnDB(){return new Promise((ok,fail)=>{const r=indexedDB.open(DB,DBV);r.onupgradeneeded=e=>{const d=e.target.result;d.objectStoreNames.contains('folders')||d.createObjectStore('folders',{keyPath:'id'});d.objectStoreNames.contains('files')||d.createObjectStore('files',{keyPath:'id'});d.objectStoreNames.contains('settings')||d.createObjectStore('settings',{keyPath:'key'})};r.onsuccess=e=>{db=e.target.result;ok(db)};r.onerror=e=>fail(e)})}
function sto(s,m){return db.transaction(s,m).objectStore(s)}
function put(s,o){return new Promise(r=>{const t=sto(s,'readwrite');t.put(o);t.transaction.oncomplete=()=>r()})}
function get(s,i){return new Promise(r=>{const t=sto(s,'readonly').get(i);t.onsuccess=()=>r(t.result)})}
function all(s){return new Promise(r=>{const t=sto(s,'readonly').getAll();t.onsuccess=()=>r(t.result)})}
function del(s,i){return new Promise(r=>{const t=sto(s,'readwrite').delete(i);t.transaction.oncomplete=()=>r()})}

const renderer=new marked.Renderer();
const origLink=renderer.link.bind(renderer);
let footnotes={},fnCounter=0;

renderer.link=function(href,title,text){
  if(typeof href==='string'&&href.startsWith('^')){
    const id=href.slice(1);fnCounter++;
    const def=footnotes[id];const tip=def?(' title="'+def.replace(/"/g,'&quot;').slice(0,80)+'"'):'';
    return '<sup id="fnref:'+id+'"><a class="footnote-ref" href="#fn:'+id+'"'+tip+'>['+fnCounter+']</a></sup>';
  }
  return origLink(href,title,text);
};

const SPECIAL_LANGS=new Set(['mermaid','echarts','flowchart','graphviz','abc','mindmap','markmap','plantuml','smiles','math']);

marked.setOptions({gfm:true,breaks:true,
  highlight:(c,l)=>{
    if(!l||SPECIAL_LANGS.has(l))return c;
    try{return hljs.getLanguage(l)?hljs.highlight(c,{language:l}).value:hljs.highlightAuto(c).value}catch{return c}
  },
  renderer:renderer
});

function parseFootnotes(text){
  footnotes={};fnCounter=0;
  const lines=text.split('\n'),cleaned=[],defs=[];
  let inDef=false,defBody='',defId='';
  for(let i=0;i<lines.length;i++){
    const l=lines[i];const m=l.match(/^\[\^([^\]]+)\]:\s*(.*)/);
    if(m&&!inDef){defId=m[1];defBody=m[2];inDef=true}
    else if(inDef&&/^\s{2,}/.test(l))defBody+='\n'+l;
    else if(inDef&&l.trim()==='')defBody+='\n';
    else{if(inDef){defs.push({id:defId,body:defBody.trim()});inDef=false}cleaned.push(l)}
  }
  if(inDef){defs.push({id:defId,body:defBody.trim()})}
  for(const d of defs)footnotes[d.id]=d.body;
  return cleaned.join('\n');
}

function renderFootnotes(){
  const ids=Object.keys(footnotes);if(!ids.length)return'';
  let h='<div class="footnotes"><hr><ol>';
  for(let i=0;i<ids.length;i++){
    const id=ids[i];
    h+='<li id="fn:'+id+'"><p>'+marked.parseInline(footnotes[id])+' <a class="footnote-backref" href="#fnref:'+id+'">&#8617;</a></p></li>';
  }
  h+='</ol></div>';return h;
}

function replaceEmoji(text){
  return text.replace(/:([a-z0-9_+-]+):/gi,(m,name)=>EMOJI[name.toLowerCase()]||EMOJI[name]||m);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// === vditor-style dynamic script loader ===
const loadedScripts={};
function addScript(url, id) {
  if (loadedScripts[id]) return loadedScripts[id];
  if (document.getElementById(id)) return Promise.resolve();
  loadedScripts[id] = new Promise((resolve) => {
    const s = document.createElement('script');
    s.id = id; s.src = url;
    s.onload = () => resolve();
    document.head.appendChild(s);
  });
  return loadedScripts[id];
}

// === vditor-style render functions ===
function genUUID() {
  return 'xxxxxx4xxxyxxxxxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function mermaidRender(element) {
  const els = element.querySelectorAll('.language-mermaid');
  if (!els.length) return;
  addScript('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js', 'vditorMermaidScript').then(() => {
    mermaid.initialize({startOnLoad:false,securityLevel:'loose'});
    els.forEach(async (el) => {
      const code = el.textContent;
      if (el.getAttribute('data-processed') === 'true' || !code.trim()) return;
      const id = 'mermaid' + genUUID();
      try {
        const { svg } = await mermaid.render(id, code);
        el.innerHTML = svg;
      } catch (e) {
        el.innerHTML = '<pre class="vditor-reset--error">Mermaid error: ' + escHtml(e.message) + '</pre>';
      }
      el.setAttribute('data-processed', 'true');
    });
  });
}

function chartRender(element) {
  const els = element.querySelectorAll('.language-echarts');
  if (!els.length) return;
  addScript('https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js', 'vditorEchartsScript').then(() => {
    els.forEach((el) => {
      const code = el.textContent.trim();
      if (!code || el.getAttribute('data-processed') === 'true') return;
      try {
        const option = JSON.parse(code);
        echarts.init(el).setOption(option);

function setSaveStatus(status){

}

// ===== MULTI-TAB =====
function findTabIndex(fileId){
  return openTabs.findIndex(t=>t.fileId===fileId);
}

function openTab(fileId){
  const idx=findTabIndex(fileId);
  if(idx>=0){switchTab(idx);return}
  saveActiveTabContent();
  get('files',fileId).then(fl=>{
    if(!fl)return;
    openTabs.push({fileId:fl.id,fileName:fl.name,fileType:fl.type,content:fl.content||'',cursorPos:0});
    activeTabIndex=openTabs.length-1;
    applyActiveTab();
    renderTabs();
  });
}

function closeTab(tabIndex){
  if(openTabs.length===0)return;
  saveActiveTabContent();
  const closed=openTabs[tabIndex];
  get('files',closed.fileId).then(of=>{if(of){of.content=closed.content||'';of.updatedAt=Date.now();put('files',of)}});
  openTabs.splice(tabIndex,1);
  if(openTabs.length===0){activeTabIndex=-1;cfid=null;cfile=null;ed.value='';edTitle.textContent='';updPrev();renderTabs();return}
  if(tabIndex<=activeTabIndex)activeTabIndex=Math.max(0,activeTabIndex-1);
  if(activeTabIndex>=openTabs.length)activeTabIndex=openTabs.length-1;
  applyActiveTab();
  renderTabs();
}

function switchTab(index){
  if(index===activeTabIndex)return;
  saveActiveTabContent();
  activeTabIndex=index;
  applyActiveTab();
  renderTabs();
}

function saveActiveTabContent(){
  if(activeTabIndex<0||activeTabIndex>=openTabs.length)return;
  const tab=openTabs[activeTabIndex];
  tab.content=ed.value;
  tab.cursorPos=ed.selectionStart;
}

function applyActiveTab(){
  if(activeTabIndex<0||activeTabIndex>=openTabs.length){
    cfid=null;cfile=null;ed.value='';edTitle.textContent='';ed.readOnly=false;
    updPrev();updLn();return;
  }
  const tab=openTabs[activeTabIndex];
  get('files',tab.fileId).then(fl=>{
    if(!fl)return;
    cfid=tab.fileId;cfile=fl;
    edTitle.textContent=tab.fileName;
    ed.value=tab.content;
    ed.readOnly=fl.type==='svg';
    updPrev();updLn();
    try{ed.selectionStart=ed.selectionEnd=Math.min(tab.cursorPos||0,ed.value.length)}catch(e){}
    rtree();
  });
}

function renderTabs(){
  let h='';
  openTabs.forEach((tab,i)=>{
    const cls='ed-tab'+(i===activeTabIndex?' active':'')+(openTabs.length===1?' single':'');
    h+='<div class="'+cls+'" onclick="switchTab('+i+')" title="'+escHtml(tab.fileName)+'">';
    h+='<span>'+escHtml(tab.fileName)+'</span>';
    h+='<span class="tab-close" onclick="event.stopPropagation();closeTab('+i+')">&times;</span>';
    h+='</div>';
  });
  edTabs.innerHTML=h;
  if(activeTabIndex>=0){
    const at=edTabs.children[activeTabIndex];
    if(at)at.scrollIntoView({block:'nearest',inline:'nearest'});
  }
}

async function ldtree(){tdata={folders:await all('folders'),files:await all('files')};rtree();renderTabs()}
function rtree(){
  const fds=tdata.folders,fls=tdata.files;
  const topFds=fds.filter(f=>!f.parentId).sort((a,b)=>(a.sort||0)-(b.sort||0));
  const topFls=fls.filter(f=>!f.folderId);let h='';
  for(const fd of topFds)h+=rFolder(fd,fds,fls);
  for(const fl of topFls)h+=rFile(fl);
  if(!h)h='<div style="padding:24px;text-align:center;color:var(--tx3);font-size:12px;line-height:1.8">No files yet</div>';
  tree.innerHTML=h;
}
function rFolder(fd,fds,fls){
  const on=texp[fd.id]!==false;
  const sfs=fds.filter(f=>f.parentId===fd.id).sort((a,b)=>(a.sort||0)-(b.sort||0));
  const sfls=fls.filter(f=>f.folderId===fd.id);
  let h=`<div class="tree-group" data-fid="${fd.id}" ondragover="itemDragover(event,'${fd.id}')" ondragleave="itemDragleave(event)" ondrop="itemDrop(event,'${fd.id}')">`;
  h+=`<div class="tree-item f" oncontextmenu="cm(event,'folder','${fd.id}')">
    <span class="ti-arrow${on?' on':''}" onclick="event.stopPropagation();tog('${fd.id}')">&#9654;</span>
    <span class="ti-ico" style="color:var(--accent)">&#128193;</span>
    <span class="ti-name" onclick="tog('${fd.id}')">${esc(fd.name)}</span>
    <span class="ti-act"><button onclick="event.stopPropagation();rnFd('${fd.id}')" title="Rename">&#9998;</button><button class="del" onclick="event.stopPropagation();rmFd('${fd.id}')" title="Delete">&times;</button></span></div>`;
  h+=`<div class="tree-children${on?'':' folded'}">`;
  for(const sf of sfs)h+=rFolder(sf,fds,fls);
  for(const sf of sfls)h+=rFile(sf);
  h+='</div></div>';return h;
}
function rFile(fl){
  const ico=fl.type==='svg'?'&#128444;':fl.type==='txt'?'&#128196;':'&#128462;';
  const isOpen=findTabIndex(fl.id)>=0;
  const cls=isOpen?'tree-item fl sel':'tree-item fl';
  return `<div class="${cls}" data-file-id="${fl.id}" draggable="true" onclick="sel('${fl.id}')" ondragstart="fsDragStart(event,'${fl.id}')" oncontextmenu="cm(event,'file','${fl.id}')">
    <span class="ti-ico" style="color:var(--svg-ico)">${ico}</span>
    <span class="ti-name">${esc(fl.name)}</span>
    <span class="ti-act"><button onclick="event.stopPropagation();rnFl('${fl.id}','${esc(fl.name)}')" title="Rename">&#9998;</button><button class="del" onclick="event.stopPropagation();rmFl('${fl.id}')" title="Delete">&times;</button></span></div>`;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function updPrev(){
  if(cfile&&cfile.type==='svg'){pr.innerHTML='<div class="pr-svg">'+cfile.content+'</div>';updStat();return}
  if(!ed.value){pr.innerHTML='<div class="pr-empty"><div style="opacity:0.1"><svg width="36" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><span>Preview</span></div>';updStat();return}

  let text=ed.value;
  text=replaceEmoji(text);
  text=parseFootnotes(text);

  // Math formula protection (prevent marked from escaping $)
  const mathBlocks=[];
  text=text.replace(/\$\$([\s\S]*?)\$\$/g,(_,f)=>{
    const i=mathBlocks.length;
    mathBlocks.push({formula:f.trim(),display:true});
    return '\x00MATHBLOCK'+i+'\x00';
  });
  text=text.replace(/(?<!\$)\$(?!\$)([^$]+?)\$(?!\$)/g,(_,f)=>{
    const i=mathBlocks.length;
    mathBlocks.push({formula:f.trim(),display:false});
    return '\x00MATHINLINE'+i+'\x00';
  });

  let html=marked.parse(text);
  html+=renderFootnotes();

  // Restore math formulas
  html=html.replace(/\x00MATHBLOCK(\d+)\x00/g,(_,i)=>{
    try{return katex.renderToString(mathBlocks[i].formula,{displayMode:true,throwOnError:false})}
    catch(e){return '<code>'+escHtml(mathBlocks[i].formula)+'</code>'}
  });
  html=html.replace(/\x00MATHINLINE(\d+)\x00/g,(_,i)=>{
    try{return katex.renderToString(mathBlocks[i].formula,{displayMode:false,throwOnError:false})}
    catch(e){return '<code>'+escHtml(mathBlocks[i].formula)+'</code>'}
  });

  pr.innerHTML=html;
  afterRender(pr);
  updStat();
}

// ===== FEATURE 1: SEARCH & REPLACE =====
let srMatches=[],srIdx=-1,srCaseSensitive=false;

function toggleSearch(){
  const b=document.getElementById('edSearch');const on=!b.classList.contains('on');
  b.classList.toggle('on');document.getElementById('srFind').value='';document.getElementById('srRepl').value='';
  document.getElementById('srCount').textContent='';srMatches=[];srIdx=-1;
  document.getElementById('btn-search').classList.toggle('on',on);
  if(on)document.getElementById('srFind').focus();
}

function toggleCase(){srCaseSensitive=!srCaseSensitive;document.getElementById('srCase').classList.toggle('on',srCaseSensitive);doSearch()}

function doSearch(){
  const q=document.getElementById('srFind').value;ed.focus();
  if(!q){srMatches=[];srIdx=-1;document.getElementById('srCount').textContent='';return}
  const txt=ed.value;const flags=srCaseSensitive?'g':'gi';const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),flags);
  srMatches=[];let m;while((m=re.exec(txt))!==null){srMatches.push(m.index)}
  if(srMatches.length>0){srIdx=0;selMatch()}else{srIdx=-1}
  document.getElementById('srCount').textContent=srMatches.length>0?(srIdx+1)+' / '+srMatches.length:'0 / 0';
  if(srMatches.length===0)document.getElementById('srCount').textContent='No results';
}

function selMatch(){
  if(srIdx<0||srIdx>=srMatches.length)return;
  const pos=srMatches[srIdx];const q=document.getElementById('srFind').value;
  ed.setSelectionRange(pos,pos+q.length);ed.focus();
  // Scroll textarea to show selection
  const lns=ed.value.substring(0,pos).split('\n').length;
  const lh=parseFloat(getComputedStyle(ed).lineHeight)||25.2;
  const sh=lh*(lns-5);
  ed.scrollTop=Math.max(0,sh);
  document.getElementById('srCount').textContent=(srIdx+1)+' / '+srMatches.length;
}

function srNext(){if(srMatches.length===0)return;srIdx=(srIdx+1)%srMatches.length;selMatch()}
function srPrev(){if(srMatches.length===0)return;srIdx=(srIdx-1+srMatches.length)%srMatches.length;selMatch()}

function srReplace(){
  if(srIdx<0||srIdx>=srMatches.length)return;
  const q=document.getElementById('srFind').value;const r=document.getElementById('srRepl').value;
  if(!q)return;
  const pos=srMatches[srIdx];
  ed.value=ed.value.substring(0,pos)+r+ed.value.substring(pos+q.length);
  const diff=r.length-q.length;
  // Rebuild match positions after current
  const newMatches=[];for(let i=0;i<srMatches.length;i++){
    if(i<=srIdx)newMatches.push(srMatches[i]);
    else newMatches.push(srMatches[i]+diff);
  }
  // Remove current match
  newMatches.splice(srIdx,1);
  srMatches=newMatches;
  if(srMatches.length===0){srIdx=-1;document.getElementById('srCount').textContent='0 / 0'}
  else{srIdx=Math.min(srIdx,srMatches.length-1);selMatch()}
  updPrev();updLn();markUnsaved();
}

function srReplaceAll(){
  const q=document.getElementById('srFind').value;if(!q)return;
  const r=document.getElementById('srRepl').value;
  const flags=srCaseSensitive?'g':'gi';const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),flags);
  const count=(ed.value.match(re)||[]).length;
  ed.value=ed.value.replace(re,r);
  srMatches=[];srIdx=-1;document.getElementById('srCount').textContent='Replaced '+count;
  updPrev();updLn();markUnsaved();
}

});

// ===== FEATURE 2: IMAGE PASTE =====
ed.addEventListener('paste',e=>{
  const items=e.clipboardData?e.clipboardData.items:[];
  let hasImage=false;
  for(let i=0;i<items.length;i++){
    if(items[i].type.startsWith('image/')){
      hasImage=true;break;
    }
  }
  if(!hasImage)return;
  e.preventDefault();
  const s=ed.selectionStart;let prefix='',inserted='';
  const processImages=Array.from(items).filter(it=>it.type.startsWith('image/'));
  let done=0;
  processImages.forEach(it=>{
    const blob=it.getAsFile();
    const reader=new FileReader();
    reader.onload=function(ev){
      const b64=ev.target.result;
      if(b64.length>5*1024*1024){toast('Image too large (>5MB), skipped');done++;return}
      inserted+='![pasted-image]('+b64+')\n';
      done++;
      if(done===processImages.length){
        ed.value=ed.value.substring(0,s)+inserted+ed.value.substring(s);
        const pos=s+inserted.length;
        ed.selectionStart=ed.selectionEnd=pos;
        ed.focus();updPrev();updLn();markUnsaved();
      }
    };
    reader.readAsDataURL(blob);
  });
});

// ===== FEATURE 3: TOC OUTLINE =====
let sideTab='files';

function switchSideTab(tab){
  sideTab=tab;
  const labels=['files','outline','search'];
  document.querySelectorAll('#sideTabs button').forEach((b,i)=>{
    b.classList.toggle('cur',labels[i]===tab);
  });
  document.getElementById('tree').style.display=tab==='files'?'':'none';
  document.getElementById('sideToc').classList.toggle('on',tab==='outline');
  document.getElementById('sideSearch').classList.toggle('on',tab==='search');
  if(tab==='outline')buildTOC();
  if(tab==='search'){document.getElementById('globalSr').focus()}
}

function slugify(text){
  return text.toLowerCase().replace(/[^\w\u4e00-\u9fff]+/g,'-').replace(/^-+|-+$/g,'');
}

function parseTOC(text){
  const headings=[];const lines=text.split('\n');
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    // ATX headings
    const m=l.match(/^(#{1,6})\s+(.+?)(?:\s+#+\s*)?$/);
    if(m){headings.push({level:m[1].length,text:m[2].trim(),line:i});continue}
    // Setext h1
    if(i+1<lines.length&&lines[i+1].match(/^=+\s*$/)&&l.trim()){
      headings.push({level:1,text:l.trim(),line:i});i++;continue
    }
    // Setext h2
    if(i+1<lines.length&&lines[i+1].match(/^-+\s*$/)&&l.trim()){
      headings.push({level:2,text:l.trim(),line:i});i++;continue
    }
  }
  return headings;
}

function buildTOC(){
  const toc=document.getElementById('sideToc');
  if(sideTab!=='outline')return;
  const headings=parseTOC(ed.value);
  if(!headings.length){toc.innerHTML='<div class="toc-empty">No headings</div>';return}
  let h='';
  headings.forEach((hd,i)=>{
    const slug=slugify(hd.text)||'heading-'+i;
    h+='<div class="toc-item toc-lv'+hd.level+'" data-slug="'+slug+'" onclick="scrollToHeading(\''+slug+'\')">'+escHtml(hd.text)+'</div>';
  });
  toc.innerHTML=h;
  updateActiveTOC();
}

function scrollToHeading(slug){
  const el=document.getElementById(slug);
  if(el){el.scrollIntoView({behavior:'smooth',block:'start'})}
}

function updateActiveTOC(){
  if(sideTab!=='outline')return;
  const items=document.querySelectorAll('.toc-item');
  if(!items.length)return;
  const headings=parseTOC(ed.value);
  const prevEl=document.getElementById('preview');
  let activeSlug=null;
  for(let i=headings.length-1;i>=0;i--){
    const slug=slugify(headings[i].text)||'heading-'+i;
    const el=document.getElementById(slug);
    if(!el)continue;
    const rect=el.getBoundingClientRect();
    const prRect=prevEl.getBoundingClientRect();
    if(rect.top<=prRect.top+80){activeSlug=slug;break}
  }
  items.forEach(it=>{it.classList.toggle('active',it.dataset.slug===activeSlug)});
}

// Hook into existing updPrev to add heading ids and update TOC
const _origUpdPrev=updPrev;
updPrev=function(){
  _origUpdPrev();
  // Add heading IDs to preview
  const headings=parseTOC(ed.value);
  headings.forEach((hd,i)=>{
    const slug=slugify(hd.text)||'heading-'+i;
    const selector='h'+hd.level;
    const els=pr.querySelectorAll(selector);
    for(const el of els){
      if(el.textContent.trim()===hd.text.trim()&&!el.id){
        el.id=slug;break;
      }
    }
  });
  buildTOC();
};

const _origEdInput=ed.oninput;
ed.addEventListener('input',function(e){
  if(sideTab==='outline')buildTOC();

// ===== FEATURE: GLOBAL FULL-TEXT SEARCH =====
let globalSrTimer=null;
function globalSearch(){
  clearTimeout(globalSrTimer);
  globalSrTimer=setTimeout(doGlobalSearch,300);
}

async function doGlobalSearch(){
  const q=document.getElementById('globalSr').value.trim();
  const list=document.getElementById('srList');
  if(!q){list.innerHTML='';return}

  const allFiles=await all('files');
  const results=[];
  const qLower=q.toLowerCase();

  for(const fl of allFiles){
    if(fl.type==='svg')continue;
    const content=fl.content||'';
    const lines=content.split('\n');
    for(let i=0;i<lines.length;i++){
      const idx=lines[i].toLowerCase().indexOf(qLower);
      if(idx>=0){
        let snippet=lines[i];
        if(snippet.length>60){
          const start=Math.max(0,idx-20);
          const end=Math.min(snippet.length,idx+q.length+20);
          snippet=snippet.substring(start,end);
          if(start>0)snippet='...'+snippet;
          if(end<lines[i].length)snippet=snippet+'...';
        }
        results.push({
          fileName:fl.name,
          fileId:fl.id,
          line:lines[i],
          lineNum:i+1,
          snippet:snippet,
          idxInSnippet:idx-(Math.max(0,idx-20))+(snippet.startsWith('...')?3:0)
        });
      }
    }
  }

  // Sort by file name, then line number
  results.sort((a,b)=>a.fileName.localeCompare(b.fileName)||a.lineNum-b.lineNum);

  if(!results.length){list.innerHTML='<div class="sr-empty">No results found</div>';return}

  let h='';
  results.forEach(r=>{
    const escSnippet=escHtml(r.snippet);
    // Highlight keyword case-insensitively
    const qRe=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    const hlSnippet=escSnippet.replace(qRe,'<span class="sr-hl">$1</span>');
    h+='<div class="sr-item" onclick="openFromSearch(\''+r.fileId+'\','+r.lineNum+',\''+q.replace(/'/g,"\\'")+'\')">';
    h+='<div class="sr-fname">'+escHtml(r.fileName)+'</div>';
    h+='<div class="sr-line">'+hlSnippet+'<span class="sr-ln">L'+r.lineNum+'</span></div>';
    h+='</div>';
  });
  list.innerHTML=h;
}

async function openFromSearch(fileId,lineNum,query){
  // Switch sidebar back to files
  switchSideTab('files');
  // Open the file as a tab
  openTab(fileId);
  // After tab loads, scroll to the line and highlight
  setTimeout(()=>{
    // Find the position in the content
    const lines=ed.value.split('\n');
    let pos=0;
    for(let i=0;i<Math.min(lineNum-1,lines.length);i++)pos+=lines[i].length+1;
    // Find the query position on that line
    const lineContent=lines[lineNum-1]||'';
    const idx=lineContent.toLowerCase().indexOf(query.toLowerCase());
    if(idx>=0){
      ed.setSelectionRange(pos+idx,pos+idx+query.length);
      ed.focus();
      const lh=parseFloat(getComputedStyle(ed).lineHeight)||25.2;
      ed.scrollTop=Math.max(0,lh*(lineNum-5));
    }
  },300);
}

// ===== FEATURE: EXPORT PDF =====
function exportPDF(){
  if(!cfile&&!ed.value){toast('No file to export');return}
  // Get current preview HTML
  const prevHTML=pr.innerHTML;
  const title=cfile?cfile.name:'untitled';

  const iframe=document.createElement('iframe');
  iframe.style.position='fixed';
  iframe.style.top='-9999px';
  iframe.style.left='-9999px';
  iframe.style.width='800px';
  iframe.style.height='600px';
  document.body.appendChild(iframe);

  const styles=Array.from(document.querySelectorAll('style')).map(s=>s.textContent).join('\n');
  const doc=iframe.contentDocument||iframe.contentWindow.document;
  doc.open();
  doc.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+title+'</title><style>');
  doc.write(styles);
  doc.write('@media print{body{background:white!important;color:black!important;font-family:-apple-system,sans-serif;line-height:1.85;margin:2cm}'+
    '.mermaid-container,.mermaid-container svg{max-width:100%}'+
    'pre,code{page-break-inside:avoid;white-space:pre-wrap;word-break:break-all}'+
    'img{max-width:100%!important}'+
    'h1,h2,h3,h4,h5,h6{page-break-after:avoid}'+
    '.pr-svg svg{max-width:100%}'+
    '}');
  doc.write('</style></head><body><div class="pr-inner md">');
  doc.write(prevHTML);
  doc.write('</div></body></html>');
  doc.close();

  iframe.onload=function(){
    setTimeout(()=>{
      iframe.contentWindow.print();
      setTimeout(()=>{document.body.removeChild(iframe)},500);
    },200);
  };
}

let selectedTemplateIndex=-1;

function openTemplates(){
  const overlay=document.getElementById('mdOver');
  const box=document.getElementById('mdBox');

  selectedTemplateIndex=-1;
  let listHTML='<div class="tmpl-list">';
  TEMPLATES.forEach((tpl,i)=>{
    const cls='tmpl-opt'+(i===selectedTemplateIndex?' sel':'');
    listHTML+='<div class="'+cls+'" onclick="selectTemplate('+i+')"><span class="tmpl-name">'+escHtml(tpl.name)+'</span><span class="tmpl-desc">'+escHtml(tpl.desc)+'</span></div>';
  });
  listHTML+='</div>';

  box.innerHTML='<h3>Create from Template</h3>'+listHTML+'<div class="md-act"><button onclick="closeTemplates()">Cancel</button><button class="pri" onclick="createFromTemplate()">Create</button></div>';
  overlay.classList.add('open');
}

function selectTemplate(index){
  selectedTemplateIndex=index;
  document.querySelectorAll('.tmpl-opt').forEach((el,i)=>el.classList.toggle('sel',i===index));
}

function closeTemplates(){
  document.getElementById('mdOver').classList.remove('open');
  selectedTemplateIndex=-1;
}

async function createFromTemplate(){
  if(selectedTemplateIndex<0){toast('Select a template first');return}
  const tpl=TEMPLATES[selectedTemplateIndex];
  const baseName=tpl.name.toLowerCase().replace(/\s+/g,'-');
  // Find next available number
  const existingFiles=await all('files');
  let counter=1;
  while(existingFiles.some(f=>f.name===baseName+'-'+counter+'.md'))counter++;
  const fileName=baseName+'-'+counter+'.md';

  const fl={id:uid(),name:fileName,type:'md',folderId:null,content:tpl.content,createdAt:Date.now(),updatedAt:Date.now()};
  await put('files',fl);
  closeTemplates();
  await ldtree();
  openTab(fl.id);
  toast('Created: '+fileName);
}
