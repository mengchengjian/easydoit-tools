<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="本地文件批量重命名工具，无需上传，选中文件夹直接在本地原地重命名，支持时间戳、UUID、自定义前缀等模式。">
<meta name="keywords" content="文件重命名,批量重命名,本地工具,浏览器API,File System Access">
<title>Batch Rename - 本地批量重命名</title>
<style>
:root{
  --bg:#0d1116;--bg2:#131820;--bg3:#1a212b;--border:#252d38;
  --text:#e1e6ed;--text2:#8896a6;--accent:#4d9fff;--danger:#e0556a;
  --green:#3fb950;--yellow:#d29922;
  --radius:8px;--radius-sm:5px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Geist",-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;
}
/* Nav */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:10;
}
.nav-l{display:flex;align-items:center;gap:12px}
.nav-l .logo{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-.02em}
.nav-l .ver{font-size:10px;color:var(--text2);background:var(--bg3);padding:2px 6px;border-radius:3px}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
  border-radius:var(--radius-sm);font-size:13px;font-weight:500;
  cursor:pointer;border:1px solid transparent;transition:all .15s;
  font-family:inherit;white-space:nowrap;
}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{filter:brightness(1.1)}
.btn-s{border-color:var(--border);background:var(--bg3);color:var(--text)}
.btn-s:hover{border-color:var(--text2)}
.btn-d{border-color:var(--danger);color:var(--danger);background:transparent}
.btn-d:hover{background:var(--danger);color:#fff}
.btn:disabled{opacity:.4;pointer-events:none}

/* Main */
.main{flex:1;display:flex;flex-direction:column;max-width:1100px;width:100%;margin:0 auto;padding:20px}

/* Empty state */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text2)}
.empty .empty-icon{font-size:48px;opacity:.3}
.empty h2{font-size:20px;font-weight:600;color:var(--text)}
.empty p{font-size:13px;max-width:340px;text-align:center;line-height:1.6}

/* Toolbar */
.toolbar{
  display:flex;align-items:center;flex-wrap:wrap;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:16px;
}
.toolbar .sep{width:1px;height:20px;background:var(--border)}
.toolbar label{font-size:12px;color:var(--text2);font-weight:500}
.toolbar select,.toolbar input{
  background:var(--bg3);color:var(--text);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:5px 10px;font-size:13px;font-family:inherit;
  outline:none;transition:border-color .15s;
}
.toolbar select:focus,.toolbar input:focus{border-color:var(--accent)}

/* File list */
.file-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden}
.file-item{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:var(--bg2);transition:background .12s;
}
.file-item:hover{background:var(--bg3)}
.file-item .thumb{
  width:44px;height:44px;border-radius:var(--radius-sm);overflow:hidden;
  background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);
}
.file-item .thumb img{width:100%;height:100%;object-fit:cover}
.file-item .thumb .no-img{font-size:12px;color:var(--text2)}
.file-item .info{flex:1;min-width:0}
.file-item .info .old-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item .info .meta{font-size:11px;color:var(--text2);margin-top:2px}
.file-item .arrow{color:var(--text2);font-size:14px;flex-shrink:0}
.file-item .new-name{
  font-size:13px;color:var(--accent);font-weight:500;flex-shrink:0;
  max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.file-item .status{width:20px;text-align:center;flex-shrink:0}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  padding:10px 20px;border-radius:var(--radius);font-size:13px;
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;
}
.toast.show{opacity:1}
.toast.ok{border-color:var(--green)}
.toast.err{border-color:var(--danger)}

/* Summary */
.summary{display:flex;align-items:center;gap:16px;padding:12px 0;font-size:12px;color:var(--text2)}
.summary strong{color:var(--text)}

/* Count badge */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;
  background:var(--accent);color:#fff}

/* Pattern preview */
.preview-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.preview-row code{background:var(--bg3);padding:2px 6px;border-radius:3px;font-size:12px;color:var(--accent)}

/* Progress */
.progress-bar{height:3px;background:var(--accent);border-radius:0 2px 2px 0;transition:width .2s;width:0}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-l">
    <span class="logo">Rn</span>
    <span class="ver">v1.0</span>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-s" onclick="selectFolder()" id="btn-select">选择文件夹</button>
    <button class="btn btn-p" onclick="renameAll()" id="btn-rename" disabled>重命名全部</button>
  </div>
</nav>

<div class="progress-bar" id="progress"></div>

<div class="main" id="main">
  <div class="empty" id="empty">
    <div class="empty-icon">📁</div>
    <h2>选择包含图片的文件夹</h2>
    <p>使用浏览器原生 File System Access API，直接在本地原地重命名，无需上传下载</p>
    <button class="btn btn-p" onclick="selectFolder()">选择文件夹</button>
    <p style="font-size:11px;color:var(--text2);margin-top:4px">支持 Chrome / Edge 86+，图片格式：jpg / png / gif / webp / bmp / heic</p>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <label>命名模式</label>
    <select id="pattern" onchange="onPatternChange()">
      <option value="timestamp">时间戳 + 序号</option>
      <option value="uuid">短 UUID</option>
      <option value="custom">自定义前缀 + 序号</option>
    </select>
    <div id="custom-wrap" style="display:none;display:flex;align-items:center;gap:6px">
      <label>前缀</label>
      <input id="prefix" value="IMG_" maxlength="20" oninput="regenerateNames()" style="width:100px">
    </div>
    <div class="sep"></div>
    <label>序号位数</label>
    <select id="digits" onchange="regenerateNames()">
      <option value="3">3位 (001)</option>
      <option value="4" selected>4位 (0001)</option>
      <option value="5">5位 (00001)</option>
    </select>
    <div class="sep"></div>
    <div class="preview-row">
      预览 <code id="preview-name">IMG_20260720_143025_0001.jpg</code>
    </div>
  </div>

  <div class="summary" id="summary" style="display:none">
    <span class="badge" id="count-badge">0</span>
    <span id="summary-text"></span>
  </div>

  <div class="file-list" id="file-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let dirHandle = null;
let files = []; // {handle, name, ext, file, blobUrl}

async function selectFolder(){
  try{
    dirHandle = await window.showDirectoryPicker({mode:'readwrite'});
    await scanFiles();
  }catch(e){
    if(e.name !== 'AbortError') showToast('选择文件夹失败: '+e.message, 'err');
  }
}

async function scanFiles(){
  const exts = new Set(['jpg','jpeg','png','gif','webp','bmp','svg','heic','heif','tiff','ico']);
  files = [];
  for await(const [name, handle] of dirHandle.entries()){
    if(handle.kind !== 'file') continue;
    const ext = name.split('.').pop().toLowerCase();
    if(!exts.has(ext)) continue;
    files.push({handle, name, ext, file:null, blobUrl:null});
  }
  // Sort by name
  files.sort((a,b) => a.name.localeCompare(b.name));

  // Load previews
  for(const f of files){
    try{
      f.file = await f.handle.getFile();
      f.blobUrl = URL.createObjectURL(f.file);
    }catch(e){/* skip */}
  }

  regenerateNames();
  render();
}

function generateName(f, idx){
  const p = document.getElementById('pattern').value;
  const d = parseInt(document.getElementById('digits').value);
  const num = String(idx+1).padStart(d,'0');

  if(p === 'timestamp'){
    const now = new Date();
    const ts = now.getFullYear()
      + String(now.getMonth()+1).padStart(2,'0')
      + String(now.getDate()).padStart(2,'0')
      + '_'
      + String(now.getHours()).padStart(2,'0')
      + String(now.getMinutes()).padStart(2,'0')
      + String(now.getSeconds()).padStart(2,'0');
    return `IMG_${ts}_${num}.${f.ext}`;
  }
  if(p === 'uuid'){
    const s = crypto.randomUUID().split('-')[0];
    return `${s}_${num}.${f.ext}`;
  }
  if(p === 'custom'){
    const prefix = document.getElementById('prefix').value.replace(/[<>:"/\\|?*\x00-\x1f]/g,'') || 'FILE_';
    return `${prefix}${num}.${f.ext}`;
  }
  return f.name;
}

function regenerateNames(){
  for(let i=0;i<files.length;i++){
    files[i].newName = generateName(files[i], i);
  }
  // Update preview
  if(files.length > 0){
    document.getElementById('preview-name').textContent = files[0].newName;
  }
  render();
}

function onPatternChange(){
  const p = document.getElementById('pattern').value;
  document.getElementById('custom-wrap').style.display = p === 'custom' ? 'flex' : 'none';
  regenerateNames();
}

function render(){
  const emptyEl = document.getElementById('empty');
  const toolbarEl = document.getElementById('toolbar');
  const summaryEl = document.getElementById('summary');
  const listEl = document.getElementById('file-list');
  const renameBtn = document.getElementById('btn-rename');
  const countBadge = document.getElementById('count-badge');
  const summaryText = document.getElementById('summary-text');

  if(files.length === 0){
    emptyEl.style.display = 'flex';
    toolbarEl.style.display = 'none';
    summaryEl.style.display = 'none';
    listEl.innerHTML = '';
    renameBtn.disabled = true;
    return;
  }

  emptyEl.style.display = 'none';
  toolbarEl.style.display = 'flex';
  summaryEl.style.display = 'flex';
  countBadge.textContent = files.length;
  summaryText.textContent = `个文件待重命名`;
  renameBtn.disabled = false;

  if(files.length > 0){
    document.getElementById('preview-name').textContent = files[0].newName;
  }

  let html = '';
  for(const f of files){
    html += `<div class="file-item">
      <div class="thumb">${f.blobUrl ? `<img src="${f.blobUrl}" alt="">` : '<span class="no-img">IMG</span>'}</div>
      <div class="info">
        <div class="old-name" title="${esc(f.name)}">${esc(f.name)}</div>
        <div class="meta">${formatSize(f.file?.size||0)}</div>
      </div>
      <span class="arrow">→</span>
      <span class="new-name">${esc(f.newName||'')}</span>
      <span class="status" id="st-${escAttr(f.name)}"></span>
    </div>`;
  }
  listEl.innerHTML = html;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function formatSize(b){
  if(!b) return '--';
  if(b<1024) return b+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(2)+' MB';
}

async function renameAll(){
  const renameBtn = document.getElementById('btn-rename');
  const progressEl = document.getElementById('progress');
  renameBtn.disabled = true;
  progressEl.style.width = '0%';

  let ok=0, fail=0;
  const total = files.length;

  for(let i=0;i<files.length;i++){
    const f = files[i];
    const stEl = document.getElementById('st-'+escAttr(f.name));
    try{
      // Check if new name already exists (skip if same name)
      if(f.newName === f.name){
        if(stEl) stEl.textContent = '⏭';
        ok++;
        continue;
      }
      // Create new file
      const blob = f.file || await f.handle.getFile();
      const newHandle = await dirHandle.getFileHandle(f.newName, {create:true});
      const writable = await newHandle.createWritable();
      await writable.write(blob);
      await writable.close();
      // Remove old file
      await dirHandle.removeEntry(f.name);
      if(stEl) stEl.textContent = '✓';
      ok++;
    }catch(e){
      if(stEl) stEl.textContent = '✗';
      fail++;
      console.error('Rename failed:', f.name, e);
    }
    progressEl.style.width = ((i+1)/total*100)+'%';
  }

  renameBtn.disabled = false;
  if(fail===0) showToast(`成功重命名 ${ok} 个文件`, 'ok');
  else showToast(`完成: ${ok} 成功, ${fail} 失败`, 'err');

  // Re-scan to refresh list
  setTimeout(async ()=>{
    await scanFiles();
    progressEl.style.width = '0%';
  }, 800);
}

let toastTimer;
function showToast(msg, type){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{el.className='toast'}, 2500);
}
</script>
</body>
</html>
